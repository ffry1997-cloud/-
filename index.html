            const si = document.getElementById('searchInput');
            if (sc.style.display === 'block') {
                sc.style.display = 'none';
                si.value = '';
                document.getElementById('searchStats').style.display = 'none';
                UI.renderFolderList();
            } else {
                sc.style.display = 'block';
                si.value = '';
                si.focus();
                this.updateSearchResults();
            }
        },

        updateSearchResults() {
            const si = document.getElementById('searchInput');
            const ss = document.getElementById('searchStats');
            const query = si.value.toLowerCase().trim();
            if (!query) {
                ss.style.display = 'none';
                UI.renderFolderList();
                return;
            }
            const results = Services.searchTasks(query);
            ss.style.display = 'block';
            ss.textContent = `Найдено: ${results.length} задач`;
            UI.renderFolderList(results);
        },

        goBackToFolders() {
            State.setCurrentFolderId(null);
            document.getElementById('searchContainer').style.display = 'none';
            State.save();
            UI.renderAll();
        },

        exportData() {
            const data = JSON.stringify({
                folders: State.getFolders(),
                notes: State.getNotes(),
                clients: State.getClients(),
                customQuotes: State.getCustomQuotes()
            }, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `my-plans-backup-${Utils.getTodayISO()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            UI.showToast('📤 Данные экспортированы');
        },

        importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.folders) {
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                            State.load();
                            UI.renderAll();
                            UI.showToast('📥 Данные импортированы');
                        }
                    } catch (err) {
                        UI.showToast('❌ Ошибка импорта');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        },

        syncData() {
            UI.showToast('🔄 Синхронизация... (данные сохранены локально)');
            State.save();
        },

        toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        },

        requestNotification() {
            if (!('Notification' in window)) {
                UI.showToast('❌ Уведомления не поддерживаются');
                return;
            }
            if (Notification.permission === 'granted') {
                UI.showToast('🔔 Уведомления уже включены');
            } else if (Notification.permission === 'denied') {
                UI.showToast('❌ Уведомления заблокированы');
            } else {
                Notification.requestPermission().then(perm => {
                    UI.showToast(perm === 'granted' ? '✅ Уведомления включены' : '❌ Уведомления отклонены');
                });
            }
        },

        toggleWeekView() {
            const weekOverview = document.getElementById('weekOverview');
            if (weekOverview.style.display === 'flex') {
                weekOverview.style.display = 'none';
            } else {
                weekOverview.style.display = 'flex';
                UI.renderWeekOverview();
            }
        }
    };

    window.Actions = Actions;

    const DragDrop = {
        handleDragStart(event) {
            event.target.classList.add('dragging');
            event.dataTransfer.setData('text/plain', JSON.stringify({
                taskId: event.target.dataset.taskId,
                fromFolderId: event.target.dataset.folderId
            }));
            event.dataTransfer.effectAllowed = 'move';
        },
        handleDragEnd(event) {
            event.target.classList.remove('dragging');
            document.querySelectorAll('.folder-card').forEach(c => c.classList.remove('drag-over'));
        },
        handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            event.currentTarget.classList.add('drag-over');
        },
        handleDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        },
        handleDrop(event, toFolderId) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            try {
                const dragData = JSON.parse(event.dataTransfer.getData('text/plain'));
                const {taskId, fromFolderId} = dragData;
                if (fromFolderId === toFolderId || Utils.isSmartFolder(toFolderId)) return;
                const fromFolder = State.getFolderById(fromFolderId);
                const toFolder = State.getFolderById(toFolderId);
                if (!fromFolder || !toFolder) return;
                const taskIndex = fromFolder.tasks.findIndex(t => t && t.id === taskId);
                if (taskIndex === -1) return;
                const task = fromFolder.tasks.splice(taskIndex, 1)[0];
                toFolder.tasks.push(task);
                State.save();
                UI.renderAll();
                UI.showToast('📦 Перемещена');
            } catch(e) {
                UI.showToast('❌ Ошибка');
            }
        }
    };

    window.App = {
        handleDragStart: DragDrop.handleDragStart,
        handleDragEnd: DragDrop.handleDragEnd,
        handleDragOver: DragDrop.handleDragOver,
        handleDragLeave: DragDrop.handleDragLeave,
        handleDrop: DragDrop.handleDrop
    };

    function setupEventListeners() {
        document.addEventListener('click', function(event) {
            const target = event.target.closest('[data-action]');
            if (!target) return;
            const action = target.dataset.action;
            event.preventDefault();
            try {
                handleAction(action, target.dataset);
            } catch(e) {
                console.error('Action error:', action, e);
                UI.showToast('❌ Ошибка');
            }
        });

        setupButtonHandlers();
        setupTabHandlers();
        setupInputHandlers();
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') document.body.classList.add('dark');

        const scrollTopBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            scrollTopBtn?.classList.toggle('visible', window.scrollY > 300);
        });
        scrollTopBtn?.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));

        if ('Notification' in window && Notification.permission === 'granted') {
            setInterval(() => {
                Services.getTasksForNotification().forEach(task => {
                    const min = Math.ceil((new Date(task.date+'T'+task.time) - new Date())/60000);
                    new Notification('⏰ Напоминание', {
                        body: `«${task.text}» через ${min} мин.`,
                        tag: task.id
                    });
                });
            }, 300000);
        }
    }

    function handleAction(action, dataset) {
        switch (action) {
            case ACTIONS.OPEN_FOLDER: Actions.openFolder(dataset.folderId); break;
            case 'open-folder-date': Actions.openFolderDate(dataset.date); break;
            case ACTIONS.CHANGE_ICON: Actions.changeFolderIcon(dataset.folderId); break;
            case ACTIONS.TOGGLE_TASK: Actions.toggleTask(dataset.taskId); break;
            case ACTIONS.EDIT_TASK: Actions.editTask(dataset.taskId); break;
            case ACTIONS.DELETE_TASK: Actions.deleteTask(dataset.taskId); break;
            case ACTIONS.DELETE_FOREVER: Actions.deleteForever(dataset.taskId); break;
            case ACTIONS.RESTORE_TASK: Actions.restoreTask(dataset.taskId); break;
            case ACTIONS.DUPLICATE_TASK: Actions.duplicateTask(dataset.taskId); break;
            case ACTIONS.MOVE_TO_TOMORROW: Actions.moveToTomorrow(dataset.taskId); break;
            case ACTIONS.ADD_SUBTASK: Actions.addSubtask(dataset.taskId); break;
            case ACTIONS.EDIT_SUBTASK: Actions.editSubtask(dataset.taskId, dataset.subtaskId); break;
            case ACTIONS.DELETE_SUBTASK: Actions.deleteSubtask(dataset.taskId, dataset.subtaskId); break;
            case ACTIONS.TOGGLE_SUBTASK: Actions.toggleSubtask(dataset.taskId, dataset.subtaskId); break;
            case ACTIONS.SET_PRIORITY: Actions.setPriority(dataset.taskId, parseInt(dataset.priority)); break;
            case ACTIONS.EDIT_CLIENT: Actions.editClient(dataset.clientId); break;
            case ACTIONS.EMAIL_CLIENT: Actions.emailClient(dataset.clientId); break;
            case ACTIONS.DELETE_CLIENT: Actions.deleteClient(dataset.clientId); break;
            case ACTIONS.SELECT_DATE: 
                AppState.selectedDate = dataset.date;
                UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, AppState.selectedDate);
                break;
            case ACTIONS.EDIT_CUSTOM_QUOTE: Actions.editCustomQuote(dataset.side); break;
            case ACTIONS.DELETE_NOTE: Actions.deleteNote(dataset.noteId); break;
            case ACTIONS.DELETE_FOLDER: Actions.deleteFolder(dataset.folderId); break;
        }
    }

    function setupButtonHandlers() {
        const handlers = {
            btnAddTask: Actions.addTask,
            btnAddFolder: Actions.addFolder,
            btnEditFolder: Actions.editFolder,
            btnAddClient: Actions.addClient,
            btnAddNote: Actions.addNote,
            btnNewFolder: Actions.addFolder,
            btnNewNote: Actions.addNote,
            btnSearch: Actions.toggleSearch,
            btnNotify: Actions.requestNotification,
            btnWeekView: Actions.toggleWeekView,
            btnBackToFolders: Actions.goBackToFolders,
            btnPrevMonth: () => {
                AppState.calendarMonth--;
                if (AppState.calendarMonth < 0) { AppState.calendarMonth = 11; AppState.calendarYear--; }
                AppState.selectedDate = null;
                UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, null);
            },
            btnNextMonth: () => {
                AppState.calendarMonth++;
                if (AppState.calendarMonth > 11) { AppState.calendarMonth = 0; AppState.calendarYear++; }
                AppState.selectedDate = null;
                UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, null);
            },
            btnTheme: Actions.toggleTheme,
            btnExport: Actions.exportData,
            btnImport: Actions.importData,
            btnSync: Actions.syncData
        };
        Object.entries(handlers).forEach(([id, fn]) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', fn);
        });
    }

    function setupTabHandlers() {
        document.querySelectorAll('#mainTabs .tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                const section = document.getElementById(`section-${tabName}`);
                if (section) section.classList.add('active');
                switch(tabName) {
                    case 'tasks':
                        document.getElementById('searchContainer').style.display = 'none';
                        UI.renderAll();
                        break;
                    case 'calendar':
                        UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, AppState.selectedDate);
                        break;
                    case 'stats':
                        UI.renderStats();
                        break;
                }
            });
        });
    }

    function setupInputHandlers() {
        document.getElementById('taskFilter')?.addEventListener('click', function(e) {
            const btn = e.target.closest('.task-filter-btn');
            if (btn) Actions.setTaskFilter(btn.dataset.filter);
        });
        
        const taskRepeat = document.getElementById('taskRepeat');
        const taskRepeatDays = document.getElementById('taskRepeatDays');
        if (taskRepeat && taskRepeatDays) {
            taskRepeat.addEventListener('change', function() {
                taskRepeatDays.style.display = this.value === 'custom' ? 'inline' : 'none';
            });
        }
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', Actions.updateSearchResults);
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') Actions.toggleSearch();
            });
        }
        
        let noteTimeout;
        document.addEventListener('input', function(e) {
            if (!e.target.classList.contains('note-textarea')) return;
            clearTimeout(noteTimeout);
            noteTimeout = setTimeout(() => {
                const note = State.getNoteById(e.target.dataset.noteId);
                if (note) { note.text = e.target.value; note.updatedAt = Date.now(); State.save(); }
            }, 600);
        });
    }

    const AppState = {
        calendarYear: new Date().getFullYear(),
        calendarMonth: new Date().getMonth(),
        selectedDate: null
    };

    function initialize() {
        try {
            State.load();
            Services.processRepeats();
            setupEventListeners();
            UI.renderAll({
                year: AppState.calendarYear,
                month: AppState.calendarMonth,
                selectedDate: AppState.selectedDate
            });
            State.save();
            UI.updateQuote();
            setInterval(UI.updateQuote, 30000);
        } catch(e) {
            console.error('Init error:', e);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }
})();
</script>
</body>
</html>
