
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Мои планы</title>
    <meta name="apple-mobile-web-app-title" content="Мои планы">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f5f3f0">
    <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%234a90d9'/%3E%3Ctext y='.72em' x='50' text-anchor='middle' font-size='55'%3E📅%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #f5f3f0;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #888888;
            --accent: #4a90d9;
            --accent-light: #eef4fb;
            --danger: #d96969;
            --danger-light: #fef2f2;
            --border: #e8e5e0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            --radius: 20px;
            --radius-sm: 14px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --star-color: #f0c040;
            --overdue: #e55353;
            --today-color: #e5904c;
            --upcoming: #4caf84;
        }

        .dark {
            --bg: #1e1d1a;
            --card: #2c2a26;
            --text: #e8e4dd;
            --text-secondary: #999590;
            --accent: #6ba3e0;
            --accent-light: #2d353f;
            --border: #3d3a34;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 8px 4px;
            position: relative;
        }

        .app-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            padding: 14px 0 6px;
            letter-spacing: -0.3px;
        }

        .bg-quote {
            text-align: center;
            font-style: italic;
            color: var(--text-secondary);
            padding: 6px 0;
            font-size: 13px;
            opacity: 0.7;
            transition: opacity 0.5s;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 4px 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .custom-quotes {
            display: flex;
            gap: 12px;
            margin-bottom: 2px;
        }

        .custom-quote-box {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            font-style: italic;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all .2s;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .custom-quote-box:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .header-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 4px 0 8px;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            font-size: 19px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            color: var(--text);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .icon-btn:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .icon-btn:active {
            transform: scale(0.94);
        }

        .tabs {
            display: flex;
            background: var(--card);
            border-radius: 30px;
            padding: 5px;
            box-shadow: var(--shadow);
            gap: 2px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 10px;
            border-radius: 26px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            white-space: nowrap;
            min-width: fit-content;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
        }

        .section {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .section.active {
            display: flex;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--border);
        }

        .search-container {
            margin-bottom: 4px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 26px;
            border: 2px solid var(--border);
            font-size: 15px;
            font-family: var(--font);
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-stats {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 6px;
            display: none;
        }

        .stats-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }

        .stat-item {
            padding: 10px;
            background: var(--bg);
            border-radius: var(--radius-sm);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .star-btn {
            font-size: 18px;
            cursor: pointer;
            padding: 2px 4px;
            border: none;
            background: none;
            transition: transform 0.1s;
            color: #ddd;
        }

        .star-btn.active {
            color: var(--star-color);
        }

        .star-btn:hover {
            transform: scale(1.15);
        }

        .days-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap;
            font-weight: 600;
        }

        .days-badge.overdue {
            background: #fde8e8;
            color: var(--overdue);
        }

        .days-badge.today {
            background: #fef3e2;
            color: var(--today-color);
        }

        .days-badge.upcoming {
            background: #e8f8ef;
            color: var(--upcoming);
        }

        .folder-card.drag-over {
            background: var(--accent-light);
            border: 2px dashed var(--accent);
            transform: scale(1.01);
        }

        .task-item.dragging {
            opacity: 0.4;
            transform: scale(0.96);
        }

        .task-item[draggable="true"] {
            cursor: grab;
        }

        .task-item[draggable="true"]:active {
            cursor: grabbing;
        }

        .folder-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .folder-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .folder-card:active {
            transform: scale(0.98);
            background: var(--bg);
        }

        .folder-icon {
            font-size: 34px;
            width: 44px;
            text-align: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .folder-info {
            flex: 1;
            min-width: 0;
        }

        .folder-name {
            font-size: 16px;
            font-weight: 600;
            word-wrap: break-word;
            letter-spacing: -0.2px;
        }

        .folder-stats {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
            flex-wrap: wrap;
            align-items: center;
        }

        .stat-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .stat-active {
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .stat-completed {
            color: var(--danger);
            background: var(--danger-light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .task-filter {
            display: flex;
            margin-bottom: 10px;
            background: var(--bg);
            border-radius: 24px;
            padding: 4px;
        }

        .task-filter-btn {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            transition: all .2s;
            font-family: var(--font);
        }

        .task-filter-btn.active {
            background: var(--card);
            color: var(--accent);
            font-weight: 700;
            box-shadow: var(--shadow);
        }

        .task-filter-btn .count {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 4px;
        }

        .btn-sm {
            padding: 8px 16px;
            border-radius: 22px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--font);
            letter-spacing: -0.2px;
        }

        .btn-sm:hover {
            opacity: 0.85;
        }

        .btn-sm:active {
            transform: scale(0.95);
        }

        .btn-add {
            background: var(--accent-light);
            color: var(--accent);
        }

        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
        }

        .btn-email {
            background: #e8f0fe;
            color: #1a73e8;
        }

        .btn-xs {
            padding: 2px 6px;
            border-radius: 8px;
            border: none;
            font-size: 10px;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-xs:hover {
            background: var(--border);
        }

        .input {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 24px;
            border: 2px solid var(--border);
            font-size: 15px;
            font-family: var(--font);
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .input:focus {
            border-color: var(--accent);
        }

        .input-time {
            padding: 12px 14px;
            border-radius: 24px;
            border: 2px solid var(--border);
            font-size: 14px;
            font-family: var(--font);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            max-width: 100px;
            outline: none;
        }

        .input-time:focus {
            border-color: var(--accent);
        }

        .client-card {
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--card);
            border-radius: var(--radius-sm);
            font-size: 15px;
            margin: 4px 0;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            transition: opacity 0.2s, transform 0.2s;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #d5ccc5;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 12px;
        }

        .task-item.completed {
            opacity: 0.45;
            background: var(--bg);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
        }

        .task-item.completed .task-checkbox {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .repeat-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--accent-light);
            color: var(--accent);
            white-space: nowrap;
            font-weight: 500;
        }

        .subtask-list {
            list-style: none;
            padding-left: 26px;
            width: 100%;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 3px 0;
            color: var(--text-secondary);
        }

        .subtask-item.completed .subtask-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .subtask-checkbox {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 1.5px solid #ccc;
            flex-shrink: 0;
            cursor: pointer;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .subtask-item.completed .subtask-checkbox {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .subtask-actions {
            display: flex;
            gap: 2px;
            margin-left: auto;
        }

        .no-tasks {
            text-align: center;
            padding: 28px;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 15px;
            opacity: 0.7;
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        
        .folder-grid .folder-card {
            flex-direction: column;
            text-align: center;
            padding: 16px 10px;
            gap: 8px;
        }
        
        .folder-grid .folder-icon {
            font-size: 40px;
        }
        
        .folder-grid .folder-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .folder-grid .folder-stats {
            justify-content: center;
        }

        .view-toggle {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .view-toggle-btn {
            padding: 6px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .view-toggle-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            font-weight: 500;
        }

        .calendar-day:hover { background: var(--bg); }
        .calendar-day.today { background: var(--accent); color: #fff; font-weight: 700; }
        .calendar-day.has-tasks::after { content: ''; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; position: absolute; bottom: 3px; }
        .calendar-day.today.has-tasks::after { background: #fff; }
        .calendar-day.selected { outline: 2px solid var(--accent); outline-offset: 3px; }

        .note-card {
            background: var(--card);
            border-left: 4px solid #f0c8a0;
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border);
        }

        .note-textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-family: var(--font);
            font-size: 15px;
            resize: vertical;
            min-height: 50px;
            outline: none;
            color: var(--text);
        }

        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #3a3a3a;
            color: #fff;
            padding: 12px 24px;
            border-radius: 26px;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .toast.show { opacity: 1; }

        .folder-card.smart-today { border-left: 4px solid var(--accent); background: var(--accent-light); }
        .folder-card.smart-overdue { border-left: 4px solid var(--overdue); background: #fef8f8; }

        .scroll-top-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 999;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .scroll-top-btn.visible { opacity: 1; pointer-events: auto; }

        .week-overview {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            -webkit-overflow-scrolling: touch;
        }
        
        .week-day {
            flex: 0 0 auto;
            min-width: 100px;
            padding: 10px;
            background: var(--card);
            border-radius: var(--radius-sm);
            text-align: center;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .week-day:hover { border-color: var(--accent); }
        .week-day.today { border-color: var(--accent); background: var(--accent-light); }
        .week-day-name { font-size: 11px; color: var(--text-secondary); }
        .week-day-date { font-size: 20px; font-weight: 700; margin: 4px 0; }
        .week-day-count { font-size: 10px; color: var(--accent); font-weight: 600; }
        
        @supports (-webkit-touch-callout: none) {
            .app-container {
                -webkit-overflow-scrolling: touch;
                padding-bottom: env(safe-area-inset-bottom, 12px);
                padding-top: env(safe-area-inset-top, 12px);
                padding-left: env(safe-area-inset-left, 12px);
                padding-right: env(safe-area-inset-right, 12px);
            }
            input, textarea, select { font-size: 16px !important; }
            button { -webkit-appearance: none; }
            .toast { bottom: calc(28px + env(safe-area-inset-bottom, 0px)); }
        }

        button, [role="button"], .clickable, .icon-btn { min-height: 44px; min-width: 44px; }
        input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
        .app-container { -webkit-backface-visibility: hidden; backface-visibility: hidden; }
    </style>
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%D0%9C%D0%BE%D0%B8%20%D0%BF%D0%BB%D0%B0%D0%BD%D1%8B%22%2C%22short_name%22%3A%22%D0%9F%D0%BB%D0%B0%D0%BD%D1%8B%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ctext%20y%3D'.9em'%20font-size%3D'90'%3E%F0%9F%93%85%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22any%22%5D%7D%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f3f0%22%2C%22theme_color%22%3A%22%234a90d9%22%7D">
    <script>
(function() {
    'use strict';

    const STORAGE_KEY = 'my_plans_v17';
    const TOAST_DURATION = 2500;
    
    const FILTERS = Object.freeze({ ACTIVE: 'active', COMPLETED: 'completed' });
    const SMART_FOLDERS = Object.freeze({ TODAY: 'smart-today', OVERDUE: 'smart-overdue', TRASH: 'smart-trash' });
    
    const ACTIONS = Object.freeze({
        OPEN_FOLDER: 'open-folder', CHANGE_ICON: 'change-icon', TOGGLE_TASK: 'toggle-task',
        EDIT_TASK: 'edit-task', DELETE_TASK: 'delete-task', ADD_SUBTASK: 'add-subtask',
        EDIT_SUBTASK: 'edit-subtask', DELETE_SUBTASK: 'delete-subtask', TOGGLE_SUBTASK: 'toggle-subtask',
        SET_PRIORITY: 'set-priority', EDIT_CLIENT: 'edit-client', EMAIL_CLIENT: 'email-client',
        DELETE_CLIENT: 'delete-client', SELECT_DATE: 'select-date', EDIT_CUSTOM_QUOTE: 'edit-custom-quote',
        DELETE_NOTE: 'delete-note', DELETE_FOLDER: 'delete-folder',
        DELETE_FOREVER: 'delete-forever', RESTORE_TASK: 'restore-task',
        DUPLICATE_TASK: 'duplicate-task', MOVE_TO_TOMORROW: 'move-to-tomorrow'
    });
    
    const REPEAT_LABELS = Object.freeze({
        '': 'Без повтора', 'daily': 'Ежедневно', 'weekly': 'Еженедельно',
        'monthly': 'Ежемесячно', 'yearly': 'Ежегодно', 'custom': 'Свой период'
    });
    
    const REPEAT_ABBREVIATIONS = Object.freeze({ 'daily': 'день', 'weekly': 'нед', 'monthly': 'мес', 'yearly': 'год' });
    const FOLDER_ICONS = ['📁','🏠','💼','👨‍👩‍👧‍👦','📚','🏃','✈️','🎯','❤️','🛒','🎵','💻','🎨','🌟','🗂','📝','🎂','💪','🏡','📅','💰','📞','🎉','🔥'];
    const DEFAULT_FOLDER_ICON = '📁';
    const MAX_PRIORITY = 3;
    
    const QUOTES = Object.freeze([
        'Через год, когда посмотришь в зеркало, ты будешь благодарен себе за то, что начал.',
        'Маленький шаг сегодня — большой результат завтра.',
        'Не жди идеального момента. Сделай момент идеальным.',
        'То, что ты делаешь сегодня, определяет твоё завтра.'
    ]);
    
    const TASK_TYPES = Object.freeze({ TASK: 'task', BIRTHDAY: 'birthday' });
    const DAYS_OF_WEEK = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
    const MONTHS_RU = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

    const Utils = Object.freeze({
        generateId() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6); },
        escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        },
        formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            return parts.length === 3 ? `${parts[2]}.${parts[1]}.${parts[0]}` : dateStr;
        },
        formatDateISO(date) {
            if (!(date instanceof Date) || isNaN(date.getTime())) return '';
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        },
        parseDate(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr + 'T00:00:00');
            return isNaN(date.getTime()) ? null : date;
        },
        getTodayISO() { return this.formatDateISO(new Date()); },
        getDaysUntil(dateStr) {
            const today = new Date(); today.setHours(0,0,0,0);
            const targetDate = this.parseDate(dateStr);
            if (!targetDate) return null;
            return Math.ceil((targetDate - today) / 86400000);
        },
        getDaysText(dateStr) {
            const diffDays = this.getDaysUntil(dateStr);
            if (diffDays === null) return null;
            if (diffDays < 0) return { text: `⏳ ${Math.abs(diffDays)} дн назад`, className: 'overdue' };
            if (diffDays === 0) return { text: '⏳ Сегодня', className: 'today' };
            if (diffDays === 1) return { text: '⏳ Завтра', className: 'upcoming' };
            return { text: `⏳ через ${diffDays} дн`, className: 'upcoming' };
        },
        getNextBirthday(dateStr) {
            const parts = dateStr.split('-').map(Number);
            if (parts.length !== 3) return null;
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let birthday = new Date(now.getFullYear(), parts[1]-1, parts[2]);
            if (birthday < today) birthday.setFullYear(now.getFullYear()+1);
            return birthday;
        },
        getAge(birthDateStr, onDate) {
            const parts = birthDateStr.split('-').map(Number);
            if (parts.length !== 3) return 0;
            let age = onDate.getFullYear() - parts[0];
            const birthDateThisYear = new Date(onDate.getFullYear(), parts[1]-1, parts[2]);
            if (onDate < birthDateThisYear) age--;
            return Math.max(0, age);
        },
        getAgeWord(age) {
            if (typeof age !== 'number' || age < 0) return 'лет';
            const lastDigit = age % 10, lastTwoDigits = age % 100;
            if (lastDigit === 1 && lastTwoDigits !== 11) return 'год';
            if ([2,3,4].includes(lastDigit) && ![12,13,14].includes(lastTwoDigits)) return 'года';
            return 'лет';
        },
        getFolderStats(folder) {
            if (!folder || !Array.isArray(folder.tasks)) return { active: 0, completed: 0, total: 0 };
            const active = folder.tasks.filter(t => t && !t.completed).length;
            const completed = folder.tasks.filter(t => t && t.completed).length;
            return { active, completed, total: folder.tasks.length };
        },
        getAllTasksWithFolders() {
            const allTasks = [];
            State.getFolders().forEach(folder => {
                if (Array.isArray(folder.tasks)) {
                    folder.tasks.forEach(task => {
                        if (task) allTasks.push({...task, folderId: folder.id, folderName: folder.name, folderIcon: folder.icon || DEFAULT_FOLDER_ICON});
                    });
                }
            });
            return allTasks;
        },
        findTaskById(taskId) {
            for (const folder of State.getFolders()) {
                if (Array.isArray(folder.tasks)) {
                    const task = folder.tasks.find(t => t && t.id === taskId);
                    if (task) return { task, folder };
                }
            }
            return null;
        },
        isSmartFolder(folderId) { return folderId === SMART_FOLDERS.TODAY || folderId === SMART_FOLDERS.OVERDUE || folderId === SMART_FOLDERS.TRASH; },
        isTrashFolder(folderId) { return folderId === SMART_FOLDERS.TRASH; },
        getValidTasksArray(tasks) { return Array.isArray(tasks) ? tasks.filter(t => t !== null && t !== undefined) : []; }
    });

    const State = (() => {
        let data = {
            folders: [], notes: [], clients: [], currentFolderId: null,
            customQuotes: { left: '', center: '', right: '' },
            currentTaskFilter: FILTERS.ACTIVE, folderViewMode: 'list'
        };

        function load() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) { 
                    const parsed = JSON.parse(saved); 
                    if (parsed && typeof parsed === 'object') {
                        data = { ...data, ...parsed };
                    }
                }
            } catch (error) { console.error('Ошибка загрузки:', error); }
            
            data.folders = Array.isArray(data.folders) ? data.folders : [];
            data.notes = Array.isArray(data.notes) ? data.notes : [];
            data.clients = Array.isArray(data.clients) ? data.clients : [];
            data.customQuotes = data.customQuotes || { left: '', center: '', right: '' };
            data.currentTaskFilter = data.currentTaskFilter === FILTERS.COMPLETED ? FILTERS.COMPLETED : FILTERS.ACTIVE;
            data.folderViewMode = data.folderViewMode || 'list';
            
            data.folders.forEach(folder => {
                if (!folder.icon) folder.icon = DEFAULT_FOLDER_ICON;
                folder.tasks = Utils.getValidTasksArray(folder.tasks);
                folder.tasks.forEach(task => {
                    if (!Array.isArray(task.subtasks)) task.subtasks = [];
                    if (task.priority === undefined || task.priority === null) task.priority = 0;
                });
            });
        }

        function save() {
            try { 
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); 
                updateDocumentTitle(); 
            }
            catch (error) { console.error('Ошибка сохранения:', error); }
        }

        function updateDocumentTitle() {
            const totalActive = data.folders
                .filter(f => f.id !== SMART_FOLDERS.TRASH)
                .reduce((sum, f) => sum + Utils.getFolderStats(f).active, 0);
            document.title = totalActive > 0 ? `(${totalActive}) Мои планы` : 'Мои планы';
        }

        return {
            load, save,
            getFolders() { return data.folders; },
            getNotes() { return data.notes; },
            getClients() { return data.clients; },
            getCurrentFolderId() { return data.currentFolderId; },
            getCustomQuotes() { return {...data.customQuotes}; },
            getCurrentTaskFilter() { return data.currentTaskFilter; },
            getFolderViewMode() { return data.folderViewMode; },
            setCurrentFolderId(id) { data.currentFolderId = id; },
            setCurrentTaskFilter(filter) { 
                if (filter === FILTERS.ACTIVE || filter === FILTERS.COMPLETED) data.currentTaskFilter = filter; 
            },
            setFolderViewMode(mode) { data.folderViewMode = mode; },
            setCustomQuote(side, text) { 
                if (['left','center','right'].includes(side)) data.customQuotes[side] = text; 
            },
            getFolderById(id) { return data.folders.find(f => f.id === id); },
            addFolder(folder) { data.folders.push(folder); },
            removeFolder(id) { data.folders = data.folders.filter(f => f.id !== id); },
            getClientById(id) { return data.clients.find(c => c.id === id); },
            addClient(client) { data.clients.push(client); },
            removeClient(id) { data.clients = data.clients.filter(c => c.id !== id); },
            addNote(note) { data.notes.unshift(note); },
            removeNote(id) { data.notes = data.notes.filter(n => n.id !== id); },
            getNoteById(id) { return data.notes.find(n => n.id === id); }
        };
    })();

    const Services = {
        getTodayTasks() {
            const todayStr = Utils.getTodayISO();
            const tasks = [];
            State.getFolders().forEach(folder => {
                if (folder.id === SMART_FOLDERS.TRASH) return;
                Utils.getValidTasksArray(folder.tasks).forEach(task => {
                    if (!task.completed && task.date === todayStr)
                        tasks.push({...task, folderId: folder.id, folderName: folder.name, folderIcon: folder.icon, type: TASK_TYPES.TASK});
                });
            });
            tasks.sort((a,b) => (b.priority||0)-(a.priority||0) || (a.time&&b.time ? a.time.localeCompare(b.time) : a.time ? -1 : 1));
            return tasks;
        },

        getOverdueTasks() {
            const todayStr = Utils.getTodayISO();
            const overdueTasks = [];
            State.getFolders().forEach(folder => {
                if (folder.id === SMART_FOLDERS.TRASH) return;
                Utils.getValidTasksArray(folder.tasks).forEach(task => {
                    if (!task.completed && task.date && task.date < todayStr)
                        overdueTasks.push({...task, folderId: folder.id, folderName: folder.name, folderIcon: folder.icon, type: TASK_TYPES.TASK});
                });
            });
            overdueTasks.sort((a,b) => a.date.localeCompare(b.date));
            return overdueTasks;
        },

        getTasksForSmartFolder(folderId) {
            if (folderId === SMART_FOLDERS.TODAY) return this.getTodayTasks();
            if (folderId === SMART_FOLDERS.OVERDUE) return this.getOverdueTasks();
            return [];
        },

        processRepeats() {
            let hasChanges = false;
            State.getFolders().forEach(folder => {
                if (folder.id === SMART_FOLDERS.TRASH) return;
                const snapshot = [...folder.tasks];
                snapshot.forEach(task => {
                    if (!task || !task.completed || !task.repeat || !task.date) return;
                    try {
                        const taskDate = Utils.parseDate(task.date);
                        if (!taskDate) return;
                        const nextDate = new Date(taskDate);
                        switch(task.repeat) {
                            case 'daily': nextDate.setDate(nextDate.getDate()+1); break;
                            case 'weekly': nextDate.setDate(nextDate.getDate()+7); break;
                            case 'monthly': nextDate.setMonth(nextDate.getMonth()+1); break;
                            case 'yearly': nextDate.setFullYear(nextDate.getFullYear()+1); break;
                            case 'custom': 
                                if(task.repeatDays > 0) nextDate.setDate(nextDate.getDate()+task.repeatDays); 
                                else return;
                                break;
                            default: return;
                        }
                        if (nextDate <= taskDate) return;
                        const nextDateStr = Utils.formatDateISO(nextDate);
                        if (folder.tasks.some(t => t && t.text === task.text && t.date === nextDateStr && !t.completed)) return;
                        folder.tasks.push({
                            id: Utils.generateId(), text: task.text, date: nextDateStr, time: task.time,
                            completed: false, 
                            subtasks: Utils.getValidTasksArray(task.subtasks).map(st => ({
                                id: Utils.generateId(), text: st.text, completed: false
                            })),
                            repeat: task.repeat, repeatDays: task.repeatDays, priority: task.priority || 0
                        });
                        const orig = folder.tasks.find(t => t && t.id === task.id);
                        if (orig) { orig.repeat = ''; orig.repeatDays = 0; }
                        hasChanges = true;
                    } catch(e) {
                        console.error('Repeat processing error:', e);
                    }
                });
            });
            if (hasChanges) State.save();
        },

        searchTasks(query) {
            if (!query) return [];
            const lowerQuery = query.toLowerCase().trim();
            return Utils.getAllTasksWithFolders().filter(task =>
                task.text.toLowerCase().includes(lowerQuery) ||
                (task.folderName && task.folderName.toLowerCase().includes(lowerQuery))
            );
        },

        getCalendarData(year, month) {
            const firstDay = new Date(year, month, 1);
            let startOffset = firstDay.getDay() || 7;
            startOffset -= 1;
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const todayStr = Utils.getTodayISO();
            const days = [];
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = Utils.formatDateISO(new Date(year, month, day));
                days.push({
                    day, dateStr, 
                    isToday: dateStr === todayStr, 
                    hasTasks: this.checkDateHasTasks(dateStr)
                });
            }
            return { startOffset, days, daysInMonth };
        },

        checkDateHasTasks(dateStr) {
            return State.getFolders().some(f => 
                f.id !== SMART_FOLDERS.TRASH && 
                Utils.getValidTasksArray(f.tasks).some(t => t && t.date === dateStr && !t.completed)
            ) || State.getClients().some(c => c && c.date && c.date.slice(5) === dateStr.slice(5));
        },

        getTasksForDate(dateStr) {
            const tasks = [];
            const seen = new Set();
            State.getFolders().forEach(f => {
                if (f.id === SMART_FOLDERS.TRASH) return;
                Utils.getValidTasksArray(f.tasks).forEach(t => {
                    if (!t || t.date !== dateStr || t.completed) return;
                    const key = `task_${t.id}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        tasks.push({text: t.text, type: TASK_TYPES.TASK, folder: f.name, icon: f.icon});
                    }
                });
            });
            State.getClients().forEach(c => {
                if (!c || !c.date || c.date.slice(5) !== dateStr.slice(5)) return;
                const key = `bd_${c.name.toLowerCase()}_${c.date}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    tasks.push({text: c.name, type: TASK_TYPES.BIRTHDAY});
                }
            });
            return tasks;
        },

        getStats() {
            const allTasks = Utils.getAllTasksWithFolders().filter(t => t.folderId !== SMART_FOLDERS.TRASH);
            const total = allTasks.length;
            const completed = allTasks.filter(t => t.completed).length;
            const percent = total > 0 ? Math.round((completed/total)*100) : 0;
            const folderStats = State.getFolders()
                .filter(f => f.id !== SMART_FOLDERS.TRASH)
                .map(f => {
                    const s = Utils.getFolderStats(f);
                    return {icon: f.icon || DEFAULT_FOLDER_ICON, name: f.name, completed: s.completed, total: s.total};
                });
            return { total, completed, percent, folderStats };
        },

        getUpcomingBirthdays(days = 7) {
            const today = new Date(); today.setHours(0,0,0,0);
            return State.getClients()
                .filter(c => {
                    if (!c || !c.date) return false;
                    const bd = Utils.getNextBirthday(c.date);
                    if (!bd) return false;
                    const diff = Math.ceil((bd - today)/86400000);
                    return diff >= 0 && diff <= days;
                })
                .map(c => {
                    const bd = Utils.getNextBirthday(c.date);
                    return {name: c.name, daysUntil: Math.ceil((bd - today)/86400000)};
                });
        },

        getClientsSorted() {
            const today = new Date(); today.setHours(0,0,0,0);
            return [...State.getClients()]
                .sort((a,b) => {
                    const bdA = Utils.getNextBirthday(a.date);
                    const bdB = Utils.getNextBirthday(b.date);
                    if (!bdA || !bdB) return 0;
                    return bdA - bdB;
                })
                .map(c => {
                    const bd = Utils.getNextBirthday(c.date);
                    if (!bd) return null;
                    return {
                        ...c, 
                        birthday: bd, 
                        age: Utils.getAge(c.date, bd), 
                        daysUntil: Math.ceil((bd - today)/86400000)
                    };
                })
                .filter(c => c !== null);
        },

        getTasksForNotification() {
            const now = new Date();
            const oneHourLater = new Date(now.getTime() + 3600000);
            const tasks = [];
            State.getFolders().forEach(f => {
                if (f.id === SMART_FOLDERS.TRASH) return;
                Utils.getValidTasksArray(f.tasks).forEach(t => {
                    if (!t || t.completed || !t.date || !t.time) return;
                    const dt = new Date(t.date + 'T' + t.time);
                    if (isNaN(dt.getTime())) return;
                    if (dt > now && dt <= oneHourLater) {
                        tasks.push({...t, folderName: f.name});
                    }
                });
            });
            return tasks;
        },

        getWeekData() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            
            const days = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                const dateStr = Utils.formatDateISO(date);
                const count = State.getFolders()
                    .filter(f => f.id !== SMART_FOLDERS.TRASH)
                    .reduce((sum, f) => sum + Utils.getValidTasksArray(f.tasks).filter(t => t && !t.completed && t.date === dateStr).length, 0);
                days.push({
                    date, dateStr, 
                    dayName: DAYS_OF_WEEK[date.getDay()], 
                    dayOfMonth: date.getDate(), 
                    count, 
                    isToday: dateStr === Utils.getTodayISO()
                });
            }
            return days;
        }
    };

    const UI = {
        showToast(message) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), TOAST_DURATION);
        },

        updateQuote() {
            const el = document.getElementById('bgQuote');
            if (!el) return;
            el.style.opacity = '0';
            setTimeout(() => {
                el.textContent = `«${QUOTES[Math.floor(Math.random()*QUOTES.length)]}»`;
                el.style.opacity = '0.7';
            }, 1000);
        },

        renderCustomQuotes() {
            const quotes = State.getCustomQuotes();
            ['left','center','right'].forEach(side => {
                const el = document.getElementById('customQuote' + side.charAt(0).toUpperCase() + side.slice(1));
                if (el) el.textContent = quotes[side] || '💬 Своя цитата ' + (side === 'left' ? 'слева' : side === 'center' ? 'центр' : 'справа');
            });
        },

        renderWeekOverview() {
            const container = document.getElementById('weekOverview');
            if (!container || container.style.display === 'none') return;
            const days = Services.getWeekData();
            container.innerHTML = days.map(d => `
                <div class="week-day ${d.isToday ? 'today' : ''}" data-date="${d.dateStr}" data-action="open-folder-date">
                    <div class="week-day-name">${d.dayName}</div>
                    <div class="week-day-date">${d.dayOfMonth}</div>
                    <div class="week-day-count">${d.count ? '📋 '+d.count : '—'}</div>
                </div>
            `).join('');
        },

        renderFolderList(searchResults = null) {
            const container = document.getElementById('folderList');
            if (!container) return;

            if (searchResults !== null) {
                this.renderSearchResults(container, searchResults);
                return;
            }

            const viewMode = State.getFolderViewMode();
            let html = `<div class="view-toggle">
                <button class="view-toggle-btn ${viewMode==='list'?'active':''}" data-view="list">📋 Список</button>
                <button class="view-toggle-btn ${viewMode==='grid'?'active':''}" data-view="grid">🔲 Сетка</button>
            </div>`;

            const todayTasks = Services.getTodayTasks();
            html += this.buildSmartFolderHTML(SMART_FOLDERS.TODAY, '📅', 'Сегодня', todayTasks.length);

            const overdueTasks = Services.getOverdueTasks();
            if (overdueTasks.length > 0) {
                html += this.buildSmartFolderHTML(SMART_FOLDERS.OVERDUE, '⚠️', 'Просроченные', overdueTasks.length);
            }

            const trash = State.getFolders().find(f => f.id === SMART_FOLDERS.TRASH);
            if (trash && trash.tasks.length > 0) {
                html += this.buildSmartFolderHTML(SMART_FOLDERS.TRASH, '🗑️', 'Корзина', trash.tasks.length);
            }

            const folders = State.getFolders().filter(f => f.id !== SMART_FOLDERS.TRASH);
            if (!folders.length && !todayTasks.length) {
                html += '<p style="text-align:center;padding:20px;opacity:0.6;">📂 Нет папок. Создайте первую!</p>';
            } else if (folders.length) {
                html += `<div class="${viewMode==='grid'?'folder-grid':''}">${folders.map(f => this.buildFolderCardHTML(f)).join('')}</div>`;
            }

            container.innerHTML = html;
            container.querySelectorAll('.view-toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    State.setFolderViewMode(btn.dataset.view);
                    State.save();
                    UI.renderFolderList();
                });
            });
        },

        buildSmartFolderHTML(id, icon, name, taskCount) {
            const colorClass = id === SMART_FOLDERS.OVERDUE ? 'smart-overdue' : 'smart-today';
            return `<div class="folder-card ${colorClass}" data-action="${ACTIONS.OPEN_FOLDER}" data-folder-id="${id}">
                <span class="folder-icon">${icon}</span>
                <div class="folder-info">
                    <div class="folder-name">${name}</div>
                    <div class="folder-stats">
                        <span class="stat-active">📋 ${taskCount} задач</span>
                    </div>
                </div>
            </div>`;
        },

        buildFolderCardHTML(folder) {
            const stats = Utils.getFolderStats(folder);
            const statsHtml = stats.total > 0
                ? `<span class="stat-active">📋 ${stats.active} активных</span> <span class="stat-completed">✅ ${stats.completed} заверш.</span>`
                : '<span>📭 Нет задач</span>';
            return `<div class="folder-card" data-action="${ACTIONS.OPEN_FOLDER}" data-folder-id="${folder.id}"
                ondragover="App.handleDragOver(event)" ondragleave="App.handleDragLeave(event)" ondrop="App.handleDrop(event, '${folder.id}')">
                <span class="folder-icon" data-action="${ACTIONS.CHANGE_ICON}" data-folder-id="${folder.id}">${folder.icon||DEFAULT_FOLDER_ICON}</span>
                <div class="folder-info">
                    <div class="folder-name">${Utils.escapeHtml(folder.name)}</div>
                    <div class="folder-stats">${statsHtml}</div>
                </div>
                <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_FOLDER}" data-folder-id="${folder.id}" style="font-size:11px;padding:4px 8px;">🗑️</button>
            </div>`;
        },

        renderSearchResults(container, tasks) {
            if (!tasks.length) {
                container.innerHTML = '<p style="text-align:center;padding:20px;opacity:0.6;">🔍 Ничего не найдено</p>';
                return;
            }
            container.innerHTML = '<div style="margin-bottom:10px;"><button class="btn-sm" id="btnClearSearch">← Назад к папкам</button></div>' + 
                tasks.map(task => this.buildTaskHTML(task, task.folderId, true)).join('');
            const clearBtn = document.getElementById('btnClearSearch');
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    document.getElementById('searchInput').value = '';
                    document.getElementById('searchStats').style.display = 'none';
                    UI.renderFolderList();
                });
            }
        },

        renderTasks() {
            const taskContainer = document.getElementById('taskContainer');
            const folderList = document.getElementById('folderList');
            if (!taskContainer || !folderList) return;
            const currentFolderId = State.getCurrentFolderId();
            
            if (!currentFolderId) {
                taskContainer.style.display = 'none';
                folderList.style.display = 'block';
                return;
            }

            if (Utils.isSmartFolder(currentFolderId)) {
                this.renderSmartFolderTasks(taskContainer, folderList, currentFolderId);
            } else {
                this.renderRegularFolderTasks(taskContainer, folderList, currentFolderId);
            }
        },

        renderSmartFolderTasks(taskContainer, folderList, folderId) {
            taskContainer.style.display = 'flex';
            folderList.style.display = 'none';
            const folderNameEl = document.getElementById('currentFolderName');
            if (folderNameEl) {
                if (folderId === SMART_FOLDERS.TODAY) folderNameEl.textContent = '📅 Сегодня';
                else if (folderId === SMART_FOLDERS.OVERDUE) folderNameEl.textContent = '⚠️ Просроченные';
                else folderNameEl.textContent = '🗑️ Корзина';
            }
            document.getElementById('taskFilter').style.display = 'none';
            document.getElementById('btnEditFolder').style.display = 'none';
            document.querySelector('.input-row').style.display = 'none';
            
            const tasks = folderId === SMART_FOLDERS.TRASH 
                ? (State.getFolderById(folderId)?.tasks || [])
                : Services.getTasksForSmartFolder(folderId);
            const taskList = document.getElementById('taskList');
            if (!taskList) return;
            taskList.innerHTML = tasks.length 
                ? tasks.map(task => this.buildTaskHTML(task, task.folderId || folderId, true)).join('') 
                : '<div class="no-tasks">🎉 Задач нет!</div>';
        },

        renderRegularFolderTasks(taskContainer, folderList, folderId) {
            document.getElementById('taskFilter').style.display = 'flex';
            document.getElementById('btnEditFolder').style.display = '';
            document.querySelector('.input-row').style.display = 'flex';
            
            const folder = State.getFolderById(folderId);
            if (!folder) {
                taskContainer.style.display = 'none';
                folderList.style.display = 'block';
                return;
            }
            taskContainer.style.display = 'flex';
            folderList.style.display = 'none';
            
            document.getElementById('currentFolderName').textContent = `${folder.icon||DEFAULT_FOLDER_ICON} ${folder.name}`;
            this.updateTaskFilterUI(Utils.getFolderStats(folder));
            
            const taskList = document.getElementById('taskList');
            if (!taskList) return;
            const tasks = Utils.getValidTasksArray(folder.tasks);
            if (!tasks.length) {
                taskList.innerHTML = '<div class="no-tasks">📭 Нет задач в этой папке</div>';
                return;
            }
            
            const filter = State.getCurrentTaskFilter();
            const filtered = filter === FILTERS.ACTIVE 
                ? tasks.filter(t => !t.completed) 
                : tasks.filter(t => t.completed);
            filtered.sort((a,b) => (b.priority||0)-(a.priority||0) || (!a.date&&!b.date?0:!a.date?1:!b.date?-1:a.date.localeCompare(b.date)));
            
            taskList.innerHTML = filtered.length 
                ? filtered.map(task => this.buildTaskHTML(task, folderId, false)).join('')
                : `<div class="no-tasks">${filter===FILTERS.ACTIVE?'🎉 Все задачи выполнены!':'📭 Нет завершенных задач'}</div>`;
        },

        updateTaskFilterUI(stats) {
            document.getElementById('activeCount').textContent = stats.active;
            document.getElementById('completedCount').textContent = stats.completed;
            const filter = State.getCurrentTaskFilter();
            document.querySelectorAll('.task-filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
        },

        buildTaskHTML(task, folderId, showFolderName) {
            const isTrash = folderId === SMART_FOLDERS.TRASH || (task.folderId === SMART_FOLDERS.TRASH);
            let html = `<div class="task-item ${task.completed?'completed':''}" draggable="true"
                data-task-id="${task.id}" data-folder-id="${folderId}"
                ondragstart="App.handleDragStart(event)" ondragend="App.handleDragEnd(event)">
                <div class="task-checkbox" data-action="${ACTIONS.TOGGLE_TASK}" data-task-id="${task.id}">${task.completed?'✓':''}</div>
                <div style="flex:1;min-width:100px;">
                    <span class="task-text">${Utils.escapeHtml(task.text)}</span>`;
            
            if (showFolderName && task.folderName) {
                html += `<div style="font-size:10px;color:var(--text-secondary);">📁 ${Utils.escapeHtml(task.folderName)}</div>`;
            }
            
            html += this.buildSubtasksHTML(task) + `</div>`;
            
            for (let i = 1; i <= MAX_PRIORITY; i++) {
                html += `<button class="star-btn ${task.priority>=i?'active':''}" data-action="${ACTIONS.SET_PRIORITY}" data-task-id="${task.id}" data-priority="${i}">⭐</button>`;
            }
            
            html += this.buildTaskBadgesHTML(task);
            
            if (isTrash) {
                html += `<button class="btn-sm btn-add" data-action="${ACTIONS.RESTORE_TASK}" data-task-id="${task.id}">↩️</button>
                    <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_FOREVER}" data-task-id="${task.id}">💥</button>`;
            } else {
                html += `<button class="btn-sm btn-add" data-action="${ACTIONS.DUPLICATE_TASK}" data-task-id="${task.id}">📋</button>
                    <button class="btn-sm btn-add" data-action="${ACTIONS.MOVE_TO_TOMORROW}" data-task-id="${task.id}">📅</button>
                    <button class="btn-sm btn-add" data-action="${ACTIONS.ADD_SUBTASK}" data-task-id="${task.id}">➕</button>
                    <button class="btn-sm btn-add" data-action="${ACTIONS.EDIT_TASK}" data-task-id="${task.id}">✏️</button>
                    <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_TASK}" data-task-id="${task.id}">✕</button>`;
            }
            html += '</div>';
            return html;
        },

        buildSubtasksHTML(task) {
            if (!Array.isArray(task.subtasks) || !task.subtasks.length) return '';
            let html = '<ul class="subtask-list">';
            task.subtasks.forEach(subtask => {
                if (!subtask) return;
                html += `<li class="subtask-item ${subtask.completed?'completed':''}">
                    <div class="subtask-checkbox" data-action="${ACTIONS.TOGGLE_SUBTASK}" data-task-id="${task.id}" data-subtask-id="${subtask.id}">${subtask.completed?'✓':''}</div>
                    <span class="subtask-text">${Utils.escapeHtml(subtask.text)}</span>
                    <div class="subtask-actions">
                        <button class="btn-xs" data-action="${ACTIONS.EDIT_SUBTASK}" data-task-id="${task.id}" data-subtask-id="${subtask.id}">✏️</button>
                        <button class="btn-xs" data-action="${ACTIONS.DELETE_SUBTASK}" data-task-id="${task.id}" data-subtask-id="${subtask.id}">✕</button>
                    </div></li>`;
            });
            return html + '</ul>';
        },

        buildTaskBadgesHTML(task) {
            let html = '';
            if (task.repeat) {
                const text = task.repeat === 'custom' ? `${task.repeatDays||'?'}д` : (REPEAT_ABBREVIATIONS[task.repeat]||task.repeat);
                html += `<span class="repeat-badge">🔁 ${text}</span>`;
            }
            if (task.time) html += `<span>🕐 ${task.time}</span>`;
            if (task.date) {
                let dateToCheck = task.date;
                if (task.type === TASK_TYPES.BIRTHDAY) {
                    const nb = Utils.getNextBirthday(task.date);
                    if (nb) dateToCheck = Utils.formatDateISO(nb);
                }
                const daysInfo = Utils.getDaysText(dateToCheck);
                html += daysInfo 
                    ? `<span class="days-badge ${daysInfo.className}">${daysInfo.text}</span>` 
                    : `<span>📅 ${Utils.formatDate(task.date)}</span>`;
            }
            return html;
        },

        renderNotes() {
            const container = document.getElementById('notesList');
            if (!container) return;
            const notes = State.getNotes();
            container.innerHTML = notes.length 
                ? notes.filter(n => n).map(n => `
                    <div class="note-card">
                        <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                            <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_NOTE}" data-note-id="${n.id}">✕</button>
                        </div>
                        <textarea class="note-textarea" data-note-id="${n.id}">${Utils.escapeHtml(n.text||'')}</textarea>
                    </div>
                `).join('') 
                : '<p style="text-align:center;padding:20px;">💡 Нет заметок</p>';
        },

        renderCalendar(year, month, selectedDate) {
            document.getElementById('calendarTitle').textContent = new Date(year, month).toLocaleDateString('ru-RU', {month:'long',year:'numeric'});
            const grid = document.getElementById('calendarGrid');
            if (!grid) return;
            const {startOffset, days} = Services.getCalendarData(year, month);
            grid.innerHTML = '';
            
            ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => {
                const div = document.createElement('div');
                div.style.cssText = 'font-size:10px;font-weight:700;';
                div.textContent = d;
                grid.appendChild(div);
            });
            
            for (let i = 0; i < startOffset; i++) {
                grid.appendChild(document.createElement('div'));
            }
            
            days.forEach(({day, dateStr, isToday, hasTasks}) => {
                const div = document.createElement('div');
                div.className = 'calendar-day';
                if (isToday) div.classList.add('today');
                if (hasTasks) div.classList.add('has-tasks');
                if (dateStr === selectedDate) div.classList.add('selected');
                div.textContent = day;
                div.dataset.action = ACTIONS.SELECT_DATE;
                div.dataset.date = dateStr;
                grid.appendChild(div);
            });
            
            this.renderCalendarTasks(selectedDate);
        },

        renderCalendarTasks(selectedDate) {
            const container = document.getElementById('calendarTasks');
            if (!container) return;
            if (!selectedDate) { container.innerHTML = ''; return; }
            const tasks = Services.getTasksForDate(selectedDate);
            container.innerHTML = tasks.length 
                ? `<strong>📅 ${Utils.formatDate(selectedDate)}</strong><br>` + tasks.map(t => 
                    t.type === TASK_TYPES.BIRTHDAY 
                        ? `<div class="task-item">🎂 ${Utils.escapeHtml(t.text)}</div>` 
                        : `<div class="task-item"><span>${t.icon||'📌'}</span> <span>${Utils.escapeHtml(t.text)}</span></div>`
                ).join('') 
                : '<p style="text-align:center;padding:10px;">Нет задач 🎉</p>';
        },

        renderAI() {
            const container = document.getElementById('aiContent');
            if (!container) return;
            const upcoming = Services.getUpcomingBirthdays();
            container.innerHTML = upcoming.length 
                ? `<strong>🎂 Ближайшие ДР:</strong><br>${upcoming.map(c => `• ${Utils.escapeHtml(c.name)} — через ${c.daysUntil} дн.`).join('<br>')}` 
                : '<p>Всё под контролем! 🎉</p>';
        },

        renderClients() {
            const container = document.getElementById('clientList');
            if (!container) return;
            const clients = State.getClients();
            if (!clients.length) {
                container.innerHTML = '<p>👥 Нет клиентов</p>';
                document.getElementById('clientStats').textContent = '';
                return;
            }
            const sorted = Services.getClientsSorted();
            container.innerHTML = sorted.map(c => {
                const dateStr = `${c.birthday.getDate()} ${MONTHS_RU[c.birthday.getMonth()]} ${c.birthday.getFullYear()}`;
                const status = c.daysUntil === 0 ? '🎂 Сегодня!' : c.daysUntil === 1 ? '🎂 Завтра!' : `📅 ${dateStr} (через ${c.daysUntil} дн.)`;
                return `<div class="client-card">
                    <div style="display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap;">
                        <span><strong>${Utils.escapeHtml(c.name)}</strong> — ${Utils.formatDate(c.date)} (${c.age} ${Utils.getAgeWord(c.age)})</span>
                        <div>
                            <button class="btn-sm btn-add" data-action="${ACTIONS.EDIT_CLIENT}" data-client-id="${c.id}">✏️</button>
                            <button class="btn-sm btn-email" data-action="${ACTIONS.EMAIL_CLIENT}" data-client-id="${c.id}">📧</button>
                            <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_CLIENT}" data-client-id="${c.id}">✕</button>
                        </div>
                    </div>
                    ${c.phone ? `<span>📱 ${Utils.escapeHtml(c.phone)}</span>` : ''}
                    <span style="font-size:12px;color:var(--accent);">${status}</span>
                </div>`;
            }).join('');
            document.getElementById('clientStats').textContent = `Всего: ${clients.length}`;
        },

        renderStats() {
            const stats = Services.getStats();
            document.getElementById('statTotal').textContent = stats.total;
            document.getElementById('statCompleted').textContent = stats.completed;
            document.getElementById('statPercent').textContent = stats.percent + '%';
            document.getElementById('progressFill').style.width = stats.percent + '%';
            if (stats.folderStats.length) {
                document.getElementById('statsDetails').innerHTML = '<strong>По папкам:</strong><br>' + 
                    stats.folderStats.map(fs => `${fs.icon} ${Utils.escapeHtml(fs.name)}: ${fs.completed}/${fs.total}`).join('<br>');
            }
        },

        renderAll(calendarState = null) {
            this.renderCustomQuotes();
            this.renderWeekOverview();
            this.renderFolderList();
            this.renderTasks();
            this.renderNotes();
            this.renderAI();
            this.renderClients();
            if (calendarState) {
                this.renderCalendar(calendarState.year, calendarState.month, calendarState.selectedDate);
            }
            if (document.getElementById('section-stats').classList.contains('active')) {
                this.renderStats();
            }
        }
    };

    const Actions = {
        openFolder(folderId) {
            State.setCurrentFolderId(folderId);
            State.setCurrentTaskFilter(FILTERS.ACTIVE);
            document.getElementById('searchContainer').style.display = 'none';
            State.save();
            UI.renderAll();
        },

        openFolderDate(dateStr) {
            const todayFolder = State.getFolders().find(f => f.id === SMART_FOLDERS.TODAY);
            if (!todayFolder) {
                State.addFolder({
                    id: SMART_FOLDERS.TODAY,
                    name: 'Сегодня',
                    icon: '📅',
                    tasks: []
                });
            }
            this.openFolder(SMART_FOLDERS.TODAY);
        },

        toggleTask(taskId) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            result.task.completed = !result.task.completed;
            Services.processRepeats();
            State.save();
            UI.renderAll();
            UI.showToast(result.task.completed ? '✅ Выполнена' : '🔄 Восстановлена');
        },

        addTask() {
            const text = document.getElementById('taskInput')?.value.trim();
            if (!text) return;
            const currentFolder = State.getFolderById(State.getCurrentFolderId());
            if (!currentFolder) {
                UI.showToast('Сначала создайте папку');
                return;
            }
            const date = document.getElementById('taskDate')?.value || '';
            const time = document.getElementById('taskTime')?.value || '';
            const repeat = document.getElementById('taskRepeat')?.value || '';
            const repeatDays = repeat === 'custom' ? parseInt(document.getElementById('taskRepeatDays')?.value || '0') : 0;
            
            currentFolder.tasks.push({
                id: Utils.generateId(),
                text,
                date,
                time,
                completed: false,
                subtasks: [],
                repeat,
                repeatDays,
                priority: 0
            });
            
            document.getElementById('taskInput').value = '';
            document.getElementById('taskDate').value = '';
            document.getElementById('taskTime').value = '09:00';
            document.getElementById('taskRepeat').value = '';
            document.getElementById('taskRepeatDays').style.display = 'none';
            
            State.save();
            UI.renderAll();
        },

        editTask(taskId) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            const newText = prompt('Редактировать задачу:', result.task.text);
            if (newText !== null && newText.trim()) {
                result.task.text = newText.trim();
                State.save();
                UI.renderAll();
            }
        },

        deleteTask(taskId) {
            if (!confirm('Переместить задачу в корзину?')) return;
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            const { task, folder } = result;
            if (folder.id === SMART_FOLDERS.TRASH) {
                UI.showToast('❌ Задача уже в корзине');
                return;
            }
            folder.tasks = folder.tasks.filter(t => t.id !== taskId);
            let trash = State.getFolders().find(f => f.id === SMART_FOLDERS.TRASH);
            if (!trash) {
                trash = { id: SMART_FOLDERS.TRASH, name: '🗑️ Корзина', icon: '🗑️', tasks: [] };
                State.getFolders().push(trash);
            }
            trash.tasks.push(task);
            State.save();
            UI.renderAll();
            UI.showToast('🗑️ В корзине');
        },

        deleteForever(taskId) {
            if (!confirm('Удалить задачу безвозвратно?')) return;
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            result.folder.tasks = result.folder.tasks.filter(t => t.id !== taskId);
            State.save();
            UI.renderAll();
            UI.showToast('💥 Удалена навсегда');
        },

        restoreTask(taskId) {
            const trash = State.getFolders().find(f => f.id === SMART_FOLDERS.TRASH);
            if (!trash) return;
            const taskIndex = trash.tasks.findIndex(t => t && t.id === taskId);
            if (taskIndex === -1) return;
            const task = trash.tasks.splice(taskIndex, 1)[0];
            const firstFolder = State.getFolders().find(f => f.id !== SMART_FOLDERS.TRASH);
            if (firstFolder) {
                firstFolder.tasks.push(task);
            } else {
                UI.showToast('❌ Создайте папку сначала');
                return;
            }
            State.save();
            UI.renderAll();
            UI.showToast('↩️ Восстановлена');
        },

        duplicateTask(taskId) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            const newTask = {
                ...result.task,
                id: Utils.generateId(),
                completed: false,
                subtasks: (result.task.subtasks || []).map(s => ({...s, id: Utils.generateId(), completed: false}))
            };
            result.folder.tasks.push(newTask);
            State.save();
            UI.renderAll();
            UI.showToast('📋 Дублирована');
        },

        moveToTomorrow(taskId) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            result.task.date = Utils.formatDateISO(tomorrow);
            State.save();
            UI.renderAll();
            UI.showToast('📅 На завтра');
        },

        setPriority(taskId, priority) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            result.task.priority = result.task.priority === priority ? priority - 1 : priority;
            State.save();
            UI.renderTasks();
        },

        addSubtask(taskId) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            const text = prompt('Подзадача:');
            if (!text) return;
            if (!Array.isArray(result.task.subtasks)) result.task.subtasks = [];
            result.task.subtasks.push({id: Utils.generateId(), text: text.trim(), completed: false});
            State.save();
            UI.renderAll();
        },

        toggleSubtask(taskId, subtaskId) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            const st = result.task.subtasks?.find(s => s.id === subtaskId);
            if (!st) return;
            st.completed = !st.completed;
            State.save();
            UI.renderAll();
        },

        editSubtask(taskId, subtaskId) {
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            const st = result.task.subtasks?.find(s => s.id === subtaskId);
            if (!st) return;
            const text = prompt('Текст:', st.text);
            if (!text) return;
            st.text = text.trim();
            State.save();
            UI.renderAll();
        },

        deleteSubtask(taskId, subtaskId) {
            if (!confirm('Удалить?')) return;
            const result = Utils.findTaskById(taskId);
            if (!result) return;
            result.task.subtasks = result.task.subtasks.filter(s => s.id !== subtaskId);
            State.save();
            UI.renderAll();
        },

        addFolder() {
            const name = prompt('Название папки:');
            if (!name) return;
            State.addFolder({id: Utils.generateId(), name: name.trim(), icon: DEFAULT_FOLDER_ICON, tasks: []});
            State.save();
            UI.renderAll();
            UI.showToast('📁 Папка создана');
        },

        editFolder() {
            const folder = State.getFolderById(State.getCurrentFolderId());
            if (!folder) return;
            const name = prompt('Название:', folder.name);
            if (name !== null && name.trim()) {
                folder.name = name.trim();
            }
            const icon = prompt('Эмодзи (или Enter):', folder.icon);
            if (icon && icon.trim()) {
                folder.icon = icon.trim();
            }
            State.save();
            UI.renderAll();
            UI.showToast('✏️ Папка обновлена');
        },

        changeFolderIcon(folderId) {
            const folder = State.getFolderById(folderId);
            if (!folder) return;
            const iconIndex = parseInt(prompt(`Выберите иконку (0-${FOLDER_ICONS.length-1}):\n${FOLDER_ICONS.join(' ')}`, FOLDER_ICONS.indexOf(folder.icon)));
            if (!isNaN(iconIndex) && FOLDER_ICONS[iconIndex]) {
                folder.icon = FOLDER_ICONS[iconIndex];
            } else {
                const customIcon = prompt('Или введите свой эмодзи:');
                if (customIcon && customIcon.trim()) folder.icon = customIcon.trim();
            }
            State.save();
            UI.renderAll();
        },

        setTaskFilter(filter) {
            State.setCurrentTaskFilter(filter);
            State.save();
            UI.renderTasks();
        },

        addClient() {
            const name = document.getElementById('clientName')?.value.trim();
            const phone = document.getElementById('clientPhone')?.value.trim();
            const date = document.getElementById('clientDate')?.value;
            if (!name || !date) {
                UI.showToast('Заполните имя и дату');
                return;
            }
            State.addClient({id: Utils.generateId(), name, phone, date});
            document.getElementById('clientName').value = '';
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientDate').value = '';
            State.save();
            UI.renderAll();
            UI.showToast('👤 Клиент добавлен');
        },

        editClient(clientId) {
            const client = State.getClientById(clientId);
            if (!client) return;
            const name = prompt('Имя:', client.name);
            if (name !== null) client.name = name.trim();
            const phone = prompt('Телефон:', client.phone || '');
            if (phone !== null) client.phone = phone.trim();
            const date = prompt('Дата (ГГГГ-ММ-ДД):', client.date);
            if (date !== null) client.date = date.trim();
            State.save();
            UI.renderAll();
            UI.showToast('✏️ Клиент обновлён');
        },

        deleteClient(clientId) {
            if (!confirm('Удалить клиента?')) return;
            State.removeClient(clientId);
            State.save();
            UI.renderAll();
            UI.showToast('🗑️ Клиент удалён');
        },

        emailClient(clientId) {
            const client = State.getClientById(clientId);
            if (!client) return;
            UI.showToast('📧 Функция отправки email для: ' + client.name);
        },

        addNote() {
            const text = document.getElementById('noteText')?.value.trim();
            if (!text) return;
            State.addNote({id: Utils.generateId(), text, updatedAt: Date.now()});
            document.getElementById('noteText').value = '';
            State.save();
            UI.renderAll();
        },

        deleteNote(noteId) {
            if (confirm('Удалить заметку?')) {
                State.removeNote(noteId);
                State.save();
                UI.renderNotes();
            }
        },

        deleteFolder(folderId) {
            if (!confirm('Удалить папку и все задачи?')) return;
            State.removeFolder(folderId);
            if (State.getCurrentFolderId() === folderId) State.setCurrentFolderId(null);
            State.save();
            UI.renderAll();
        },

        editCustomQuote(side) {
            const text = prompt('Цитата:', State.getCustomQuotes()[side] || '');
            if (text !== null) {
                State.setCustomQuote(side, text.trim());
                State.save();
                UI.renderCustomQuotes();
            }
        },

        toggleSearch() {
            const sc = document.getElementById('searchContainer');
