    <div class="toast" id="toast"></div>

    <script>
    (function() {
        'use strict';

        // ========================================
        // 1. КОНСТАНТЫ
        // ========================================
        const STORAGE_KEY = 'my_plans_v15';
        const TOAST_DURATION = 2500;
        
        const FILTERS = Object.freeze({
            ACTIVE: 'active',
            COMPLETED: 'completed'
        });
        const SMART_FOLDERS = Object.freeze({
            TODAY: 'smart-today',
            OVERDUE: 'smart-overdue',
            TRASH: 'smart-trash'
        });
        
        const ACTIONS = Object.freeze({
            OPEN_FOLDER: 'open-folder',
            CHANGE_ICON: 'change-icon',
            TOGGLE_TASK: 'toggle-task',
            EDIT_TASK: 'edit-task',
            DELETE_TASK: 'delete-task',
            ADD_SUBTASK: 'add-subtask',
            EDIT_SUBTASK: 'edit-subtask',
            DELETE_SUBTASK: 'delete-subtask',
            TOGGLE_SUBTASK: 'toggle-subtask',
            SET_PRIORITY: 'set-priority',
            EDIT_CLIENT: 'edit-client',
            EMAIL_CLIENT: 'email-client',
            DELETE_CLIENT: 'delete-client',
            SELECT_DATE: 'select-date',
            EDIT_CUSTOM_QUOTE: 'edit-custom-quote',
            DELETE_NOTE: 'delete-note',
            DELETE_FOLDER: 'delete-folder'
        });
        
        const REPEAT_LABELS = Object.freeze({
            '': 'Без повтора',
            'daily': 'Ежедневно',
            'weekly': 'Еженедельно',
            'monthly': 'Ежемесячно',
            'yearly': 'Ежегодно',
            'custom': 'Свой период'
        });
        
        const REPEAT_ABBREVIATIONS = Object.freeze({
            'daily': 'день',
            'weekly': 'нед',
            'monthly': 'мес',
            'yearly': 'год'
        });
        
        const FOLDER_ICONS = ['📁','🏠','💼','👨‍👩‍👧‍👦','📚','🏃','✈️','🎯','❤️','🛒','🎵','💻','🎨','🌟','🗂','📝','🎂','💪','🏡','📅','💰','📞','🎉','🔥'];
        const DEFAULT_FOLDER_ICON = '📁';
        const MAX_PRIORITY = 3;
        const DEFAULT_TIME = '09:00';
        
        const QUOTES = Object.freeze([
            'Через год, когда посмотришь в зеркало, ты будешь благодарен себе за то, что начал.',
            'Маленький шаг сегодня — большой результат завтра.',
            'И в этом, возможно, и есть ответ: смысл в том, чтобы не спать, даже когда спят все вокруг.',
            'Я не убил своего демона. Я научил его терпению. Он ждет в запертой клетке.',
            'Ты не умеешь праздновать победы, потому что для тебя это не успех, а обязательство.',
            'Освободи своего демона!',
            'Не жди идеального момента. Сделай момент идеальным.',
            'То, что ты делаешь сегодня, определяет твоё завтра.'
        ]);
        
        const TASK_TYPES = Object.freeze({
            TASK: 'task',
            BIRTHDAY: 'birthday'
        });

        // ========================================
        // 2. УТИЛИТЫ (Чистые функции)
        // ========================================
        const Utils = Object.freeze({
            generateId() {
                return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
            },

            escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = String(str);
                return div.innerHTML;
            },

            formatDate(dateStr) {
                if (!dateStr) return '';
                const parts = dateStr.split('-');
                return parts.length === 3 ? `${parts[2]}.${parts[1]}.${parts[0]}` : dateStr;
            },

            formatDateISO(date) {
                if (!(date instanceof Date) || isNaN(date.getTime())) return '';
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            },

            parseDate(dateStr) {
                if (!dateStr) return null;
                const date = new Date(dateStr);
                date.setHours(0, 0, 0, 0);
                return isNaN(date.getTime()) ? null : date;
            },

            getTodayISO() {
                return this.formatDateISO(new Date());
            },

            getDaysUntil(dateStr) {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const targetDate = this.parseDate(dateStr);
                if (!targetDate) return null;
                return Math.ceil((targetDate - today) / 86400000);
            },

            getDaysText(dateStr) {
                const diffDays = this.getDaysUntil(dateStr);
                if (diffDays === null) return null;
                
                if (diffDays < 0) {
                    return { text: `⏳ ${Math.abs(diffDays)} дн назад`, className: 'overdue' };
                }
                if (diffDays === 0) {
                    return { text: '⏳ Сегодня', className: 'today' };
                }
                if (diffDays === 1) {
                    return { text: '⏳ Завтра', className: 'upcoming' };
                }
                return { text: `⏳ через ${diffDays} дн`, className: 'upcoming' };
            },

            getNextBirthday(dateStr) {
                const parts = dateStr.split('-').map(Number);
                if (parts.length !== 3) return null;
                
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                let birthday = new Date(now.getFullYear(), parts[1] - 1, parts[2]);
                
                if (birthday < today) {
                    birthday.setFullYear(now.getFullYear() + 1);
                }
                return birthday;
            },

            getAge(birthDateStr, onDate) {
                const parts = birthDateStr.split('-').map(Number);
                if (parts.length !== 3) return 0;
                
                let age = onDate.getFullYear() - parts[0];
                const birthDateThisYear = new Date(onDate.getFullYear(), parts[1] - 1, parts[2]);
                if (onDate < birthDateThisYear) age--;
                
                return Math.max(0, age);
            },

            getAgeWord(age) {
                if (typeof age !== 'number' || age < 0) return 'лет';
                const lastDigit = age % 10;
                const lastTwoDigits = age % 100;
                
                if (lastDigit === 1 && lastTwoDigits !== 11) return 'год';
                if ([2, 3, 4].includes(lastDigit) && ![12, 13, 14].includes(lastTwoDigits)) return 'года';
                return 'лет';
            },

            getFolderStats(folder) {
                if (!folder || !Array.isArray(folder.tasks)) {
                    return { active: 0, completed: 0, total: 0 };
                }
                const active = folder.tasks.filter(t => t && !t.completed).length;
                const completed = folder.tasks.filter(t => t && t.completed).length;
                return { active, completed, total: folder.tasks.length };
            },

            getAllTasksWithFolders() {
                const allTasks = [];
                State.getFolders().forEach(folder => {
                    if (Array.isArray(folder.tasks)) {
                        folder.tasks.forEach(task => {
                            if (task) {
                                allTasks.push({
                                    ...task,
                                    folderId: folder.id,
                                    folderName: folder.name,
                                    folderIcon: folder.icon || DEFAULT_FOLDER_ICON
                                });
                            }
                        });
                    }
                });
                return allTasks;
            },

            findTaskById(taskId) {
                const folders = State.getFolders();
                for (const folder of folders) {
                    if (Array.isArray(folder.tasks)) {
                        const task = folder.tasks.find(t => t && t.id === taskId);
                        if (task) return { task, folder };
                    }
                }
                return null;
            },

            isSmartFolder(folderId) {
                return folderId === SMART_FOLDERS.TODAY || folderId === SMART_FOLDERS.OVERDUE;
            },

            getValidTasksArray(tasks) {
                return Array.isArray(tasks) ? tasks.filter(t => t !== null && t !== undefined) : [];
            }
        });

        // ========================================
        // 3. СОСТОЯНИЕ (State Management)
        // ========================================
        const State = (() => {
            let data = {
                folders: [],
                notes: [],
                clients: [],
                currentFolderId: null,
                customQuotes: { left: '', center: '', right: '' },
                currentTaskFilter: FILTERS.ACTIVE
            };

            function load() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed && typeof parsed === 'object') {
                            data = parsed;
                        }
                    }
                } catch (error) {
                    console.error('Ошибка загрузки данных:', error);
                }

                // Нормализация данных
                data.folders = Array.isArray(data.folders) ? data.folders : [];
                data.notes = Array.isArray(data.notes) ? data.notes : [];
                data.clients = Array.isArray(data.clients) ? data.clients : [];
                data.customQuotes = data.customQuotes || { left: '', center: '', right: '' };
                data.currentTaskFilter = data.currentTaskFilter === FILTERS.COMPLETED ? FILTERS.COMPLETED : FILTERS.ACTIVE;
                data.currentFolderId = data.currentFolderId || null;

                // Нормализация папок и задач
                data.folders.forEach(folder => {
                    if (!folder.icon) folder.icon = DEFAULT_FOLDER_ICON;
                    folder.tasks = Utils.getValidTasksArray(folder.tasks);
                    folder.tasks.forEach(task => {
                        if (!Array.isArray(task.subtasks)) task.subtasks = [];
                        if (task.priority === undefined || task.priority === null) task.priority = 0;
                    });
                });

                // Валидация текущей папки
                if (!data.currentFolderId && data.folders.length > 0) {
                    data.currentFolderId = data.folders[0].id;
                } else if (data.currentFolderId && 
                          !Utils.isSmartFolder(data.currentFolderId) && 
                          !data.folders.some(f => f.id === data.currentFolderId)) {
                    data.currentFolderId = data.folders.length > 0 ? data.folders[0].id : null;
                }
            }

            function save() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    updateDocumentTitle();
                } catch (error) {
                    console.error('Ошибка сохранения данных:', error);
                }
            }

            function updateDocumentTitle() {
                const totalActive = data.folders.reduce((sum, folder) => {
                    return sum + Utils.getFolderStats(folder).active;
                }, 0);
                const todayStr = Utils.getTodayISO();
                const birthdaysToday = data.clients.filter(c => c && c.date && c.date.slice(5) === todayStr.slice(5)).length;
                const total = totalActive + birthdaysToday;
                document.title = total > 0 ? `(${total}) Мои планы` : 'Мои планы';
            }

            return {
                load,
                save,
                
                getFolders: () => data.folders,
                getNotes: () => data.notes,
                getClients: () => data.clients,
                getCurrentFolderId: () => data.currentFolderId,
                getCustomQuotes: () => ({ ...data.customQuotes }),
                getCurrentTaskFilter: () => data.currentTaskFilter,
                
                setCurrentFolderId: (id) => { data.currentFolderId = id; },
                setCurrentTaskFilter: (filter) => { 
                    if (filter === FILTERS.ACTIVE || filter === FILTERS.COMPLETED) {
                        data.currentTaskFilter = filter;
                    }
                },
                setCustomQuote: (side, text) => {
                    if (['left', 'center', 'right'].includes(side)) {
                        data.customQuotes[side] = text;
                    }
                },
                
                getFolderById: (id) => data.folders.find(f => f.id === id),
                addFolder: (folder) => { data.folders.push(folder); },
                removeFolder: (id) => {
                    data.folders = data.folders.filter(f => f.id !== id);
                },
                
                getClientById: (id) => data.clients.find(c => c.id === id),
                addClient: (client) => { data.clients.push(client); },
                removeClient: (id) => {
                    data.clients = data.clients.filter(c => c.id !== id);
                },
                
                addNote: (note) => { data.notes.unshift(note); },
                removeNote: (id) => {
                    data.notes = data.notes.filter(n => n.id !== id);
                },
                getNoteById: (id) => data.notes.find(n => n.id === id)
            };
        })();

        // ========================================
        // 4. БИЗНЕС-ЛОГИКА (Services)
        // ========================================
        const Services = (() => {
            function getTodayTasks() {
                const todayStr = Utils.getTodayISO();
                const tasks = [];

                State.getFolders().forEach(folder => {
                    Utils.getValidTasksArray(folder.tasks).forEach(task => {
                        if (!task.completed && task.date === todayStr) {
                            tasks.push({
                                ...task,
                                folderId: folder.id,
                                folderName: folder.name,
                                folderIcon: folder.icon,
                                type: TASK_TYPES.TASK
                            });
                        }
                    });
                });

                // Дни рождения показываются только в разделе Клиенты

                // Сортировка: приоритет, затем время
                tasks.sort((a, b) => {
                    const priorityDiff = (b.priority || 0) - (a.priority || 0);
                    if (priorityDiff !== 0) return priorityDiff;
                    if (a.time && b.time) return a.time.localeCompare(b.time);
                    return a.time ? -1 : b.time ? 1 : 0;
                });

                return tasks;
            }

            function getOverdueTasks() {
                const todayStr = Utils.getTodayISO();
                const overdueTasks = [];

                State.getFolders().forEach(folder => {
                    Utils.getValidTasksArray(folder.tasks).forEach(task => {
                        if (!task.completed && task.date && task.date < todayStr) {
                            overdueTasks.push({
                                ...task,
                                folderId: folder.id,
                                folderName: folder.name,
                                folderIcon: folder.icon,
                                type: TASK_TYPES.TASK
                            });
                        }
                    });
                });

                overdueTasks.sort((a, b) => a.date.localeCompare(b.date));
                return overdueTasks;
            }

            function getTasksForSmartFolder(folderId) {
                if (folderId === SMART_FOLDERS.TODAY) return getTodayTasks();
                if (folderId === SMART_FOLDERS.OVERDUE) return getOverdueTasks();
                return [];
            }

            function processRepeats() {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                let hasChanges = false;

                State.getFolders().forEach(folder => {
                    const tasksSnapshot = [...folder.tasks];
                    tasksSnapshot.forEach(task => {
                        if (!task || !task.completed || !task.repeat || !task.date) return;
                        
                        try {
                            const nextDate = calculateNextRepeatDate(task);
                            if (!nextDate) return;
                            
                            const nextDateStr = Utils.formatDateISO(nextDate);
                            if (!nextDateStr) return;
                            
                            const duplicateExists = folder.tasks.some(t => 
                                t && t.text === task.text && t.date === nextDateStr && !t.completed
                            );
                            if (duplicateExists) return;
                            
                            folder.tasks.push(createRepeatedTask(task, nextDateStr));
                            
                            // Очищаем повтор у исходной задачи
                            const originalTask = folder.tasks.find(t => t && t.id === task.id);
                            if (originalTask) {
                                originalTask.repeat = '';
                                originalTask.repeatDays = 0;
                            }
                            hasChanges = true;
                        } catch (error) {
                            console.error('Repeat error:', task.id, error);
                        }
                    });
                });

                if (hasChanges) State.save();
            }

            function calculateNextRepeatDate(task) {
                const taskDate = Utils.parseDate(task.date);
                if (!taskDate) return null;
                
                const nextDate = new Date(taskDate);
                
                switch (task.repeat) {
                    case 'daily': nextDate.setDate(nextDate.getDate() + 1); break;
                    case 'weekly': nextDate.setDate(nextDate.getDate() + 7); break;
                    case 'monthly': nextDate.setMonth(nextDate.getMonth() + 1); break;
                    case 'yearly': nextDate.setFullYear(nextDate.getFullYear() + 1); break;
                    case 'custom': 
                        if (task.repeatDays && task.repeatDays > 0) {
                            nextDate.setDate(nextDate.getDate() + task.repeatDays);
                        } else return null;
                        break;
                    default: return null;
                }
                
                return nextDate <= taskDate ? null : nextDate;
            }

            function createRepeatedTask(originalTask, nextDateStr) {
                return {
                    id: Utils.generateId(),
                    text: originalTask.text,
                    date: nextDateStr,
                    time: originalTask.time,
                    completed: false,
                    subtasks: Utils.getValidTasksArray(originalTask.subtasks).map(st => ({
                        id: Utils.generateId(),
                        text: st.text,
                        completed: false
                    })),
                    repeat: originalTask.repeat,
                    repeatDays: originalTask.repeatDays,
                    priority: originalTask.priority || 0
                };
            }

            function searchTasks(query) {
                if (!query) return [];
                const lowerQuery = query.toLowerCase().trim();
                const allTasks = Utils.getAllTasksWithFolders();
                
                return allTasks.filter(task =>
                    task.text.toLowerCase().includes(lowerQuery) ||
                    (task.folderName && task.folderName.toLowerCase().includes(lowerQuery))
                );
            }

            function getCalendarData(year, month) {
                const firstDay = new Date(year, month, 1);
                let startOffset = firstDay.getDay() || 7;
                startOffset -= 1;
                
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const todayStr = Utils.getTodayISO();
                const days = [];
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = Utils.formatDateISO(new Date(year, month, day));
                    days.push({
                        day,
                        dateStr,
                        isToday: dateStr === todayStr,
                        hasTasks: checkDateHasTasks(dateStr)
                    });
                }
                
                return { startOffset, days, daysInMonth };
            }

            function checkDateHasTasks(dateStr) {
                // Проверяем в папках
                const hasTaskInFolders = State.getFolders().some(folder =>
                    Utils.getValidTasksArray(folder.tasks).some(task =>
                        task && task.date === dateStr && !task.completed
                    )
                );
                
                // Проверяем дни рождения
                const hasBirthday = State.getClients().some(client =>
                    client && client.date && client.date.slice(5) === dateStr.slice(5)
                );
                
                return hasTaskInFolders || hasBirthday;
            }

            function getTasksForDate(dateStr) {
                const tasks = [];
                const seen = new Set();

                State.getFolders().forEach(folder => {
                    Utils.getValidTasksArray(folder.tasks).forEach(task => {
                        if (!task || task.date !== dateStr || task.completed) return;
                        const key = `task_${task.id}`;
                        if (!seen.has(key)) {
                            seen.add(key);
                            tasks.push({
                                text: task.text,
                                type: TASK_TYPES.TASK,
                                folder: folder.name,
                                icon: folder.icon
                            });
                        }
                    });
                });

                State.getClients().forEach(client => {
                    if (!client || !client.date || client.date.slice(5) !== dateStr.slice(5)) return;
                    const key = `bd_${client.name.toLowerCase()}_${client.date}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        tasks.push({
                            text: client.name,
                            type: TASK_TYPES.BIRTHDAY
                        });
                    }
                });

                return tasks;
            }

            function getStats() {
                const allTasks = Utils.getAllTasksWithFolders();
                const total = allTasks.length;
                const completed = allTasks.filter(t => t.completed).length;
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                
                const folderStats = State.getFolders().map(folder => {
                    const stats = Utils.getFolderStats(folder);
                    return {
                        icon: folder.icon || DEFAULT_FOLDER_ICON,
                        name: folder.name,
                        completed: stats.completed,
                        total: stats.total
                    };
                });

                return { total, completed, percent, folderStats };
            }

            function getUpcomingBirthdays(days = 7) {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                return State.getClients()
                    .filter(client => {
                        if (!client || !client.date) return false;
                        const birthday = Utils.getNextBirthday(client.date);
                        if (!birthday) return false;
                        const diffDays = Math.ceil((birthday - today) / 86400000);
                        return diffDays >= 0 && diffDays <= days;
                    })
                    .map(client => {
                        const birthday = Utils.getNextBirthday(client.date);
                        const diffDays = Math.ceil((birthday - today) / 86400000);
                        return {
                            name: client.name,
                            daysUntil: diffDays
                        };
                    });
            }

            function getClientsSorted() {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                return [...State.getClients()]
                    .sort((a, b) => {
                        const bdA = Utils.getNextBirthday(a.date);
                        const bdB = Utils.getNextBirthday(b.date);
                        if (!bdA || !bdB) return 0;
                        return bdA - bdB;
                    })
                    .map(client => {
                        const birthday = Utils.getNextBirthday(client.date);
                        if (!birthday) return null;
                        
                        const age = Utils.getAge(client.date, birthday);
                        const daysUntil = Math.ceil((birthday - today) / 86400000);
                        
                        return {
                            ...client,
                            birthday,
                            age,
                            daysUntil
                        };
                    })
                    .filter(client => client !== null);
            }

            return {
                getTodayTasks,
                getOverdueTasks,
                getTasksForSmartFolder,
                processRepeats,
                searchTasks,
                getCalendarData,
                getTasksForDate,
                getStats,
                getUpcomingBirthdays,
                getClientsSorted
            };
        })();

        // ========================================
        // 5. UI-КОМПОНЕНТЫ (Renderers)
        // ========================================
        const UI = (() => {
            function showToast(message) {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), TOAST_DURATION);
            }

            function updateQuote() {
                const el = document.getElementById('bgQuote');
                if (!el) return;
                el.style.opacity = '0';
                setTimeout(() => {
                    el.textContent = `«${QUOTES[Math.floor(Math.random() * QUOTES.length)]}»`;
                    el.style.opacity = '0.7';
                }, 1000);
            }

            function renderCustomQuotes() {
                const quotes = State.getCustomQuotes();
                const elements = {
                    left: document.getElementById('customQuoteLeft'),
                    center: document.getElementById('customQuoteCenter'),
                    right: document.getElementById('customQuoteRight')
                };
                const defaults = {
                    left: '💬 Своя цитата слева',
                    center: '💬 Своя цитата центр',
                    right: '💬 Своя цитата справа'
                };

                Object.entries(elements).forEach(([side, el]) => {
                    if (el) {
                        el.textContent = quotes[side] || defaults[side];
                    }
                });
            }

            function renderFolderList(searchResults = null) {
                const container = document.getElementById('folderList');
                if (!container) return;

                if (searchResults !== null) {
                    renderSearchResults(container, searchResults);
                    return;
                }

                let html = '';

                // Умная папка "Сегодня"
                const todayTasks = Services.getTodayTasks();
                html += buildSmartFolderHTML(SMART_FOLDERS.TODAY, '📅', 'Сегодня', todayTasks.length);

                // Умная папка "Просроченные"
                const overdueTasks = Services.getOverdueTasks();
                if (overdueTasks.length > 0) {
                    html += buildSmartFolderHTML(
                        SMART_FOLDERS.OVERDUE, '⚠️', 'Просроченные', overdueTasks.length, 'var(--overdue)'
                    );
                }

                // Обычные папки
                const folders = State.getFolders();
                if (!folders.length) {
                    html += '<p style="text-align:center;padding:20px;opacity:0.6;">📂 Нет папок. Создайте первую!</p>';
                } else {
                    html += folders.map(buildFolderCardHTML).join('');
                }

                container.innerHTML = html;
            }

            function buildSmartFolderHTML(id, icon, name, taskCount, colorClass) {
                const colorStyle = colorClass ? `style="color:${colorClass};"` : '';
                return `
                    <div class="folder-card ${id === SMART_FOLDERS.TODAY ? 'smart-today' : 'smart-overdue'}" 
                         data-action="${ACTIONS.OPEN_FOLDER}" data-folder-id="${id}">
                        <span class="folder-icon">${icon}</span>
                        <div class="folder-info">
                            <div class="folder-name">${name}</div>
                            <div class="folder-stats">
                                <span class="stat-active" ${colorStyle}>📋 ${taskCount} задач</span>
                            </div>
                        </div>
                    </div>`;
            }

            function buildFolderCardHTML(folder) {
                const stats = Utils.getFolderStats(folder);
                const statsHtml = stats.total > 0
                    ? `<span class="stat-active">📋 ${stats.active} активных</span>
                       <span class="stat-completed">✅ ${stats.completed} заверш.</span>`
                    : '<span>📭 Нет задач</span>';

                return `
                    <div class="folder-card" 
                         data-action="${ACTIONS.OPEN_FOLDER}" 
                         data-folder-id="${folder.id}"
                         ondragover="App.handleDragOver(event)" 
                         ondragleave="App.handleDragLeave(event)" 
                         ondrop="App.handleDrop(event, '${folder.id}')">
                        <span class="folder-icon" 
                              data-action="${ACTIONS.CHANGE_ICON}" 
                              data-folder-id="${folder.id}">${folder.icon || DEFAULT_FOLDER_ICON}</span>
                        <div class="folder-info">
                            <div class="folder-name">${Utils.escapeHtml(folder.name)}</div>
                            <div class="folder-stats">${statsHtml}</div>
                        </div>
                        <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_FOLDER}" data-folder-id="${folder.id}" style="font-size:11px;padding:4px 8px;">🗑️</button>
                    </div>`;
            }

            function renderSearchResults(container, tasks) {
                if (!tasks.length) {
                    container.innerHTML = '<p style="text-align:center;padding:20px;opacity:0.6;">🔍 Ничего не найдено</p>';
                    return;
                }
                container.innerHTML = tasks.map(task => buildTaskHTML(task, task.folderId, true)).join('');
            }

            function renderTasks() {
                const taskContainer = document.getElementById('taskContainer');
                const folderList = document.getElementById('folderList');
                if (!taskContainer || !folderList) return;

                const currentFolderId = State.getCurrentFolderId();
                const isSmartFolder = Utils.isSmartFolder(currentFolderId);

                if (isSmartFolder) {
                    renderSmartFolderTasks(taskContainer, folderList, currentFolderId);
                } else {
                    renderRegularFolderTasks(taskContainer, folderList, currentFolderId);
                }
            }

            function renderSmartFolderTasks(taskContainer, folderList, folderId) {
                taskContainer.style.display = 'flex';
                folderList.style.display = 'none';

                const folderNameEl = document.getElementById('currentFolderName');
                if (folderNameEl) {
                    folderNameEl.textContent = folderId === SMART_FOLDERS.TODAY ? '📅 Сегодня' : '⚠️ Просроченные';
                }

                document.getElementById('taskFilter').style.display = 'none';
                document.getElementById('btnEditFolder').style.display = 'none';
                document.querySelector('.input-row').style.display = 'none';

                const tasks = Services.getTasksForSmartFolder(folderId);
                const taskList = document.getElementById('taskList');
                if (!taskList) return;

                if (!tasks.length) {
                    taskList.innerHTML = '<div class="no-tasks">🎉 Задач нет!</div>';
                } else {
                    taskList.innerHTML = tasks.map(task => buildTaskHTML(task, task.folderId, true)).join('');
                }
            }

            function renderRegularFolderTasks(taskContainer, folderList, folderId) {
                document.getElementById('taskFilter').style.display = 'flex';
                document.getElementById('btnEditFolder').style.display = '';
                document.querySelector('.input-row').style.display = 'flex';

                const folder = State.getFolderById(folderId);
                if (!folder) {
                    taskContainer.style.display = 'none';
                    folderList.style.display = 'block';
                    return;
                }

                taskContainer.style.display = 'flex';
                folderList.style.display = 'none';

                const folderNameEl = document.getElementById('currentFolderName');
                if (folderNameEl) {
                    folderNameEl.textContent = `${folder.icon || DEFAULT_FOLDER_ICON} ${folder.name}`;
                }

                const stats = Utils.getFolderStats(folder);
                updateTaskFilterUI(stats);

                const taskList = document.getElementById('taskList');
                if (!taskList) return;

                const tasks = Utils.getValidTasksArray(folder.tasks);
                if (!tasks.length) {
                    taskList.innerHTML = '<div class="no-tasks">📭 Нет задач в этой папке<br><small>Добавьте первую задачу!</small></div>';
                    return;
                }

                const filter = State.getCurrentTaskFilter();
                const filtered = filter === FILTERS.ACTIVE
                    ? tasks.filter(t => !t.completed)
                    : tasks.filter(t => t.completed);

                // Сортировка: приоритет, затем дата
                filtered.sort((a, b) => {
                    const priorityDiff = (b.priority || 0) - (a.priority || 0);
                    if (priorityDiff !== 0) return priorityDiff;
                    if (!a.date && !b.date) return 0;
                    if (!a.date) return 1;
                    if (!b.date) return -1;
                    return a.date.localeCompare(b.date);
                });

                if (!filtered.length) {
                    const message = filter === FILTERS.ACTIVE
                        ? '🎉 Все задачи выполнены! Отличная работа!'
                        : '📭 Нет завершенных задач';
                    taskList.innerHTML = `<div class="no-tasks">${message}</div>`;
                } else {
                    taskList.innerHTML = filtered.map(task => buildTaskHTML(task, folderId, false)).join('');
                }
            }

            function updateTaskFilterUI(stats) {
                const activeCountEl = document.getElementById('activeCount');
                const completedCountEl = document.getElementById('completedCount');
                if (activeCountEl) activeCountEl.textContent = stats.active;
                if (completedCountEl) completedCountEl.textContent = stats.completed;

                const filter = State.getCurrentTaskFilter();
                document.querySelectorAll('.task-filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filter);
                });
            }

            function buildTaskHTML(task, folderId, showFolderName) {
                let html = `
                    <div class="task-item ${task.completed ? 'completed' : ''}" 
                         draggable="true"
                         data-task-id="${task.id}" 
                         data-folder-id="${folderId}"
                         ondragstart="App.handleDragStart(event)" 
                         ondragend="App.handleDragEnd(event)">
                        <div class="task-checkbox" data-action="${ACTIONS.TOGGLE_TASK}" data-task-id="${task.id}">
                            ${task.completed ? '✓' : ''}
                        </div>
                        <div style="flex:1;min-width:100px;">
                            <span class="task-text">${Utils.escapeHtml(task.text)}</span>`;

                if (showFolderName && task.folderName) {
                    html += `<div style="font-size:10px;color:var(--text-secondary);">📁 ${Utils.escapeHtml(task.folderName)}</div>`;
                }

                html += buildSubtasksHTML(task);
                html += `</div>`;

                // Звездочки приоритета
                for (let i = 1; i <= MAX_PRIORITY; i++) {
                    html += `
                        <button class="star-btn ${task.priority >= i ? 'active' : ''}" 
                                data-action="${ACTIONS.SET_PRIORITY}" 
                                data-task-id="${task.id}" 
                                data-priority="${i}">⭐</button>`;
                }

                html += buildTaskBadgesHTML(task);
                html += buildTaskActionsHTML(task);
                html += '</div>';

                return html;
            }

            function buildSubtasksHTML(task) {
                if (!Array.isArray(task.subtasks) || !task.subtasks.length) return '';
                
                let html = '<ul class="subtask-list">';
                task.subtasks.forEach(subtask => {
                    if (!subtask) return;
                    html += `
                        <li class="subtask-item ${subtask.completed ? 'completed' : ''}">
                            <div class="subtask-checkbox" 
                                 data-action="${ACTIONS.TOGGLE_SUBTASK}" 
                                 data-task-id="${task.id}" 
                                 data-subtask-id="${subtask.id}">
                                ${subtask.completed ? '✓' : ''}
                            </div>
                            <span class="subtask-text">${Utils.escapeHtml(subtask.text)}</span>
                            <div class="subtask-actions">
                                <button class="btn-xs" 
                                        data-action="${ACTIONS.EDIT_SUBTASK}" 
                                        data-task-id="${task.id}" 
                                        data-subtask-id="${subtask.id}" 
                                        title="Редактировать">✏️</button>
                                <button class="btn-xs" 
                                        data-action="${ACTIONS.DELETE_SUBTASK}" 
                                        data-task-id="${task.id}" 
                                        data-subtask-id="${subtask.id}" 
                                        title="Удалить">✕</button>
                            </div>
                        </li>`;
                });
                html += '</ul>';
                return html;
            }

            function buildTaskBadgesHTML(task) {
                let html = '';
                
                if (task.repeat) {
                    const repeatText = task.repeat === 'custom' 
                        ? `${task.repeatDays || '?'}д` 
                        : (REPEAT_ABBREVIATIONS[task.repeat] || task.repeat);
                    html += `<span class="repeat-badge">🔁 ${repeatText}</span>`;
                }
                
                if (task.time) {
                    html += `<span>🕐 ${task.time}</span>`;
                }
                
                if (task.date) {
                    let dateToCheck = task.date;
                    if (task.type === TASK_TYPES.BIRTHDAY) {
                        const nextBd = Utils.getNextBirthday(task.date);
                        if (nextBd) dateToCheck = Utils.formatDateISO(nextBd);
                    }
                    const daysInfo = Utils.getDaysText(dateToCheck);
                    if (daysInfo) {
                        html += `<span class="days-badge ${daysInfo.className}">${daysInfo.text}</span>`;
                    } else {
                        html += `<span>📅 ${Utils.formatDate(task.date)}</span>`;
                    }
                }
                
                return html;
                   
            }

            function buildTaskActionsHTML(task) {
                return `
                    <button class="btn-sm btn-add" data-action="${ACTIONS.ADD_SUBTASK}" data-task-id="${task.id}">📋</button>
                    <button class="btn-sm btn-add" data-action="${ACTIONS.EDIT_TASK}" data-task-id="${task.id}">✏️</button>
                    <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_TASK}" data-task-id="${task.id}">✕</button>`;
            }

            function renderNotes() {
                const container = document.getElementById('notesList');
                if (!container) return;

                const notes = State.getNotes();
                if (!notes.length) {
                    container.innerHTML = '<p style="text-align:center;padding:20px;opacity:0.6;">💡 Нет заметок</p>';
                    return;
                }

                container.innerHTML = notes
                    .filter(note => note)
                    .map(note => `
                        <div class="note-card" style="position:relative;">
                            <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                                <button class="btn-sm btn-danger" 
                                        data-action="${ACTIONS.DELETE_NOTE}" 
                                        data-note-id="${note.id}" 
                                        style="font-size:11px;padding:4px 10px;">✕ Удалить</button>
                            </div>
                            <textarea class="note-textarea" data-note-id="${note.id}">${Utils.escapeHtml(note.text || '')}</textarea>
                        </div>`)
                    .join('');
            }

            function renderCalendar(year, month, selectedDate) {
                const titleEl = document.getElementById('calendarTitle');
                if (titleEl) {
                    titleEl.textContent = new Date(year, month)
                        .toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
                }

                const grid = document.getElementById('calendarGrid');
                if (!grid) return;

                const { startOffset, days } = Services.getCalendarData(year, month);
                
                grid.innerHTML = '';
                
                // Дни недели
                ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'].forEach(day => {
                    const div = document.createElement('div');
                    div.style.cssText = 'font-size:10px;font-weight:700;';
                    div.textContent = day;
                    grid.appendChild(div);
                });

                // Пустые ячейки
                for (let i = 0; i < startOffset; i++) {
                    grid.appendChild(document.createElement('div'));
                }

                // Дни месяца
                days.forEach(({ day, dateStr, isToday, hasTasks }) => {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'calendar-day';
                    if (isToday) dayDiv.classList.add('today');
                    if (hasTasks) dayDiv.classList.add('has-tasks');
                    if (dateStr === selectedDate) dayDiv.classList.add('selected');
                    dayDiv.textContent = day;
                    dayDiv.dataset.action = ACTIONS.SELECT_DATE;
                    dayDiv.dataset.date = dateStr;
                    grid.appendChild(dayDiv);
                });

                renderCalendarTasks(selectedDate);
            }

            function renderCalendarTasks(selectedDate) {
                const container = document.getElementById('calendarTasks');
                if (!container) return;
                
                if (!selectedDate) {
                    container.innerHTML = '';
                    return;
                }

                const tasks = Services.getTasksForDate(selectedDate);
                
                if (!tasks.length) {
                    container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:10px;">Нет задач и событий 🎉</p>';
                    return;
                }

                container.innerHTML = `
                    <strong>📅 ${Utils.formatDate(selectedDate)}</strong><br>
                    ${tasks.map(task => {
                        if (task.type === TASK_TYPES.BIRTHDAY) {
                            return `<div class="task-item">🎂 ${Utils.escapeHtml(task.text)}</div>`;
                        }
                        return `<div class="task-item">
                            <span>${task.icon || '📌'}</span>
                            <span>${Utils.escapeHtml(task.text)}</span>
                            <span style="font-size:10px;color:var(--text-secondary);">${Utils.escapeHtml(task.folder)}</span>
                        </div>`;
                    }).join('')}`;
            }

            function renderAI() {
                const container = document.getElementById('aiContent');
                if (!container) return;

                const upcoming = Services.getUpcomingBirthdays();
                
                if (upcoming.length) {
                    container.innerHTML = `
                        <strong>🎂 Ближайшие ДР:</strong><br>
                        ${upcoming.map(client => 
                            `• ${Utils.escapeHtml(client.name)} — через ${client.daysUntil} дн.`
                        ).join('<br>')}`;
                } else {
                    container.innerHTML = '<p>🎉 Всё под контролем!</p>';
                }
            }

            function renderClients() {
                const container = document.getElementById('clientList');
                if (!container) return;

                const clients = State.getClients();
                if (!clients.length) {
                    container.innerHTML = '<p style="text-align:center;padding:16px;opacity:0.6;">👥 Нет клиентов</p>';
                    const statsEl = document.getElementById('clientStats');
                    if (statsEl) statsEl.textContent = '';
                    return;
                }

                const sortedClients = Services.getClientsSorted();
                
                container.innerHTML = sortedClients.map(client => {
                    const dateStr = `${client.birthday.getDate()} ${client.birthday.toLocaleDateString('ru-RU', { month: 'long' })} ${client.birthday.getFullYear()}`;
                    let status;
                    if (client.daysUntil === 0) {
                        status = '🎂 Сегодня!';
                    } else if (client.daysUntil === 1) {
                        status = '🎂 Завтра!';
                    } else {
                        status = `📅 ${dateStr} (через ${client.daysUntil} дн.)`;
                    }

                    return `
                        <div class="client-card">
                            <div style="display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap;">
                                <span>
                                    <strong>${Utils.escapeHtml(client.name)}</strong> — 
                                    ${Utils.formatDate(client.date)} 
                                    (${client.age} ${Utils.getAgeWord(client.age)})
                                </span>
                                <div>
                                    <button class="btn-sm btn-add" data-action="${ACTIONS.EDIT_CLIENT}" data-client-id="${client.id}">✏️</button>
                                    <button class="btn-sm btn-email" data-action="${ACTIONS.EMAIL_CLIENT}" data-client-id="${client.id}">📧</button>
                                    <button class="btn-sm btn-danger" data-action="${ACTIONS.DELETE_CLIENT}" data-client-id="${client.id}">✕</button>
                                </div>
                            </div>
                            ${client.phone ? `<span>📱 ${Utils.escapeHtml(client.phone)}</span>` : ''}
                            <span style="font-size:12px;color:var(--accent);">${status}</span>
                        </div>`;
                }).join('');

                // Статистика
                const now = new Date();
                const birthdaysThisMonth = clients.filter(client => {
                    try {
                        const bd = Utils.getNextBirthday(client.date);
                        return bd && bd.getMonth() === now.getMonth();
                    } catch (e) {
                        return false;
                    }
                }).length;
                
                const statsEl = document.getElementById('clientStats');
                if (statsEl) {
                    statsEl.textContent = `В этом месяце: ${birthdaysThisMonth} дн. рожд. · Всего: ${clients.length}`;
                }
            }

            function renderStats() {
                const stats = Services.getStats();
                
                const elements = {
                    total: document.getElementById('statTotal'),
                    completed: document.getElementById('statCompleted'),
                    percent: document.getElementById('statPercent'),
                    progressFill: document.getElementById('progressFill'),
                    details: document.getElementById('statsDetails')
                };

                if (elements.total) elements.total.textContent = stats.total;
                if (elements.completed) elements.completed.textContent = stats.completed;
                if (elements.percent) elements.percent.textContent = `${stats.percent}%`;
                if (elements.progressFill) elements.progressFill.style.width = `${stats.percent}%`;
                
                if (elements.details && stats.folderStats.length) {
                    elements.details.innerHTML = `
                        <strong>По папкам:</strong><br>
                        ${stats.folderStats.map(fs => 
                            `${fs.icon} ${Utils.escapeHtml(fs.name)}: ${fs.completed}/${fs.total} выполнено`
                        ).join('<br>')}`;
                }

                State.save(); // updateDocumentTitle вызывается внутри
            }

            function renderAll(calendarState = null) {
                renderCustomQuotes();
                renderFolderList();
                renderTasks();
                renderNotes();
                renderAI();
                renderClients();
                
                if (calendarState) {
                    renderCalendar(calendarState.year, calendarState.month, calendarState.selectedDate);
                }
                
                if (document.getElementById('section-stats').classList.contains('active')) {
                    renderStats();
                }
            }

            return {
                showToast,
                updateQuote,
                renderCustomQuotes,
                renderFolderList,
                renderTasks,
                renderNotes,
                renderCalendar,
                renderAI,
                renderClients,
                renderStats,
                renderAll
            };
        })();

        // ========================================
        // 6. ОБРАБОТЧИКИ ДЕЙСТВИЙ (Action Handlers)
        // ========================================
        const Actions = (() => {
            function openFolder(folderId) {
                State.setCurrentFolderId(folderId);
                State.setCurrentTaskFilter(FILTERS.ACTIVE);
                
                const searchContainer = document.getElementById('searchContainer');
                if (searchContainer) searchContainer.style.display = 'none';
                
                State.save();
                UI.renderAll();
            }

            function toggleTask(taskId) {
                const currentFolderId = State.getCurrentFolderId();
                
                if (Utils.isSmartFolder(currentFolderId)) {
                    const result = Utils.findTaskById(taskId);
                    if (!result) {
                        // Проверяем, не день ли рождения
                        const client = State.getClients().find(c => `bd_${c.id}` === taskId);
                        if (client) {
                            UI.showToast('🎂 Это день рождения!');
                            return;
                        }
                        return;
                    }
                    
                    const { task, folder } = result;
                    task.completed = !task.completed;
                    
                    const prevFolderId = State.getCurrentFolderId();
                    State.setCurrentFolderId(folder.id);
                    Services.processRepeats();
                    State.setCurrentFolderId(prevFolderId);
                } else {
                    const result = Utils.findTaskById(taskId);
                    if (!result) return;
                    
                    const { task } = result;
                    task.completed = !task.completed;

                });

            function editTask(taskId) {
                if (Utils.isSmartFolder(State.getCurrentFolderId())) {
                    UI.showToast('❌ В этой папке нельзя редактировать задачи.');
                    return;
                }

                const result = Utils.findTaskById(taskId);
                if (!result) {
                    UI.showToast('❌ Задача не найдена');
                    return;
                }

                const { task } = result;
                
                const newText = prompt('Текст задачи:', task.text);
                if (newText === null) return;
                
                const newDate = prompt('Дата (ГГГГ-ММ-ДД):', task.date || '');
                if (newDate === null) return;
                
                const newTime = prompt('Время (ЧЧ:ММ):', task.time || '');
                if (newTime === null) return;

                // Период повторения
                const options = Object.entries(REPEAT_LABELS)
                    .map(([v, l], i) => `${i + 1}. ${l}`)
                    .join('\n');
                const currentLabel = REPEAT_LABELS[task.repeat] || 'Без повтора';
                const choice = prompt(`Период повторения:\n${options}\n\nТекущий: ${currentLabel}\nВведите номер:`, '');
                
                if (choice === null) return;
                
                let newRepeat = '';
                let newRepeatDays = 0;
                const keys = Object.keys(REPEAT_LABELS);
                const choiceNum = parseInt(choice);
                
                if (!isNaN(choiceNum) && choiceNum >= 1 && choiceNum <= keys.length) {
                    newRepeat = keys[choiceNum - 1];
                    if (newRepeat === 'custom') {
                        const daysStr = prompt('Дней:', task.repeatDays || '7');
                        if (daysStr === null) return;
                        const days = parseInt(daysStr);
                        if (isNaN(days) || days < 1) {
                            UI.showToast('❌ Некорректно');
                            return;
                        }
                        newRepeatDays = days;
                    }
                }

                task.text = newText.trim();
                task.date = newDate.trim();
                task.time = newTime.trim();
                task.repeat = newRepeat || undefined;
                task.repeatDays = newRepeatDays || undefined;

                State.save();
                UI.renderAll();
                UI.showToast('✅ Задача обновлена!');
            }

            function exportData() {

                    }, null, 2);
                    
                    const blob = new Blob([json], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `my_plans_backup_${new Date().toISOString().slice(0, 10)}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

            function importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json,.txt,application/json';
                input.style.display = 'none';
                
                document.body.appendChild(input);
                
                input.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) {
                        document.body.removeChild(input);
                        return;
                    }
                    
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            const imported = JSON.parse(ev.target.result);
                            if (!imported || typeof imported !== 'object' || !Array.isArray(imported.folders)) {
                                throw new Error('Формат');
                            }
                            
                            // Сохраняем бекап
                            const backup = JSON.stringify({
                                folders: State.getFolders(),
                                notes: State.getNotes(),
                                clients: State.getClients(),
                                customQuotes: State.getCustomQuotes()
                            });
                            
                            try {
                                // Загружаем новые данные
                                localStorage.setItem(STORAGE_KEY, JSON.stringify(imported));
                                State.load();
                                Services.processRepeats();
                                UI.renderAll();
                                UI.showToast('📥 Импортировано!');
                            } catch (inner) {
                                // Восстанавливаем из бекапа
                                localStorage.setItem(STORAGE_KEY, backup);
                                State.load();
                                throw inner;
                            }
                        } catch (err) {
                            UI.showToast(`❌ Ошибка: ${err.message}`);
                        }
                        document.body.removeChild(input);
                    };
                    
                    reader.onerror = () => {
                        UI.showToast('❌ Не удалось прочитать');
                        document.body.removeChild(input);
                    };
                    
                    reader.readAsText(file);
                });
                
                input.click();
            }

        // ========================================
        // 7. DRAG & DROP
        // ========================================
        const DragDrop = (() => {
            function handleDragStart(event) {
                event.target.classList.add('dragging');
                event.dataTransfer.setData('text/plain', JSON.stringify({
                    taskId: event.target.dataset.taskId,
                    fromFolderId: event.target.dataset.folderId
                }));
                event.dataTransfer.effectAllowed = 'move';
            }

            function handleDragEnd(event) {
                event.target.classList.remove('dragging');
                document.querySelectorAll('.folder-card').forEach(card => card.classList.remove('drag-over'));
            }

            function handleDragOver(event) {
                event.preventDefault();
                event.dataTransfer.dropEffect = 'move';
                event.currentTarget.classList.add('drag-over');
            }

            function handleDragLeave(event) {
                event.currentTarget.classList.remove('drag-over');
            }

            function handleDrop(event, toFolderId) {
                event.preventDefault();
                event.currentTarget.classList.remove('drag-over');
                
                try {
                    const dragData = JSON.parse(event.dataTransfer.getData('text/plain'));
                    const { taskId, fromFolderId } = dragData;
                    
                    if (fromFolderId === toFolderId || Utils.isSmartFolder(toFolderId)) return;
                    
                    const fromFolder = State.getFolderById(fromFolderId);
                    const toFolder = State.getFolderById(toFolderId);
                    
                    if (!fromFolder || !toFolder) return;
                    
                    const taskIndex = fromFolder.tasks.findIndex(t => t && t.id === taskId);
                    if (taskIndex === -1) return;
                    
                    const task = fromFolder.tasks.splice(taskIndex, 1)[0];
                    toFolder.tasks.push(task);
                    
                    // Обновляем текущую папку если нужно
                    if (State.getCurrentFolderId() === fromFolderId && !fromFolder.tasks.length) {
                        State.setCurrentFolderId(toFolderId);
                    } else if (State.getCurrentFolderId() !== toFolderId) {
                        State.setCurrentFolderId(toFolderId);
                    }
                    
                    State.save();
                    UI.renderAll();
                    UI.showToast('📦 Задача перемещена!');
                } catch (e) {
                    console.error('Drop error:', e);
                    UI.showToast('❌ Ошибка перемещения');
                }
            }

            return { handleDragStart, handleDragEnd, handleDragOver, handleDragLeave, handleDrop };
        })();

        // Экспорт для глобального доступа
        window.App = {
            handleDragStart: DragDrop.handleDragStart,
            handleDragEnd: DragDrop.handleDragEnd,
            handleDragOver: DragDrop.handleDragOver,
            handleDragLeave: DragDrop.handleDragLeave,
            handleDrop: DragDrop.handleDrop
        };

        // 8. НАСТРОЙКА ОБРАБОТЧИКОВ СОБЫТИЙ
        // ========================================
        function setupEventListeners() {
            // Делегирование кликов
            document.addEventListener('click', function(event) {
                const target = event.target.closest('[data-action]');
                if (!target) return;
                
                const action = target.dataset.action;
                event.preventDefault();
                
                try {
                    handleAction(action, target.dataset);
                } catch (e) {
                    console.error('Action error:', action, e);
                    UI.showToast('❌ Ошибка');
                }
            });

            // Кнопки с прямыми ID
            setupButtonHandlers();
            
            // Табы
            setupTabHandlers();
            
            // Обработчики ввода
            setupInputHandlers();
            
            // Тема
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') document.body.classList.add('dark');
        }

        function handleAction(action, dataset) {
            switch (action) {
                case ACTIONS.OPEN_FOLDER: Actions.openFolder(dataset.folderId); break;
                case ACTIONS.CHANGE_ICON: Actions.changeFolderIcon(dataset.folderId); break;
                case ACTIONS.TOGGLE_TASK: Actions.toggleTask(dataset.taskId); break;
                case ACTIONS.EDIT_TASK: Actions.editTask(dataset.taskId); break;
                case ACTIONS.DELETE_TASK: Actions.deleteTask(dataset.taskId); break;
                case ACTIONS.ADD_SUBTASK: Actions.addSubtask(dataset.taskId); break;
                case ACTIONS.EDIT_SUBTASK: Actions.editSubtask(dataset.taskId, dataset.subtaskId); break;
                case ACTIONS.DELETE_SUBTASK: Actions.deleteSubtask(dataset.taskId, dataset.subtaskId); break;
                case ACTIONS.TOGGLE_SUBTASK: Actions.toggleSubtask(dataset.taskId, dataset.subtaskId); break;
                case ACTIONS.SET_PRIORITY: Actions.setPriority(dataset.taskId, parseInt(dataset.priority)); break;
                case ACTIONS.EDIT_CLIENT: Actions.editClient(dataset.clientId); break;
                case ACTIONS.EMAIL_CLIENT: Actions.emailClient(dataset.clientId); break;
                case ACTIONS.DELETE_CLIENT: Actions.deleteClient(dataset.clientId); break;
                case ACTIONS.SELECT_DATE: 
                    AppState.selectedDate = dataset.date;
                    UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, AppState.selectedDate);
                    break;
                case ACTIONS.EDIT_CUSTOM_QUOTE: Actions.editCustomQuote(dataset.side); break;
                case ACTIONS.DELETE_NOTE: Actions.deleteNote(dataset.noteId); break;
                case ACTIONS.DELETE_FOLDER: Actions.deleteFolder(dataset.folderId); break;
                default: console.warn('Неизвестное действие:', action);
            }
        }

                        AppState.calendarMonth = 0;
                        AppState.calendarYear++;
                    }
                    AppState.selectedDate = null;
                    UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, null);
                },
                btnTheme: Actions.toggleTheme,
                btnExport: Actions.exportData,
                btnImport: Actions.importData,
                btnSync: Actions.syncData
            };

            Object.entries(handlers).forEach(([id, fn]) => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('click', fn);
            });
        }

        function setupTabHandlers() {
            document.querySelectorAll('#mainTabs .tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabName = this.dataset.tab;
                    
                    // Обновляем активный таб
                    document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Показываем нужную секцию
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    const section = document.getElementById(`section-${tabName}`);
                    if (!section) return;
                    
                    section.classList.add('active');
                    
                    // Рендерим содержимое
                    switch (tabName) {
                        case 'tasks': 
                            const searchContainer = document.getElementById('searchContainer');
                            if (searchContainer) searchContainer.style.display = 'none';
                            UI.renderAll();
                            break;
                        case 'calendar': 
                            UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, AppState.selectedDate);
                            break;
                        case 'stats': 
                            UI.renderStats();
                            break;
                    }
                });
            });
        }

        function setupInputHandlers() {
            // Фильтр задач
            const taskFilter = document.getElementById('taskFilter');
            if (taskFilter) {
                taskFilter.addEventListener('click', function(e) {
                    const btn = e.target.closest('.task-filter-btn');
                    if (btn) Actions.setTaskFilter(btn.dataset.filter);
                });
            }

            // Повтор задач
            const taskRepeat = document.getElementById('taskRepeat');
            const taskRepeatDays = document.getElementById('taskRepeatDays');
            if (taskRepeat && taskRepeatDays) {
                taskRepeat.addEventListener('change', function() {
                    taskRepeatDays.style.display = this.value === 'custom' ? 'inline' : 'none';
                    if (this.value === 'custom' && !taskRepeatDays.value) {
                        taskRepeatDays.value = '1';
                    }
                });
            }

            // Поиск
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', Actions.updateSearchResults);
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') Actions.toggleSearch();
                });
            }

            // Заметки (автосохранение)
            let noteTimeout;
            document.addEventListener('input', function(e) {
                if (!e.target.classList.contains('note-textarea')) return;
                clearTimeout(noteTimeout);
                noteTimeout = setTimeout(() => {
                    const note = State.getNoteById(e.target.dataset.noteId);
                    if (note) {
                        note.text = e.target.value;
                        note.updatedAt = Date.now();
                        State.save();
                    }
                }, 600);
            });
        }

        // ========================================
        // 9. СОСТОЯНИЕ КАЛЕНДАРЯ
        // ========================================
        const AppState = {
            calendarYear: new Date().getFullYear(),
            calendarMonth: new Date().getMonth(),
            selectedDate: null
        };

        // ========================================
        // 10. ИНИЦИАЛИЗАЦИЯ
        // ========================================
        function initialize() {
            try {
                State.load();
                Services.processRepeats();
                setupEventListeners();
                
                const calendarState = {
                    year: AppState.calendarYear,
                    month: AppState.calendarMonth,
                    selectedDate: AppState.selectedDate
                };
                
                UI.renderAll(calendarState);
                State.save(); // Для обновления заголовка
                
                UI.updateQuote();
                setInterval(UI.updateQuote, 30000);
                
                console.log('✅ Приложение готово');
            } catch (e) {
                console.error('Init error:', e);
            }
        }

        // Отладка
        window.debugApp = {
            getState: () => ({
                folders: State.getFolders(),
                notes: State.getNotes(),
                clients: State.getClients(),
                customQuotes: State.getCustomQuotes(),
                currentFolderId: State.getCurrentFolderId(),
                currentTaskFilter: State.getCurrentTaskFilter()
            }),
            resetData: () => {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        };

        // Запуск
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }
    })();
    </script>
    <button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="position:fixed;bottom:20px;right:20px;z-index:999;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);">⬆</button>
</body>
