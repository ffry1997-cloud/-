
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Мои планы</title>
    <meta name="apple-mobile-web-app-title" content="Мои планы">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f5f3f0">
  <!-- Иконки для iOS с цветным фоном -->
<link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%234a90d9'/%3E%3Ctext y='.72em' x='50' text-anchor='middle' font-size='55'%3E📅%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #f5f3f0;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #888888;
            --accent: #4a90d9;
            --accent-light: #eef4fb;
            --danger: #d96969;
            --danger-light: #fef2f2;
            --border: #e8e5e0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            --radius: 20px;
            --radius-sm: 14px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --star-color: #f0c040;
            --overdue: #e55353;
            --today-color: #e5904c;
            --upcoming: #4caf84;
        }

        .dark {
            --bg: #1e1d1a;
            --card: #2c2a26;
            --text: #e8e4dd;
            --text-secondary: #999590;
            --accent: #6ba3e0;
            --accent-light: #2d353f;
            --border: #3d3a34;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 8px 4px;
        }

        .app-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            padding: 14px 0 6px;
            letter-spacing: -0.3px;
        }

        .bg-quote {
            text-align: center;
            font-style: italic;
            color: var(--text-secondary);
            padding: 6px 0;
            font-size: 13px;
            opacity: 0.7;
            transition: opacity 0.5s;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 4px 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .custom-quotes {
            display: flex;
            gap: 12px;
            margin-bottom: 2px;
        }

        .custom-quote-box {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            font-style: italic;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all .2s;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .custom-quote-box:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .header-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 4px 0 8px;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            font-size: 19px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            color: var(--text);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .icon-btn:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .icon-btn:active {
            transform: scale(0.94);
        }

        .tabs {
            display: flex;
            background: var(--card);
            border-radius: 30px;
            padding: 5px;
            box-shadow: var(--shadow);
            gap: 2px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 10px;
            border-radius: 26px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            white-space: nowrap;
            min-width: fit-content;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
        }

        .section {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .section.active {
            display: flex;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--border);
        }

        .search-container {
            margin-bottom: 4px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 26px;
            border: 2px solid var(--border);
            font-size: 15px;
            font-family: var(--font);
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-stats {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 6px;
            display: none;
        }

        .stats-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }

        .stat-item {
            padding: 10px;
            background: var(--bg);
            border-radius: var(--radius-sm);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .star-btn {
            font-size: 18px;
            cursor: pointer;
            padding: 2px 4px;
            border: none;
            background: none;
            transition: transform 0.1s;
            color: #ddd;
        }

        .star-btn.active {
            color: var(--star-color);
        }

        .star-btn:hover {
            transform: scale(1.15);
        }

        .days-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap;
            font-weight: 600;
        }

        .days-badge.overdue {
            background: #fde8e8;
            color: var(--overdue);
        }

        .days-badge.today {
            background: #fef3e2;
            color: var(--today-color);
        }

        .days-badge.upcoming {
            background: #e8f8ef;
            color: var(--upcoming);
        }

        .folder-card.drag-over {
            background: var(--accent-light);
            border: 2px dashed var(--accent);
            transform: scale(1.01);
        }

        .task-item.dragging {
            opacity: 0.4;
            transform: scale(0.96);
        }

        .task-item[draggable="true"] {
            cursor: grab;
        }

        .task-item[draggable="true"]:active {
            cursor: grabbing;
        }

        .folder-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 4px;
        }

        .folder-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .folder-card:active {
            transform: scale(0.98);
            background: var(--bg);
        }

        .folder-icon {
            font-size: 34px;
            width: 44px;
            text-align: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .folder-info {
            flex: 1;
            min-width: 0;
        }

        .folder-name {
            font-size: 16px;
            font-weight: 600;
            word-wrap: break-word;
            letter-spacing: -0.2px;
        }

        .folder-stats {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
            flex-wrap: wrap;
            align-items: center;
        }

        .stat-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .stat-active {
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .stat-completed {
            color: var(--danger);
            background: var(--danger-light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .task-filter {
            display: flex;
            margin-bottom: 10px;
            background: var(--bg);
            border-radius: 24px;
            padding: 4px;
        }

        .task-filter-btn {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            transition: all .2s;
            font-family: var(--font);
        }

        .task-filter-btn.active {
            background: var(--card);
            color: var(--accent);
            font-weight: 700;
            box-shadow: var(--shadow);
        }

        .task-filter-btn .count {
            font-size: 10px;
            opacity: 0.6;
            margin-left: 4px;
        }

        .btn-sm {
            padding: 8px 16px;
            border-radius: 22px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--font);
            letter-spacing: -0.2px;
        }

        .btn-sm:hover {
            opacity: 0.85;
        }

        .btn-sm:active {
            transform: scale(0.95);
        }

        .btn-add {
            background: var(--accent-light);
            color: var(--accent);
        }

        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
        }

        .btn-email {
            background: #e8f0fe;
            color: #1a73e8;
        }

        .btn-xs {
            padding: 2px 6px;
            border-radius: 8px;
            border: none;
            font-size: 10px;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-xs:hover {
            background: var(--border);
        }

        .input {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 24px;
            border: 2px solid var(--border);
            font-size: 15px;
            font-family: var(--font);
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .input:focus {
            border-color: var(--accent);
        }

        .input-time {
            padding: 12px 14px;
            border-radius: 24px;
            border: 2px solid var(--border);
            font-size: 14px;
            font-family: var(--font);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            max-width: 100px;
            outline: none;
        }

        .input-time:focus {
            border-color: var(--accent);
        }

        .client-card {
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--card);
            border-radius: var(--radius-sm);
            font-size: 15px;
            margin: 4px 0;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            transition: opacity 0.2s, transform 0.2s;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #d5ccc5;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 12px;
        }

        .task-item.completed {
            opacity: 0.45;
            background: var(--bg);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
        }

        .task-item.completed .task-checkbox {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .repeat-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--accent-light);
            color: var(--accent);
            white-space: nowrap;
            font-weight: 500;
        }

        .subtask-list {
            list-style: none;
            padding-left: 26px;
            width: 100%;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 3px 0;
            color: var(--text-secondary);
        }

        .subtask-item.completed .subtask-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .subtask-checkbox {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 1.5px solid #ccc;
            flex-shrink: 0;
            cursor: pointer;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .subtask-item.completed .subtask-checkbox {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .subtask-actions {
            display: flex;
            gap: 2px;
            margin-left: auto;
        }

        .no-tasks {
            text-align: center;
            padding: 28px;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 15px;
            opacity: 0.7;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            font-weight: 500;
        }

        .calendar-day:hover {
            background: var(--bg);
        }

        .calendar-day.today {
            background: var(--accent);
            color: #fff;
            font-weight: 700;
        }

        .calendar-day.has-tasks::after {
            content: '';
            width: 5px;
            height: 5px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            bottom: 3px;
        }

        .calendar-day.today.has-tasks::after {
            background: #fff;
        }

        .calendar-day.selected {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .note-card {
            background: var(--card);
            border-left: 4px solid #f0c8a0;
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border);
        }

        .note-textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-family: var(--font);
            font-size: 15px;
            resize: vertical;
            min-height: 50px;
            outline: none;
            color: var(--text);
        }

        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #3a3a3a;
            color: #fff;
            padding: 12px 24px;
            border-radius: 26px;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .toast.show {
            opacity: 1;
        }

        .folder-card.smart-today {
            border-left: 4px solid var(--accent);
            background: var(--accent-light);
        }

        .folder-card.smart-overdue {
            border-left: 4px solid var(--overdue);
            background: #fef8f8;
        }
        
                 /* ============== ИСПРАВЛЕНИЯ ДЛЯ iOS ============== */
        @supports (-webkit-touch-callout: none) {
            .app-container {
                -webkit-overflow-scrolling: touch;
                padding-bottom: env(safe-area-inset-bottom, 12px);
                padding-top: env(safe-area-inset-top, 12px);
                padding-left: env(safe-area-inset-left, 12px);
                padding-right: env(safe-area-inset-right, 12px);
            }
            
            input, textarea, select {
                font-size: 16px !important;
            }
            
            button {
                -webkit-appearance: none;
            }
            
            .toast {
                bottom: calc(28px + env(safe-area-inset-bottom, 0px));
            }
        }

        /* Улучшенные тач-таргеты (рекомендация Apple: минимум 44x44px) */
        button, [role="button"], .clickable, .icon-btn {
            min-height: 44px;
            min-width: 44px;
        }

        /* Разрешаем выделение текста только в полях ввода */
        input, textarea, [contenteditable] {
            -webkit-user-select: text;
            user-select: text;
        }

        /* Предотвращаем мерцание при прокрутке */
        .app-container {
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
    </style>
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%D0%9C%D0%BE%D0%B8%20%D0%BF%D0%BB%D0%B0%D0%BD%D1%8B%22%2C%22short_name%22%3A%22%D0%9F%D0%BB%D0%B0%D0%BD%D1%8B%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ctext%20y%3D'.9em'%20font-size%3D'90'%3E%F0%9F%93%85%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22any%22%5D%7D%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f3f0%22%2C%22theme_color%22%3A%22%234a90d9%22%7D">

    <!-- Регистрация Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(() => console.log('Service Worker зарегистрирован'))
                    .catch((err) => console.log('Ошибка SW:', err));
            });
        }
    </script>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app-title">Мои планы</div>
        <div class="bg-quote" id="bgQuote"></div>
        
        <div class="custom-quotes">
            <div class="custom-quote-box" id="customQuoteLeft" data-action="edit-custom-quote" data-side="left">💬 Своя цитата слева</div>
            <div class="custom-quote-box" id="customQuoteCenter" data-action="edit-custom-quote" data-side="center">💬 Своя цитата центр</div>
            <div class="custom-quote-box" id="customQuoteRight" data-action="edit-custom-quote" data-side="right">💬 Своя цитата справа</div>
        </div>
        
        <div class="header-actions">
            <button class="icon-btn" id="btnNewFolder" title="Новая папка">📁</button>
            <button class="icon-btn" id="btnNewNote" title="Новая заметка">💡</button>
            <button class="icon-btn" id="btnSearch" title="Поиск">🔍</button>
            <button class="icon-btn" id="btnSync" title="Синхронизировать">🔄</button>
            <button class="icon-btn" id="btnTheme" title="Сменить тему">🌓</button>
            <button class="icon-btn" id="btnExport" title="Экспорт">📤</button>
            <button class="icon-btn" id="btnImport" title="Импорт">📥</button>
        </div>
        
        <div class="tabs" id="mainTabs">
            <div class="tab active" data-tab="tasks">📂 Папки</div>
            <div class="tab" data-tab="calendar">📅 Календарь</div>
            <div class="tab" data-tab="stats">📊 Статистика</div>
            <div class="tab" data-tab="ai">🧠 ИИ</div>
            <div class="tab" data-tab="clients">👥 Клиенты</div>
            <div class="tab" data-tab="ideas">💡 Идеи</div>
        </div>

        <!-- Секция задач -->
        <div class="section active" id="section-tasks">
            <div class="search-container" id="searchContainer" style="display:none;">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по всем задачам..." autocomplete="off">
                <div class="search-stats" id="searchStats"></div>
            </div>
            <div id="folderList"></div>
