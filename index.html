                buttons.innerHTML =
                    '<div style="padding:4px 0;"><span style="font-size:13px;color:var(--text);">✏️ Название приложения</span>' +
                    '<input type="text" id="settingsAppName" value="' + Utils.escapeHtml(s.appName || 'День за днём') + '" onchange="App._updateSetting(\'appName\', this.value)" style="width:100%;padding:12px 16px;border-radius:24px;border:1.5px solid var(--border);font-size:15px;font-family:var(--font);background:rgba(46,44,41,0.9);color:var(--text);outline:none;margin:4px 0 8px;box-sizing:border-box;"></div>' +
                    '<div class="settings-divider"></div>' +
                    '<div class="settings-row"><span>📅 Календарь</span><button class="settings-toggle' + (s.showCalendar !== false ? ' on' : '') + '" onclick="App._toggleSetting(\'showCalendar\', this)"></button></div>' +
                    '<div class="settings-row"><span>📊 Статистика</span><button class="settings-toggle' + (s.showStats !== false ? ' on' : '') + '" onclick="App._toggleSetting(\'showStats\', this)"></button></div>' +
                    '<div class="settings-row"><span>🧠 ИИ</span><button class="settings-toggle' + (s.showAI !== false ? ' on' : '') + '" onclick="App._toggleSetting(\'showAI\', this)"></button></div>' +
                    '<div class="settings-row"><span>👥 Дни рождения</span><button class="settings-toggle' + (s.showClients !== false ? ' on' : '') + '" onclick="App._toggleSetting(\'showClients\', this)"></button></div>' +
                    '<div class="settings-row"><span>💡 Идеи</span><button class="settings-toggle' + (s.showIdeas !== false ? ' on' : '') + '" onclick="App._toggleSetting(\'showIdeas\', this)"></button></div>' +
                    '<div class="settings-divider"></div>' +
                    '<div class="settings-row"><span>📅 Обзор недели</span><button class="settings-toggle' + (s.showWeekOverview !== false ? ' on' : '') + '" onclick="App._toggleSetting(\'showWeekOverview\', this)"></button></div>' +
                    '<button class="settings-close" onclick="App._closePanel()">Закрыть</button>';
                
                panel.style.position = 'fixed';
                panel.style.top = '50%';
                panel.style.left = '50%';
                panel.style.transform = 'translate(-50%, -50%)';
                panel.style.maxWidth = '360px';
                panel.style.width = '90%';
                
                overlay.style.display = 'block';
                panel.style.display = 'block';
            },
            
            _applyPreset: function(name) {
                const preset = THEME_PRESETS[name];
                if (!preset) return;
                Object.keys(preset).forEach(key => document.documentElement.style.setProperty(key, preset[key]));
                localStorage.setItem('theme_preset', name);
                localStorage.removeItem('custom_theme');
                UI.showToast('🎨 Тема: ' + name);
                const buttons = getEl('actionPanelButtons');
                if (buttons && buttons.style.display !== 'none') {
                    const btns = buttons.querySelectorAll('button[onclick*="_applyPreset"]');
                    btns.forEach(btn => {
                        const presetName = btn.textContent.toLowerCase();
                        btn.style.border = '2px solid ' + (presetName === name ? 'var(--accent)' : 'rgba(255,255,255,0.5)');
                    });
                }
                const label = document.getElementById('customColorLabel');
                if (label) label.style.fontWeight = '400';
            },
            
            _applyCustomColor: function(color) {
                if (!color || !color.startsWith('#')) return;
                const root = document.documentElement;
                
                // Берём за основу basic и меняем акцент
                const base = THEME_PRESETS['basic'];
                Object.keys(base).forEach(key => {
                    if (key === '--accent') {
                        root.style.setProperty(key, color);
                    } else if (key === '--accent-light') {
                        root.style.setProperty(key, color + '33');
                    } else {
                        root.style.setProperty(key, base[key]);
                    }
                });
                
                localStorage.setItem('custom_theme', color);
                UI.showToast('🎨 Своя тема: ' + color);
                const picker = document.getElementById('customColorInput');
                if (picker) picker.value = color;
                const label = document.getElementById('customColorLabel');
                if (label) label.style.fontWeight = '700';
                const buttons = getEl('actionPanelButtons');
                if (buttons && buttons.style.display !== 'none') {
                    const btns = buttons.querySelectorAll('button[onclick*="_applyPreset"]');
                    btns.forEach(btn => {
                        btn.style.border = '2px solid rgba(255,255,255,0.5)';
                    });
                }
            },
            
            _pickPhoto: function() {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'image/*';
                inp.onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 500000) { UI.showToast('❌ Фото слишком большое (макс 500 КБ)'); return; }
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.body.style.backgroundImage = 'url(' + ev.target.result + ')';
                        document.body.classList.add('bg-image');
                        localStorage.setItem('bg_image', ev.target.result);
                        UI.showToast('🖼️ Фон обновлён');
                    };
                    reader.readAsDataURL(file);
                };
                inp.click();
            },

            _updateOpacity: function(val) {
                const num = parseInt(val) / 100;
                document.documentElement.style.setProperty('--opacity-card', num);
                document.documentElement.style.setProperty('--opacity-tabs', num);
                document.documentElement.style.setProperty('--opacity-btn', num);
                localStorage.setItem('opacity', num);
                const pct = document.getElementById('opacityValue');
                if (pct) pct.textContent = val + '%';
            },

            _settings: JSON.parse(localStorage.getItem('app_settings') || '{}'),
            
            _toggleSetting: function(key, btn) {
                this._settings[key] = !this._settings[key];
                localStorage.setItem('app_settings', JSON.stringify(this._settings));
                btn.classList.toggle('on');
                this._applySettings();
            },
            
            _updateSetting: function(key, value) {
                this._settings[key] = value;
                localStorage.setItem('app_settings', JSON.stringify(this._settings));
                this._applySettings();
            },
            
            _applySettings: function() {
                const s = this._settings;
                
                const titleEl = document.querySelector('.app-title');
                if (titleEl) titleEl.textContent = s.appName || 'День за днём';
                document.title = s.appName || 'Мои планы';
                
                const tabMap = {
                    showCalendar: 'calendar',
                    showStats: 'stats',
                    showAI: 'ai',
                    showClients: 'clients',
                    showIdeas: 'ideas'
                };
                Object.keys(tabMap).forEach(key => {
                    const tab = document.querySelector('#mainTabs .tab[data-tab="' + tabMap[key] + '"]');
                    if (tab) tab.style.display = (s[key] !== false) ? '' : 'none';
                });
                
                const wo = document.getElementById('weekOverview');
                if (wo) {
                    if (s.showWeekOverview === false) {
                        wo.style.display = 'none';
                    } else {
                        wo.style.display = 'flex';
                    }
                }
            }
         };
       

        // ========================================
        // НАСТРОЙКА ОБРАБОТЧИКОВ СОБЫТИЙ
        // ========================================
        function setupEventListeners() {
            document.addEventListener('click', function(e) {
                const t = e.target.closest('[data-action]');
                if (!t) return;
                const action = t.dataset.action;
                e.preventDefault();
                try { handleAction(action, t.dataset); } catch (err) {
                    console.error('Action error:', action, err);
                    UI.showToast('❌ Ошибка');
                }
            });

            getEl('btnAddTask').addEventListener('click', Actions.addTask);
            getEl('btnAddFolder').addEventListener('click', Actions.addFolder);
            getEl('btnToggleView').addEventListener('click', function(e) {
                e.stopPropagation();
                const dd = getEl('viewDropdown');
                dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
            });
            
            // Закрытие дропдауна по клику вне
            document.addEventListener('click', function(e) {
                if (!e.target.closest('#btnToggleView') && !e.target.closest('#viewDropdown')) {
                    const dd = getEl('viewDropdown');
                    if (dd) dd.style.display = 'none';
                }
            });
            
            // Выбор вида из дропдауна
            getEl('viewDropdown').addEventListener('click', function(e) {
                const btn = e.target.closest('button');
                if (!btn) return;
                const newMode = btn.dataset.view;
                State.setFolderViewMode(newMode);
                State.save();
                UI.renderFolderList();
                this.style.display = 'none';
                UI.showToast(newMode === 'list' ? 'Список' : 'Сетка');
            });
            getEl('btnEditFolder').addEventListener('click', Actions.editFolder);
            getEl('btnAddClient').addEventListener('click', Actions.addClient);
            getEl('btnAddNote').addEventListener('click', Actions.addNote);
            getEl('btnSearchMenu').addEventListener('click', function() {
                getEl('menuDropdown').classList.remove('show');
                Actions.toggleSearch();
            });
            getEl('btnNotifyMenu').addEventListener('click', function() {
                getEl('menuDropdown').classList.remove('show');
                Actions.requestNotification();
            });
            getEl('btnBackToFolders').addEventListener('click', Actions.goBackToFolders);
            getEl('btnNewFolderMenu').addEventListener('click', Actions.addFolder);
            getEl('btnNewNoteMenu').addEventListener('click', function() {
                document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
                document.querySelector('#mainTabs .tab[data-tab="ideas"]').classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                getEl('section-ideas').classList.add('active');
                UI.renderAll();
                setTimeout(() => getEl('noteText').focus(), 200);
            });
            getEl('btnThemeCustom').addEventListener('click', function() {
                getEl('menuDropdown').classList.remove('show');
                getEl('appearanceSubmenu').style.display = 'none';
                Actions.changeTheme();
            });
            getEl('btnExportMenu').addEventListener('click', Actions.exportData);
            getEl('btnImportMenu').addEventListener('click', Actions.importData);
            getEl('btnOpacityMenu').addEventListener('click', function() {
                getEl('menuDropdown').classList.remove('show');
                getEl('appearanceSubmenu').style.display = 'none';
                
                const overlay = getEl('actionOverlay');
                const panel = getEl('actionPanel');
                const title = getEl('actionPanelTitle');
                const buttons = getEl('actionPanelButtons');
                
                const currentOpacity = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--opacity-card').trim()) || 0.75;
                
                title.textContent = '🔲 Прозрачность';
                title.style.display = 'block';
                
                buttons.innerHTML =
                    '<div id="opacityValue" style="text-align:center;font-size:24px;margin:8px 0;color:var(--text);">' + Math.round(currentOpacity * 100) + '%</div>' +
                    '<input type="range" id="opacitySlider" min="10" max="100" value="' + Math.round(currentOpacity * 100) + '" style="width:100%;margin:8px 0;" oninput="App._updateOpacity(this.value)">' +
                    '<button class="settings-close" onclick="App._closePanel()">Закрыть</button>';
                
                panel.style.position = 'fixed';
                panel.style.top = '50%';
                panel.style.left = '50%';
                panel.style.transform = 'translate(-50%, -50%)';
                panel.style.maxWidth = '360px';
                panel.style.width = '90%';
                
                overlay.style.display = 'block';
                panel.style.display = 'block';
            });
            
            getEl('btnSettingsMenu').addEventListener('click', function() {
                App.showSettingsPanel();
            });
            
            getEl('btnAppearanceMenu').addEventListener('click', function(e) {
                e.stopPropagation();
                const sub = getEl('appearanceSubmenu');
                const arrow = this.querySelector('span:last-child');
                if (sub.style.display === 'none' || sub.style.display === '') {
                    sub.style.display = 'block';
                    arrow.textContent = '▲';
                } else {
                    sub.style.display = 'none';
                    arrow.textContent = '▼';
                }
            });
            
            getEl('btnMenu').addEventListener('click', function(e) {
                e.stopPropagation();
                getEl('menuDropdown').classList.toggle('show');
            });
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.menu-wrapper')) getEl('menuDropdown').classList.remove('show');
            });

            getEl('btnPrevMonth').addEventListener('click', function() {
                AppState.calendarMonth--;
                if (AppState.calendarMonth < 0) { AppState.calendarMonth = 11; AppState.calendarYear--; }
                AppState.selectedDate = null;
                UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, null);
            });
            getEl('btnNextMonth').addEventListener('click', function() {
                AppState.calendarMonth++;
                if (AppState.calendarMonth > 11) { AppState.calendarMonth = 0; AppState.calendarYear++; }
                AppState.selectedDate = null;
                UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, null);
            });

            document.querySelectorAll('#mainTabs .tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    const tn = this.dataset.tab;
                    document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    getEl('section-' + tn).classList.add('active');

                    if (tn === 'tasks') { getEl('searchContainer').style.display = 'none'; UI.renderAll(); }
                    else if (tn === 'calendar') { UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, AppState.selectedDate); }
                    else if (tn === 'stats') { UI.renderStats(); }
                });
            });

            (getEl('taskFilter') || {}).addEventListener?.('click', function(e) {
                const b = e.target.closest('.task-filter-btn');
                if (b) Actions.setTaskFilter(b.dataset.filter);
            });

            const tr = getEl('taskRepeat'), trd = getEl('taskRepeatDays');
            if (tr && trd) tr.addEventListener('change', function() {
                trd.style.display = this.value === 'custom' ? 'inline' : 'none';
            });

            const phoneInput = getEl('clientPhone');
            if (phoneInput) {
                phoneInput.addEventListener('input', function() {
                    let val = this.value.replace(/\D/g, '');
                    if (!val) return;
                    if (val.length === 11 && val.startsWith('8')) val = '7' + val.slice(1);
                    if (val.length > 11) val = val.slice(0, 11);
                    let formatted = '+7';
                    if (val.length > 1) formatted += ' (' + val.slice(1, 4);
                    if (val.length >= 4) formatted += ') ' + val.slice(4, 7);
                    if (val.length >= 7) formatted += '-' + val.slice(7, 9);
                    if (val.length >= 9) formatted += '-' + val.slice(9, 11);
                    this.value = formatted;
                });
            }

            const si = getEl('searchInput');
            if (si) {
                si.addEventListener('input', Actions.updateSearchResults);
                si.addEventListener('keydown', function(e) { if (e.key === 'Escape') Actions.toggleSearch(); });
            }

            let noteTimeout;
            document.addEventListener('input', function(e) {
                if (!e.target.classList.contains('note-textarea')) return;
                clearTimeout(noteTimeout);
                noteTimeout = setTimeout(function() {
                    const n = State.getNoteById(e.target.dataset.noteId);
                    if (n) { n.text = e.target.value; n.updatedAt = Date.now(); State.save(); }
                }, 600);
            });

            const stb = getEl('scrollTopBtn');
            window.addEventListener('scroll', function() { stb.classList.toggle('visible', window.scrollY > 300); });
            stb.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

            if ('Notification' in window && Notification.permission === 'granted') {
                setInterval(function() {
                    Services.getTasksForNotification().forEach(function(t) {
                        const min = Math.ceil((new Date(t.date + 'T' + t.time) - new Date()) / 60000);
                        new Notification('⏰ Напоминание', { body: '«' + t.text + '» через ' + min + ' мин.', tag: t.id });
                    });
                }, 300000);
            }

            getEl('actionPanel').addEventListener('click', function(e) {
                if (e.target === this) { this.style.display = 'none'; getEl('actionOverlay').style.display = 'none'; }
            });
        }

        // ========================================
        // МАРШРУТИЗАЦИЯ ДЕЙСТВИЙ
        // ========================================
        function handleAction(action, ds) {
            switch (action) {
                case A.OPEN_FOLDER: Actions.openFolder(ds.folderId); break;
                case A.CHANGE_ICON: Actions.changeFolderIcon(ds.folderId); break;
                case A.TOGGLE_TASK: Actions.toggleTask(ds.taskId); break;
                case A.EDIT_TASK: Actions.editTask(ds.taskId); break;
                case A.DELETE_TASK: Actions.deleteTask(ds.taskId); break;
                case A.DELETE_FOREVER: Actions.deleteForever(ds.taskId); break;
                case A.RESTORE_TASK: Actions.restoreTask(ds.taskId); break;
                case A.DUPLICATE_TASK: Actions.duplicateTask(ds.taskId); break;
                case A.MOVE_TO_TOMORROW: Actions.moveToTomorrow(ds.taskId); break;
                case A.ADD_SUBTASK: Actions.addSubtask(ds.taskId); break;
                case A.EDIT_SUBTASK: Actions.editSubtask(ds.taskId, ds.subtaskId); break;
                case A.DELETE_SUBTASK: Actions.deleteSubtask(ds.taskId, ds.subtaskId); break;
                case A.TOGGLE_SUBTASK: Actions.toggleSubtask(ds.taskId, ds.subtaskId); break;
                case A.SET_PRIORITY: Actions.setPriority(ds.taskId, parseInt(ds.priority)); break;
                case A.EDIT_CLIENT: Actions.editClient(ds.clientId); break;
                case A.EMAIL_CLIENT: Actions.emailClient(ds.clientId); break;
                case A.DELETE_CLIENT: Actions.deleteClient(ds.clientId); break;
                case A.SELECT_DATE:
                    AppState.selectedDate = ds.date;
                    UI.renderCalendar(AppState.calendarYear, AppState.calendarMonth, AppState.selectedDate);
                    break;
                case A.EDIT_CUSTOM_QUOTE: Actions.editCustomQuote(ds.side); break;
                case A.DELETE_NOTE: Actions.deleteNote(ds.noteId); break;
                case A.DELETE_FOLDER: Actions.deleteFolder(ds.folderId); break;
            }
        }

        // ========================================
        // ГЛОБАЛЬНОЕ СОСТОЯНИЕ КАЛЕНДАРЯ
        // ========================================
        const AppState = {
            calendarYear: new Date().getFullYear(),
            calendarMonth: new Date().getMonth(),
            selectedDate: null
        };

        // ========================================
        // ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ
        // ========================================
        function initialize() {
            try {
                const savedPreset = localStorage.getItem('theme_preset');
                if (savedPreset && THEME_PRESETS[savedPreset]) {
                    const preset = THEME_PRESETS[savedPreset];
                    Object.keys(preset).forEach(key => document.documentElement.style.setProperty(key, preset[key]));
                }
                const savedColor = localStorage.getItem('custom_theme');
                if (savedColor) {
                    document.documentElement.style.setProperty('--accent', savedColor);
                    document.documentElement.style.setProperty('--accent-light', savedColor + '33');
                }
                const savedBg = localStorage.getItem('bg_image');
                if (savedBg) {
                    if (savedBg.length > 500000) {
                        localStorage.removeItem('bg_image');
                    } else {
                        document.body.style.backgroundImage = 'url(' + savedBg + ')';
                        document.body.classList.add('bg-image');
                    }
                }
                const savedOpacity = localStorage.getItem('opacity');
                if (savedOpacity) {
                    document.documentElement.style.setProperty('--opacity-card', savedOpacity);
                    document.documentElement.style.setProperty('--opacity-tabs', savedOpacity);
                    document.documentElement.style.setProperty('--opacity-btn', savedOpacity);
                }

                // Чистим старый ключ темы
                localStorage.removeItem('theme');

                State.load();
                App._applySettings();
                
                const currentMode = State.getFolderViewMode();
                const viewIcon = currentMode === 'list' ? '📋' : '🔲';
                const viewLabel = currentMode === 'list' ? 'Список' : 'Сетка';
                const viewBtn = getEl('btnViewMenu');
                if (viewBtn) viewBtn.innerHTML = '<span class="menu-icon">' + viewIcon + '</span> Вид: ' + viewLabel;
                
                Services.processRepeats();
                setupEventListeners();
                
                UI.renderAll({ year: AppState.calendarYear, month: AppState.calendarMonth, selectedDate: AppState.selectedDate });
                State.save();
            } catch (e) { console.error('Init error:', e); }

            setTimeout(() => {
                const quoteEl = getEl('bgQuote');
                if (quoteEl) {
                    quoteEl.textContent = '«' + QUOTES[Math.floor(Math.random() * QUOTES.length)] + '»';
                    quoteEl.style.opacity = '1';
                    quoteEl.style.color = '#e8e4dd';
                    quoteEl.style.display = 'block';
                }
                setInterval(() => {
                    const el = getEl('bgQuote');
                    if (el) {
                        el.textContent = '«' + QUOTES[Math.floor(Math.random() * QUOTES.length)] + '»';
                        el.style.opacity = '1';
                    }
                }, 30000);
            }, 1000);
        }

        // Запуск
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initialize);
        else initialize();
    })();
    </script>
</body>
</html>
