                    if (Array.isArray(f.tasks)) {
                        f.tasks.forEach(t => {
                            if (t) result.push({ ...t, folderId: f.id, folderName: f.name, folderIcon: f.icon || DEFAULT_FOLDER_ICON });
                        });
                    }
                });
                return result;
            },
            findTaskById(id) {
                for (const f of State.getFolders()) {
                    if (Array.isArray(f.tasks)) {
                        const t = f.tasks.find(t => t && t.id === id);
                        if (t) return { task: t, folder: f };
                    }
                }
                return null;
            },
            isSmartFolder(id) { return id === SMART_FOLDERS.TODAY || id === SMART_FOLDERS.OVERDUE || id === SMART_FOLDERS.TRASH; },
            getValidTasksArray(t) { return Array.isArray(t) ? t.filter(t => t !== null && t !== undefined) : []; }
        });

        // ========================================
        // УПРАВЛЕНИЕ ДАННЫМИ (STATE)
        // ========================================
        const State = (() => {
            let data = {
                folders: [], notes: [], clients: [], currentFolderId: null,
                customQuotes: { left: '', center: '', right: '' },
                currentTaskFilter: FILTERS.ACTIVE, folderViewMode: 'list'
            };

            function load() {
                try {
                    // Пробуем загрузить из новой версии хранилища
                    let saved = localStorage.getItem(STORAGE_KEY);
                    // Если данных нет, пробуем старую версию
                    if (!saved) {
                        saved = localStorage.getItem('my_plans_v18');
                        if (saved) {
                            // Переносим данные в новое хранилище
                            localStorage.setItem(STORAGE_KEY, saved);
                        }
                    }
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed && typeof parsed === 'object') data = parsed;
                    }
                } catch (e) { /* данные повреждены, используем значения по умолчанию */ }

                data.folders = Array.isArray(data.folders) ? data.folders : [];
                data.notes = Array.isArray(data.notes) ? data.notes : [];
                data.clients = Array.isArray(data.clients) ? data.clients : [];
                data.customQuotes = data.customQuotes || { left: '', center: '', right: '' };
                data.currentTaskFilter = data.currentTaskFilter === FILTERS.COMPLETED ? FILTERS.COMPLETED : FILTERS.ACTIVE;
                data.folderViewMode = data.folderViewMode || 'list';

                data.folders.forEach(f => {
                    if (!f.icon) f.icon = DEFAULT_FOLDER_ICON;
                    f.tasks = Utils.getValidTasksArray(f.tasks);
                    f.tasks.forEach(t => {
                        if (!Array.isArray(t.subtasks)) t.subtasks = [];
                        if (t.priority === undefined || t.priority === null) t.priority = 0;
                    });
                });
            }

            function save() {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); updateTitle(); } catch (e) {}
            }

            function updateTitle() {
                const active = data.folders
                    .filter(f => f.id !== SMART_FOLDERS.TRASH)
                    .reduce((s, f) => s + Utils.getFolderStats(f).active, 0);
                document.title = active > 0 ? `(${active}) Мои планы` : 'Мои планы';
            }

            return {
                load, save,
                getFolders: () => data.folders,
                getNotes: () => data.notes,
                getClients: () => data.clients,
                getCurrentFolderId: () => data.currentFolderId,
                getCustomQuotes: () => ({ ...data.customQuotes }),
                getCurrentTaskFilter: () => data.currentTaskFilter,
                getFolderViewMode: () => data.folderViewMode,
                setCurrentFolderId: (id) => { data.currentFolderId = id; },
                setCurrentTaskFilter: (f) => { if (f === FILTERS.ACTIVE || f === FILTERS.COMPLETED) data.currentTaskFilter = f; },
                setFolderViewMode: (m) => { data.folderViewMode = m; },
                setCustomQuote: (s, t) => { if (['left', 'center', 'right'].includes(s)) data.customQuotes[s] = t; },
                getFolderById: (id) => data.folders.find(f => f.id === id),
                addFolder: (f) => { data.folders.push(f); },
                removeFolder: (id) => { data.folders = data.folders.filter(f => f.id !== id); },
                getClientById: (id) => data.clients.find(c => c.id === id),
                addClient: (c) => { data.clients.push(c); },
                removeClient: (id) => { data.clients = data.clients.filter(c => c.id !== id); },
                addNote: (n) => { data.notes.unshift(n); },
                removeNote: (id) => { data.notes = data.notes.filter(n => n.id !== id); },
                getNoteById: (id) => data.notes.find(n => n.id === id)
            };
        })();

        // ========================================
        // БИЗНЕС-ЛОГИКА (SERVICES)
        // ========================================
        const Services = (() => {
            function getTodayTasks() {
                const todayISO = Utils.getTodayISO();
                const result = [];

                State.getFolders().forEach(f => {
                    if (f.id === SMART_FOLDERS.TRASH) return;
                    Utils.getValidTasksArray(f.tasks).forEach(t => {
                        if (!t.completed && t.date === todayISO)
                            result.push({ ...t, folderId: f.id, folderName: f.name, folderIcon: f.icon, type: TASK_TYPES.TASK });
                    });
                });

                State.getClients().forEach(c => {
                    if (!c || !c.date) return;
                    const bd = Utils.getNextBirthday(c.date);
                    if (!bd) return;
                    if (Utils.formatDateISO(bd) === todayISO) {
                        const age = Utils.getAge(c.date, bd);
                        result.push({
                            id: 'bd_' + c.id, text: `${c.name} — ${age} ${Utils.getAgeWord(age)}`,
                            date: todayISO, time: '', completed: false, subtasks: [],
                            repeat: 'yearly', repeatDays: 0, priority: 3,
                            folderId: SMART_FOLDERS.TODAY, folderName: 'Дни рождения', folderIcon: '🎂', type: TASK_TYPES.BIRTHDAY
                        });
                    }
                });

                result.sort((a, b) => (b.priority || 0) - (a.priority || 0) || (a.time && b.time ? a.time.localeCompare(b.time) : a.time ? -1 : 1));
                return result;
            }

            function getOverdueTasks() {
                const todayISO = Utils.getTodayISO();
                const result = [];
                State.getFolders().forEach(f => {
                    if (f.id === SMART_FOLDERS.TRASH) return;
                    Utils.getValidTasksArray(f.tasks).forEach(t => {
                        if (!t.completed && t.date && t.date < todayISO)
                            result.push({ ...t, folderId: f.id, folderName: f.name, folderIcon: f.icon, type: TASK_TYPES.TASK });
                    });
                });
                result.sort((a, b) => a.date.localeCompare(b.date));
                return result;
            }

            function getTasksForSmartFolder(id) {
                if (id === SMART_FOLDERS.TODAY) return getTodayTasks();
                if (id === SMART_FOLDERS.OVERDUE) return getOverdueTasks();
                return [];
            }

            function processRepeats() {
                const now = new Date(); now.setHours(0, 0, 0, 0);
                let hasChanges = false;

                State.getFolders().forEach(f => {
                    if (f.id === SMART_FOLDERS.TRASH) return;
                    const snapshot = [...f.tasks];
                    snapshot.forEach(task => {
                        if (!task || !task.completed || !task.repeat || !task.date) return;
                        if (task.type === TASK_TYPES.BIRTHDAY) return;
                        try {
                            const d = Utils.parseDate(task.date);
                            if (!d) return;
                            const next = new Date(d);
                            switch (task.repeat) {
                                case 'daily': next.setDate(next.getDate() + 1); break;
                                case 'weekly': next.setDate(next.getDate() + 7); break;
                                case 'monthly': next.setMonth(next.getMonth() + 1); break;
                                case 'yearly': next.setFullYear(next.getFullYear() + 1); break;
                                case 'custom':
                                    if (task.repeatDays > 0) next.setDate(next.getDate() + task.repeatDays);
                                    else return;
                                    break;
                                default: return;
                            }
                            if (next <= d) return;
                            const nextISO = Utils.formatDateISO(next);
                            if (f.tasks.some(x => x && x.text === task.text && x.date === nextISO && !x.completed)) return;

                            f.tasks.push({
                                id: Utils.generateId(), text: task.text, date: nextISO, time: task.time,
                                completed: false,
                                subtasks: Utils.getValidTasksArray(task.subtasks).map(st => ({ id: Utils.generateId(), text: st.text, completed: false })),
                                repeat: task.repeat, repeatDays: task.repeatDays, priority: task.priority || 0
                            });

                            const original = f.tasks.find(x => x.id === task.id);
                            if (original) { original.repeat = ''; original.repeatDays = 0; }
                            hasChanges = true;
                        } catch (e) {}
                    });
                });

                if (hasChanges) State.save();
            }

            function searchTasks(q) {
                if (!q) return [];
                const lq = q.toLowerCase().trim();
                return Utils.getAllTasksWithFolders().filter(t =>
                    t.text.toLowerCase().includes(lq) ||
                    (t.folderName && t.folderName.toLowerCase().includes(lq))
                );
            }

            function getCalendarData(y, m) {
                const firstDay = new Date(y, m, 1);
                let startOffset = firstDay.getDay() || 7;
                startOffset -= 1;
                const daysInMonth = new Date(y, m + 1, 0).getDate();
                const todayISO = Utils.getTodayISO();
                const days = [];

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = Utils.formatDateISO(new Date(y, m, d));
                    days.push({ day: d, dateStr, isToday: dateStr === todayISO, hasTasks: checkDateHasTasks(dateStr) });
                }
                return { startOffset, days, daysInMonth };
            }

            function checkDateHasTasks(dateStr) {
                const hasFolderTasks = State.getFolders().some(f =>
                    f.id !== SMART_FOLDERS.TRASH &&
                    Utils.getValidTasksArray(f.tasks).some(t => t && t.date === dateStr && !t.completed)
                );
                const today = new Date(); today.setHours(0, 0, 0, 0);
                const hasBirthday = State.getClients().some(c => {
                    if (!c || !c.date) return false;
                    const bd = Utils.getNextBirthday(c.date);
                    return bd && Utils.formatDateISO(bd) === dateStr;
                });
                return hasFolderTasks || hasBirthday;
            }

            function getTasksForDate(dateStr) {
                const result = [];
                const keys = new Set();

                State.getFolders().forEach(f => {
                    if (f.id === SMART_FOLDERS.TRASH) return;
                    Utils.getValidTasksArray(f.tasks).forEach(t => {
                        if (!t || t.date !== dateStr || t.completed) return;
                        const k = `task_${t.id}`;
                        if (!keys.has(k)) {
                            keys.add(k);
                            result.push({ text: t.text, type: TASK_TYPES.TASK, folder: f.name, icon: f.icon, time: t.time || '' });
                        }
                    });
                });

                State.getClients().forEach(c => {
                    if (!c || !c.date) return;
                    const bd = Utils.getNextBirthday(c.date);
                    if (!bd) return;
                    if (Utils.formatDateISO(bd) !== dateStr) return;
                    const k = `bd_${c.name.toLowerCase()}_${c.date}`;
                    if (!keys.has(k)) {
                        keys.add(k);
                        const age = Utils.getAge(c.date, bd);
                        result.push({ text: `${c.name} — ${age} ${Utils.getAgeWord(age)}`, type: TASK_TYPES.BIRTHDAY });
                    }
                });

                return result;
            }

            function getStats() {
                const allTasks = Utils.getAllTasksWithFolders().filter(t => t.folderId !== SMART_FOLDERS.TRASH);
                const total = allTasks.length;
                const completed = allTasks.filter(t => t.completed).length;
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

                const folderStats = State.getFolders()
                    .filter(f => f.id !== SMART_FOLDERS.TRASH)
                    .map(f => {
                        const s = Utils.getFolderStats(f);
                        return { icon: f.icon || DEFAULT_FOLDER_ICON, name: f.name, completed: s.completed, total: s.total };
                    });

                return { total, completed, percent, folderStats };
            }

            function getUpcomingBirthdays(days = 7) {
                const today = new Date(); today.setHours(0, 0, 0, 0);
                return State.getClients()
                    .filter(c => {
                        if (!c || !c.date) return false;
                        const b = Utils.getNextBirthday(c.date);
                        if (!b) return false;
                        const df = Math.ceil((b - today) / 86400000);
                        return df >= 0 && df <= days;
                    })
                    .map(c => {
                        const b = Utils.getNextBirthday(c.date);
                        const age = Utils.getAge(c.date, b);
                        return { name: c.name, daysUntil: Math.ceil((b - today) / 86400000), age };
                    });
            }

            function getClientsSorted() {
                const today = new Date(); today.setHours(0, 0, 0, 0);
                return [...State.getClients()]
                    .sort((a, b) => {
                        const ba = Utils.getNextBirthday(a.date), bb = Utils.getNextBirthday(b.date);
                        if (!ba || !bb) return 0;
                        return ba - bb;
                    })
                    .map(c => {
                        const b = Utils.getNextBirthday(c.date);
                        if (!b) return null;
                        return { ...c, birthday: b, age: Utils.getAge(c.date, b), daysUntil: Math.ceil((b - today) / 86400000) };
                    })
                    .filter(c => c !== null);
            }
            
            function getTasksForNotification() {
                const now = new Date();
                const oneHourLater = new Date(now.getTime() + 3600000);
                const result = [];
                const todayISO = Utils.formatDateISO(new Date());
                
                State.getFolders().forEach(f => {
                    if (f.id === SMART_FOLDERS.TRASH) return;
                    Utils.getValidTasksArray(f.tasks).forEach(t => {
                        if (!t || t.completed || !t.date) return;
                        
                        // Задачи с временем — уведомление за час
                        if (t.time) {
                            const dt = new Date(t.date + 'T' + t.time);
                            if (!isNaN(dt.getTime()) && dt > now && dt <= oneHourLater) {
                                result.push({ ...t, folderName: f.name });
                            }
                        } 
                        // Задачи без времени, но на сегодня — уведомление в 9:00
                        else if (t.date === todayISO) {
                            const nineAM = new Date();
                            nineAM.setHours(9, 0, 0, 0);
                            const nineTen = new Date();
                            nineTen.setHours(9, 10, 0, 0);
                            if (now >= nineAM && now <= nineTen) {
                                result.push({ ...t, folderName: f.name });
                            }
                        }
                    });
                });
                
                return result;
            }

            function getWeekData() {
                const today = new Date();
                const dow = today.getDay();
                const monday = new Date(today);
                monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
                const days = [];

                for (let i = 0; i < 7; i++) {
                    const d = new Date(monday); d.setDate(monday.getDate() + i);
                    const dateStr = Utils.formatDateISO(d);

                    const folderCount = State.getFolders()
                        .filter(f => f.id !== SMART_FOLDERS.TRASH)
                        .reduce((s, f) => s + Utils.getValidTasksArray(f.tasks).filter(t => t && !t.completed && t.date === dateStr).length, 0);

                    const birthdayCount = State.getClients().filter(c => {
                        if (!c || !c.date) return false;
                        const bd = Utils.getNextBirthday(c.date);
                        return bd && Utils.formatDateISO(bd) === dateStr;
                    }).length;

                    days.push({
                        date: d, dateStr, dayName: DAYS_OF_WEEK[d.getDay()],
                        dayOfMonth: d.getDate(), count: folderCount + birthdayCount,
                        isToday: dateStr === Utils.getTodayISO()
                    });
                }

                return days;
            }

            return {
                getTodayTasks, getOverdueTasks, getTasksForSmartFolder, processRepeats,
                searchTasks, getCalendarData, getTasksForDate, getStats,
                getUpcomingBirthdays, getClientsSorted, getTasksForNotification, getWeekData
            };
        })();

        // ========================================
        // UI (ОТРИСОВКА)
        // ========================================
        const UI = (() => {
            const getEl = (id) => document.getElementById(id);

            function showToast(msg) {
                const t = getEl('toast');
                if (!t) return;
                t.textContent = msg;
                t.classList.add('show');
                clearTimeout(t._timeout);
                t._timeout = setTimeout(() => t.classList.remove('show'), TOAST_DURATION);
            }

            function updateQuote() {
                const el = getEl('bgQuote');
                if (!el) return;
                el.textContent = '«' + QUOTES[Math.floor(Math.random() * QUOTES.length)] + '»';
                el.style.opacity = '1';
            }

            function renderCustomQuotes() {
                const q = State.getCustomQuotes();
                ['left', 'center', 'right'].forEach(s => {
                    const el = getEl('customQuote' + s.charAt(0).toUpperCase() + s.slice(1));
                    if (el) el.textContent = q[s] || '💬 Своя цитата ' + (s === 'left' ? 'слева' : s === 'center' ? 'центр' : 'справа');
                });
            }

            function renderWeekOverview() {
                const c = getEl('weekOverview');
                if (!c || c.style.display === 'none') return;
                const days = Services.getWeekData();
                let h = '';
                for (let i = 0; i < days.length; i++) {
                    const d = days[i];
                    h += '<div class="week-day' + (d.isToday ? ' today' : '') + '" data-date="' + d.dateStr +
                        '" onclick="App.openDateView(\'' + d.dateStr + '\')">' +
                        '<div class="week-day-name">' + d.dayName + '</div>' +
                        '<div class="week-day-date">' + d.dayOfMonth + '</div>' +
                        '<div class="week-day-count">' + (d.count ? '📋 ' + d.count : '—') + '</div></div>';
                }
                c.innerHTML = h;
            }

            function renderFolderList(searchResults = null) {
                const c = getEl('folderList');
                if (!c) return;
                if (searchResults !== null) { renderSearchResults(c, searchResults); return; }

                const vm = State.getFolderViewMode();
                let h = '';
                const todayTasks = Services.getTodayTasks();
                h += buildSmartFolderHTML(SMART_FOLDERS.TODAY, '📅', 'Сегодня', todayTasks.length);

                const overdueTasks = Services.getOverdueTasks();
                if (overdueTasks.length > 0) {
                    h += buildSmartFolderHTML(SMART_FOLDERS.OVERDUE, '⚠️', 'Просроченные', overdueTasks.length, 'var(--overdue)');
                }

                const trashFolder = State.getFolders().find(f => f.id === SMART_FOLDERS.TRASH);
                if (trashFolder && trashFolder.tasks.length > 0) {
                    h += buildSmartFolderHTML(SMART_FOLDERS.TRASH, '🗑️', 'Корзина', trashFolder.tasks.length);
                }

                const folders = State.getFolders().filter(f => f.id !== SMART_FOLDERS.TRASH);
                if (!folders.length && !todayTasks.length) {
                    h += '<p style="text-align:center;padding:20px;opacity:0.6;">📂 Нет папок. Создайте первую!</p>';
                } else if (folders.length) {
                    h += '<div class="' + (vm === 'grid' ? 'folder-grid' : '') + '">' +
                        folders.map(buildFolderCardHTML).join('') + '</div>';
                }

                c.innerHTML = h;
                c.querySelectorAll('.view-toggle-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        State.setFolderViewMode(this.dataset.view);
                        State.save();
                        renderFolderList();
                    });
                });
            }

            function buildSmartFolderHTML(id, icon, name, count, color) {
                const style = color ? ' style="color:' + color + ';"' : '';
                return '<div class="folder-card ' + (id === SMART_FOLDERS.TODAY ? 'smart-today' : 'smart-overdue') +
                    '" data-action="' + A.OPEN_FOLDER + '" data-folder-id="' + id + '">' +
                    '<span class="folder-icon">' + icon + '</span>' +
                    '<div class="folder-info"><div class="folder-name">' + name + '</div>' +
                    '<div class="folder-stats"><span class="stat-active"' + style + '>📋 ' + count + ' задач</span></div></div></div>';
            }
            function buildFolderCardHTML(f) {
                const stats = Utils.getFolderStats(f);
                let bgStyle = '';
                if (f.customImage) bgStyle = 'background-image:url(' + f.customImage + ');background-size:cover;background-position:center;';
                else if (f.color) bgStyle = 'background:' + f.color + ';';
                else if (f.opacity) bgStyle = 'background:rgba(46,44,41,' + f.opacity + ');';

                const iconHTML = '<span style="font-size:24px">' + (f.icon || '📁') + '</span>';
                return '<div class="folder-card" style="' + bgStyle + '" data-action="' + A.OPEN_FOLDER +
                    '" data-folder-id="' + f.id + '" data-folder-name="' + Utils.escapeHtml(f.name).replace(/'/g, "\\'") + '"' +
                    ' data-folder-stats="' + stats.active + '/' + stats.completed + '"' +
                    ' ondragover="App.handleDragOver(event)" ondragleave="App.handleDragLeave(event)"' +
                    ' ondrop="App.handleDrop(event, \'' + f.id + '\')"' +
                    ' oncontextmenu="App.showFolderPanel(event, \'' + f.id + '\', \'' + Utils.escapeHtml(f.name).replace(/'/g, "\\'") + '\', \'' + stats.active + '\', \'' + stats.completed + '\'); return false;"' +
                    ' ontouchstart="App.folderTouchStart(event, \'' + f.id + '\', \'' + Utils.escapeHtml(f.name).replace(/'/g, "\\'") + '\', \'' + stats.active + '\', \'' + stats.completed + '\')"' +
                    ' ontouchend="App.folderTouchEnd(event)"' +
                    '>' +
                    '<div class="folder-icon-circle">' + iconHTML + '</div>' +
                    '<div class="folder-info"><div class="folder-name">' + Utils.escapeHtml(f.name) + '</div></div>' +
                    '</div>';
            }

            function renderSearchResults(container, tasks) {
                if (!tasks.length) {
                    container.innerHTML = '<p style="text-align:center;padding:20px;opacity:0.6;">🔍 Ничего не найдено</p>';
                    return;
                }
                container.innerHTML = '<div style="margin-bottom:10px;"><button class="btn-sm" id="btnClearSearch">← Назад к папкам</button></div>' +
                    tasks.map(t => buildTaskHTML(t, t.folderId, true)).join('');
                getEl('btnClearSearch')?.addEventListener('click', () => {
                    getEl('searchInput').value = '';
                    getEl('searchStats').style.display = 'none';
                    renderFolderList();
                });
            }

            function renderTasks() {
                const tc = getEl('taskContainer'), fl = getEl('folderList');
                const folderActions = getEl('folderActions');
                if (!tc || !fl) return;
                const cid = State.getCurrentFolderId();
                if (!cid) { 
                    tc.style.display = 'none'; 
                    fl.style.display = 'block'; 
                    if (folderActions) folderActions.style.display = 'flex';
                    return; 
                }
                if (folderActions) folderActions.style.display = 'none';
                if (Utils.isSmartFolder(cid)) renderSmartFolderTasks(tc, fl, cid);
                else renderRegularFolderTasks(tc, fl, cid);
            }

            function renderSmartFolderTasks(tc, fl, fid) {
                tc.style.display = 'flex'; fl.style.display = 'none';
                const fe = getEl('currentFolderName');
                if (fe) {
                    if (fid === SMART_FOLDERS.TODAY) fe.textContent = '📅 Сегодня';
                    else if (fid === SMART_FOLDERS.OVERDUE) fe.textContent = '⚠️ Просроченные';
                    else fe.textContent = '🗑️ Корзина';
                }
                getEl('taskFilter').style.display = 'none';
                getEl('btnEditFolder').style.display = 'none';
                document.querySelector('.input-row').style.display = 'none';

                const tasks = fid === SMART_FOLDERS.TRASH
                    ? (State.getFolderById(fid)?.tasks || [])
                    : Services.getTasksForSmartFolder(fid);

                const tl = getEl('taskList');
                if (!tl) return;
                if (tasks.length) {
                    tl.innerHTML = tasks.map(t => {
                        if (t.type && t.type === TASK_TYPES.BIRTHDAY) {
                            return '<div class="task-item" style="opacity:0.9"><div style="flex:1"><span class="task-text">🎂 ' +
                                Utils.escapeHtml(t.text) + '</span><br><small style="color:var(--accent)">🎉 Сегодня праздник!</small></div>' +
                                '<span class="days-badge today">⏳ Сегодня</span></div>';
                        }
                        return buildTaskHTML(t, t.folderId || fid, true);
                    }).join('');
                } else {
                    tl.innerHTML = '<div class="no-tasks">🎉 Задач нет!</div>';
                }
            }

            function renderRegularFolderTasks(tc, fl, fid) {
                getEl('taskFilter').style.display = 'flex';
                getEl('btnEditFolder').style.display = '';
                document.querySelector('.input-row').style.display = 'flex';

                const f = State.getFolderById(fid);
                if (!f) { tc.style.display = 'none'; fl.style.display = 'block'; return; }

                tc.style.display = 'flex'; fl.style.display = 'none';
                getEl('currentFolderName').textContent = (f.icon || DEFAULT_FOLDER_ICON) + ' ' + f.name;
                updateTaskFilterUI(Utils.getFolderStats(f));

                const tl = getEl('taskList');
                if (!tl) return;
                const tasks = Utils.getValidTasksArray(f.tasks);
                if (!tasks.length) {
                    tl.innerHTML = '<div class="no-tasks">📭 Нет задач в этой папке</div>';
                    return;
                }

                const filter = State.getCurrentTaskFilter();
                const filtered = filter === FILTERS.ACTIVE
                    ? tasks.filter(t => !t.completed)
                    : tasks.filter(t => t.completed);

                filtered.sort((a, b) => (b.priority || 0) - (a.priority || 0) ||
                    (!a.date && !b.date ? 0 : !a.date ? 1 : !b.date ? -1 : a.date.localeCompare(b.date)));

                tl.innerHTML = filtered.length
                    ? filtered.map(t => buildTaskHTML(t, fid, false)).join('')
                    : '<div class="no-tasks">' + (filter === FILTERS.ACTIVE ? '🎉 Все задачи выполнены!' : '📭 Нет завершенных задач') + '</div>';
            }

            function updateTaskFilterUI(stats) {
                getEl('activeCount').textContent = stats.active;
                getEl('completedCount').textContent = stats.completed;
                const filter = State.getCurrentTaskFilter();
                document.querySelectorAll('.task-filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filter);
                });
            }

            function buildTaskHTML(task, fid, showFolderName) {
                const isTrash = fid === SMART_FOLDERS.TRASH || task.folderId === SMART_FOLDERS.TRASH;
                const escapedText = Utils.escapeHtml(task.text).replace(/'/g, "\\'");
                let h = '<div class="task-item ' + (task.completed ? 'completed' : '') +
                    '" data-task-id="' + task.id + '" data-folder-id="' + fid +
                    '" onclick="App.showActionPanel(event,\'' + task.id + '\',\'' + fid + '\',\'' + escapedText + '\',' + isTrash + ')"' + '>' +
                    '<div class="task-checkbox" data-action="' + A.TOGGLE_TASK + '" data-task-id="' + task.id + '">' +
                    (task.completed ? '✓' : '') + '</div>' +
                    '<div style="flex:1;min-width:100px;"><span class="task-text">' + Utils.escapeHtml(task.text) + '</span>';

                if (showFolderName && task.folderName) {
                    h += '<div style="font-size:10px;color:var(--text-secondary);">📁 ' + Utils.escapeHtml(task.folderName) + '</div>';
                }

                h += '</div>';
                h += buildTaskBadgesHTML(task);
                h += buildSubtasksHTML(task);
                h += '</div>';
                return h;
            }

            function buildSubtasksHTML(task) {
                if (!Array.isArray(task.subtasks) || !task.subtasks.length) return '';
                let h = '<ul class="subtask-list">';
                task.subtasks.forEach(st => {
                    if (!st) return;
                    h += '<li class="subtask-item ' + (st.completed ? 'completed' : '') + '" ondblclick="event.stopPropagation();App.showSubtaskPanel(event,\'' + task.id + '\',\'' + st.id + '\')" oncontextmenu="event.stopPropagation();event.preventDefault();App.showSubtaskPanel(event,\'' + task.id + '\',\'' + st.id + '\');return false;">' +
                        '<div class="subtask-checkbox" data-action="' + A.TOGGLE_SUBTASK +
                        '" data-task-id="' + task.id + '" data-subtask-id="' + st.id + '">' + (st.completed ? '✓' : '') + '</div>' +
                        '<span class="subtask-text">' + Utils.escapeHtml(st.text) + '</span>' +
                    '</li>';
                });
        
                return h + '</ul>';
            }

            function buildTaskBadgesHTML(task) {
                let h = '';
                if (task.repeat) {
                    const label = task.repeat === 'custom' ? (task.repeatDays || '?') + 'д' : (REPEAT_ABBREVIATIONS[task.repeat] || task.repeat);
                    h += '<span class="repeat-badge">🔁 ' + label + '</span>';
                }
                if (task.time) h += '<span>🕐 ' + task.time + '</span>';
                if (task.date) {
                    let dtc = task.date;
                    if (task.type === TASK_TYPES.BIRTHDAY) {
                        const nb = Utils.getNextBirthday(task.date);
                        if (nb) dtc = Utils.formatDateISO(nb);
                    }
                    const di = Utils.getDaysText(dtc);
                    h += di
                        ? '<span class="days-badge ' + di.className + '">' + di.text + '</span>'
                        : '<span>📅 ' + Utils.formatDate(task.date) + '</span>';
                }
                return h;
            }

            function renderNotes() {
                const c = getEl('notesList');
                if (!c) return;
                const notes = State.getNotes();
                c.innerHTML = notes.length
                    ? notes.filter(n => n).map(n =>
                        '<div class="note-card"><div style="display:flex;justify-content:flex-end;margin-bottom:8px;">' +
                        '<button class="btn-sm btn-danger" data-action="' + A.DELETE_NOTE + '" data-note-id="' + n.id + '">✕</button></div>' +
                        '<textarea class="note-textarea" data-note-id="' + n.id + '">' + Utils.escapeHtml(n.text || '') + '</textarea></div>'
                    ).join('')
                    : '<p style="text-align:center;padding:20px;">💡 Нет заметок</p>';
            }

            function renderCalendar(year, month, selectedDate) {
                getEl('calendarTitle').textContent = new Date(year, month).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
                const grid = getEl('calendarGrid');
                if (!grid) return;

                const data = Services.getCalendarData(year, month);
                grid.innerHTML = '';

                ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(day => {
                    const wd = document.createElement('div');
                    wd.style.cssText = 'font-size:10px;font-weight:700;';
                    wd.textContent = day;
                    grid.appendChild(wd);
                });

                for (let i = 0; i < data.startOffset; i++) {
                    grid.appendChild(document.createElement('div'));
                }

                data.days.forEach(dayData => {
                    const div = document.createElement('div');
                    div.className = 'calendar-day';
                    if (dayData.isToday) div.classList.add('today');
                    if (dayData.hasTasks) div.classList.add('has-tasks');
                    if (dayData.dateStr === selectedDate) div.classList.add('selected');
                    div.textContent = dayData.day;
                    div.style.cursor = 'pointer';
                    div.onclick = function() {
                        document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
                        this.classList.add('selected');
                        AppState.selectedDate = dayData.dateStr;
                        renderCalendarTasks(dayData.dateStr);
                    };
                    grid.appendChild(div);
                });

                renderCalendarTasks(selectedDate);
            }

            function renderCalendarTasks(selectedDate) {
                const c = getEl('calendarTasks');
                if (!c) return;
                if (!selectedDate) { c.innerHTML = ''; return; }

                const tasks = Services.getTasksForDate(selectedDate);
                if (!tasks || !tasks.length) {
                    c.innerHTML = '<p style="text-align:center;padding:10px;">Нет задач на эту дату</p>';
                    return;
                }

                let html = '<strong>📅 ' + Utils.formatDate(selectedDate) + '</strong><br>';
                tasks.forEach(t => {
                    if (t.type === TASK_TYPES.BIRTHDAY) {
                        html += '<div class="task-item">🎂 ' + Utils.escapeHtml(t.text) + '</div>';
                    } else {
                        const timeStr = t.time ? ' 🕐 ' + t.time : '';
                        const folderStr = t.folder ? '<br><small style="color:var(--text-secondary)">📁 ' + Utils.escapeHtml(t.folder) + '</small>' : '';
                        html += '<div class="task-item" style="cursor:pointer" onclick="window.App.goToFolder(\'' +
                            Utils.escapeHtml(t.folder || '') + '\')"><span>' + Utils.escapeHtml(t.text) + '</span>' + timeStr + folderStr + '</div>';
                    }
                });
                c.innerHTML = html;
            }

            function renderAI() {
                const c = getEl('aiContent');
                if (!c) return;
                const upcoming = Services.getUpcomingBirthdays();
                c.innerHTML = upcoming.length
                    ? '<strong>🎂 Ближайшие ДР:</strong><br>' + upcoming.map(x => '• ' + Utils.escapeHtml(x.name) + ' — через ' + x.daysUntil + ' дн.').join('<br>')
                    : '<p>🎉 Всё под контролем!</p>';
            }

            function renderClients() {
                const c = getEl('clientList');
                if (!c) return;
                const clients = State.getClients();
                if (!clients.length) { c.innerHTML = '<p>👥 Нет клиентов</p>'; return; }

                const sorted = Services.getClientsSorted();
                c.innerHTML = sorted.map(x => {
                    const ds = x.birthday.getDate() + ' ' + x.birthday.toLocaleDateString('ru-RU', { month: 'long' }) + ' ' + x.birthday.getFullYear();
                    const st = x.daysUntil === 0 ? '🎂 Сегодня!' : x.daysUntil === 1 ? '🎂 Завтра!' : '📅 ' + ds + ' (через ' + x.daysUntil + ' дн.)';
                    return '<div class="client-card" onclick="App.showClientPanel(event, \'' + x.id + '\', \'' + Utils.escapeHtml(x.name).replace(/'/g, "\\'") + '\')">' +
                        '<span><strong>' + Utils.escapeHtml(x.name) + '</strong> — ' + Utils.formatDate(x.date) + ' (' + x.age + ' ' + Utils.getAgeWord(x.age) + ')</span>' +
                        (x.phone ? '<span>📱 ' + Utils.escapeHtml(x.phone) + '</span>' : '') +
                        '<span style="font-size:12px;color:var(--accent);">' + st + '</span>' +
                        '</div>';
                }).join('');
            }

            function renderStats() {
                const s = Services.getStats();
                getEl('statTotal').textContent = s.total;
                getEl('statCompleted').textContent = s.completed;
                getEl('statPercent').textContent = s.percent + '%';
                getEl('progressFill').style.width = s.percent + '%';
                if (s.folderStats.length) {
                    getEl('statsDetails').innerHTML = '<strong>По папкам:</strong><br>' +
                        s.folderStats.map(fs => fs.icon + ' ' + Utils.escapeHtml(fs.name) + ': ' + fs.completed + '/' + fs.total).join('<br>');
                }
                State.save();
            }

            function renderAll(calendarState = null) {
                renderCustomQuotes();
                renderWeekOverview();
                renderFolderList();
                renderTasks();
                renderNotes();
                renderAI();
                renderClients();
                if (calendarState) renderCalendar(calendarState.year, calendarState.month, calendarState.selectedDate);
                if (getEl('section-stats').classList.contains('active')) renderStats();
            }

            return {
                showToast, updateQuote, renderCustomQuotes, renderFolderList, renderTasks,
                renderNotes, renderCalendar, renderCalendarTasks, renderAI, renderClients,
                renderStats, renderAll, renderWeekOverview
            };
        })();

        // ========================================
        // ДЕЙСТВИЯ (ACTIONS)
        // ========================================
        const Actions = {
            openFolder(fid) {
                State.setCurrentFolderId(fid);
                State.setCurrentTaskFilter(FILTERS.ACTIVE);
                getEl('searchContainer').style.display = 'none';
                State.save();
                UI.renderAll();
            },
            toggleTask(tid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                found.task.completed = !found.task.completed;
                Services.processRepeats();
                State.save();
                UI.renderAll();
                UI.showToast(found.task.completed ? '✅ Выполнена' : '🔄 Восстановлена');

                if (found.task.completed) {
                    try { confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } }); } catch (e) {}
                    const allDone = found.folder.tasks.length > 0 && found.folder.tasks.every(t => t.completed);
                    if (allDone) {
                        setTimeout(() => {
                            try { confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 } }); } catch (e) {}
                            try { confetti({ particleCount: 200, spread: 120, origin: { y: 0.5, x: 0.2 } }); } catch (e) {}
                            try { confetti({ particleCount: 200, spread: 120, origin: { y: 0.5, x: 0.8 } }); } catch (e) {}
                            UI.showToast('🎉 Все задачи выполнены!');
                        }, 300);
                    }
                }
            },
            addTask() {
                const cid = State.getCurrentFolderId();
                if (Utils.isSmartFolder(cid)) { UI.showToast('❌ Нельзя создавать задачи в этой папке'); return; }

                const ti = getEl('taskInput'), td = getEl('taskDate'), tt = getEl('taskTime'),
                    tr = getEl('taskRepeat'), trd = getEl('taskRepeatDays');
                if (!ti || !td || !tt || !tr) return;

                const text = ti.value.trim();
                if (!text) { UI.showToast('❌ Введите текст'); return; }

                const f = State.getFolderById(cid);
                if (!f) return;

                const repeat = tr.value;
                const repeatDays = repeat === 'custom' ? parseInt(trd.value) || 1 : 0;

                f.tasks.push({
                    id: Utils.generateId(), text, date: td.value, time: tt.value,
                    completed: false, subtasks: [], repeat: repeat || undefined,
                    repeatDays: repeatDays || undefined, priority: 0
                });

                ti.value = ''; tr.value = ''; trd.style.display = 'none';
                State.setCurrentTaskFilter(FILTERS.ACTIVE);
                State.save();
                UI.renderAll();
                UI.showToast('✅ Задача добавлена!');
            },
            editTask(tid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                const { task } = found;

                const nt = prompt('Текст:', task.text);
                if (nt === null) return;
                const nd = prompt('Дата (ГГГГ-ММ-ДД):', task.date || '');
                if (nd === null) return;
                const nti = prompt('Время (ЧЧ:ММ):', task.time || '');
                if (nti === null) return;

                const opts = Object.entries(REPEAT_LABELS).map(([v, l], i) => (i + 1) + '. ' + l).join('\n');
                const currentLabel = REPEAT_LABELS[task.repeat] || 'Без повтора';
                const ch = prompt('Период:\n' + opts + '\n\nТекущий: ' + currentLabel + '\nВведите номер:', '');
                if (ch === null) return;

                let nr = '', nrd = 0;
                const keys = Object.keys(REPEAT_LABELS);
                const cn = parseInt(ch);
                if (!isNaN(cn) && cn >= 1 && cn <= keys.length) {
                    nr = keys[cn - 1];
                    if (nr === 'custom') {
                        const ds = prompt('Дней:', task.repeatDays || '7');
                        if (ds === null) return;
                        const d = parseInt(ds);
                        if (isNaN(d) || d < 1) { UI.showToast('❌ Некорректно'); return; }
                        nrd = d;
                    }
                }

                task.text = nt.trim();
                task.date = nd.trim();
                task.time = nti.trim();
                task.repeat = nr || undefined;
                task.repeatDays = nrd || undefined;

                State.save();
                UI.renderAll();
                UI.showToast('✅ Обновлена!');
            },
            deleteTask(tid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                if (found.folder.id === SMART_FOLDERS.TRASH) { UI.showToast('❌ Задача уже в корзине'); return; }
                if (!confirm('Переместить задачу в корзину?')) return;

                found.folder.tasks = found.folder.tasks.filter(t => t.id !== tid);
                let trash = State.getFolders().find(f => f.id === SMART_FOLDERS.TRASH);
                if (!trash) {
                    trash = { id: SMART_FOLDERS.TRASH, name: '🗑️ Корзина', icon: '🗑️', tasks: [] };
                    State.getFolders().push(trash);
                }
                trash.tasks.push(found.task);
                State.save();
                UI.renderAll();
                UI.showToast('🗑️ В корзине');
            },
            deleteForever(tid) {
                if (!confirm('Удалить безвозвратно?')) return;
                const found = Utils.findTaskById(tid);
                if (!found) return;
                found.folder.tasks = found.folder.tasks.filter(t => t.id !== tid);
                State.save();
                UI.renderAll();
                UI.showToast('💥 Удалена навсегда');
            },
            restoreTask(tid) {
                const trash = State.getFolders().find(f => f.id === SMART_FOLDERS.TRASH);
                if (!trash) return;
                const idx = trash.tasks.findIndex(t => t && t.id === tid);
                if (idx === -1) return;
                const task = trash.tasks.splice(idx, 1)[0];
                const target = State.getFolders().find(f => f.id !== SMART_FOLDERS.TRASH);
                if (!target) { UI.showToast('❌ Создайте папку сначала'); return; }
                target.tasks.push(task);
                State.save();
                UI.renderAll();
                UI.showToast('↩️ Восстановлена');
            },
            duplicateTask(tid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                const newTask = {
                    ...found.task, id: Utils.generateId(), completed: false,
                    subtasks: (found.task.subtasks || []).map(s => ({ ...s, id: Utils.generateId(), completed: false }))
                };
                found.folder.tasks.push(newTask);
                State.save();
                UI.renderAll();
                UI.showToast('📋 Дублирована');
            },
            moveToTomorrow(tid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                found.task.date = Utils.formatDateISO(tomorrow);
                State.save();
                UI.renderAll();
                UI.showToast('📅 На завтра');
            },
            setPriority(tid, p) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                found.task.priority = found.task.priority === p ? p - 1 : p;
                State.save();
                UI.renderTasks();
            },
            addSubtask(tid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                const text = prompt('Подзадача:');
                if (!text) return;
                if (!Array.isArray(found.task.subtasks)) found.task.subtasks = [];
                found.task.subtasks.push({ id: Utils.generateId(), text: text.trim(), completed: false });
                State.save();
                UI.renderAll();
            },
            toggleSubtask(tid, sid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                const st = found.task.subtasks?.find(s => s.id === sid);
                if (!st) return;
                st.completed = !st.completed;
                State.save();
                UI.renderAll();
            },
            editSubtask(tid, sid) {
                const found = Utils.findTaskById(tid);
                if (!found) return;
                const st = found.task.subtasks?.find(s => s.id === sid);
                if (!st) return;
                const text = prompt('Текст:', st.text);
                if (!text) return;
                st.text = text.trim();
                State.save();
                UI.renderAll();
            },
            deleteSubtask(tid, sid) {
                if (!confirm('Удалить?')) return;
                const found = Utils.findTaskById(tid);
                if (!found) return;
                found.task.subtasks = found.task.subtasks.filter(s => s.id !== sid);
                State.save();
                UI.renderAll();
            },
            addFolder() {
                const name = prompt('Название:');
                if (!name) return;
                State.addFolder({ id: Utils.generateId(), name: name.trim(), icon: DEFAULT_FOLDER_ICON, tasks: [] });
                State.save();
                UI.renderAll();
                UI.showToast('📁 Создана');
            },
            editFolder() {
                const cid = State.getCurrentFolderId();
                if (Utils.isSmartFolder(cid)) { UI.showToast('❌ Нельзя'); return; }
                const f = State.getFolderById(cid);
                if (!f) return;
                const name = prompt('Название:', f.name);
                if (!name) return;
                f.name = name.trim();
                State.save();
                UI.renderAll();
                UI.showToast('✅ Обновлена');
            },
            changeFolderIcon(fid) {
                if (Utils.isSmartFolder(fid)) { UI.showToast('❌ Нельзя'); return; }
                const f = State.getFolderById(fid);
                if (!f) return;

                const choice = prompt('Выберите:\n1. Цвет фона (hex, например #7eb8c9)\n2. Иконка (эмодзи)\n3. Фото на фон (напишите "фото")\n\nТекущий цвет: ' + (f.color || 'нет') + '\nТекущая иконка: ' + (f.icon || '📁'), '');
                if (!choice) return;

                if (choice === 'фото' || choice === 'foto' || choice === 'photo') {
                    const inp = document.createElement('input');
                    inp.type = 'file'; inp.accept = 'image/*';
                    inp.onchange = function(e) {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            f.customImage = ev.target.result; f.color = '';
                            State.save(); UI.renderAll(); UI.showToast('🖼️ Фото загружено на фон');
                        };
                        reader.readAsDataURL(file);
                    };
                    inp.click();
                } else if (!isNaN(parseFloat(choice)) && parseFloat(choice) >= 0 && parseFloat(choice) <= 1) {
                    f.opacity = choice; f.color = ''; f.customImage = '';
                    State.save(); UI.renderAll(); UI.showToast('🔍 Прозрачность: ' + choice);
                } else if (choice.startsWith('#')) {
                    f.color = choice; f.customImage = '';
                    State.save(); UI.renderAll(); UI.showToast('🎨 Цвет фона обновлён');
                } else {
                    f.icon = choice;
                    State.save(); UI.renderAll(); UI.showToast('✅ Иконка обновлена');
                }
            },
            changeTheme() {
                const overlay = getEl('actionOverlay');
                const panel = getEl('actionPanel');
                const title = getEl('actionPanelTitle');
                const buttons = getEl('actionPanelButtons');
                
                title.textContent = '🎨 Оформление';
                title.style.display = 'block';
                
                const savedPreset = localStorage.getItem('theme_preset') || '';
                
                buttons.innerHTML =
                    '<div style="padding:4px 0 12px;text-align:center;font-size:15px;font-weight:600;color:#ffffff;">Тема</div>' +
                    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;">' +
                    '<button onclick="event.stopPropagation();App._applyPreset(\'basic\')" style="width:70px;padding:8px;border-radius:12px;border:2px solid ' + (savedPreset === 'basic' ? 'var(--accent)' : 'rgba(255,255,255,0.5)') + ';background:transparent;cursor:pointer;font-size:12px;position:relative;z-index:10;color:#ffffff;">Basic</button>' +

            editClient(cid) {
                const c = State.getClientById(cid);
                if (!c) return;
                const name = prompt('ФИО:', c.name);
                if (!name) return;
                let phone = prompt('Телефон:', c.phone || '');
                if (phone === null) return;
                phone = phone.trim();
                if (phone) {
                    let digits = phone.replace(/\D/g, '');
                    if (digits.length === 11 && digits.startsWith('8')) digits = '7' + digits.slice(1);
                    if (digits.length >= 1) {
                        phone = '+7';
                        if (digits.length > 1) phone += ' (' + digits.slice(1, 4);
                        if (digits.length >= 4) phone += ') ' + digits.slice(4, 7);
                        if (digits.length >= 7) phone += '-' + digits.slice(7, 9);
                        if (digits.length >= 9) phone += '-' + digits.slice(9, 11);
                    }
                }
                const date = prompt('Дата:', c.date);
                if (!date) return;
                c.name = name.trim(); c.phone = phone; c.date = date;
                State.save(); UI.renderClients(); UI.showToast('✅ Обновлено');

                    const json = JSON.stringify({
                        folders: State.getFolders(), notes: State.getNotes(),
                        clients: State.getClients(), customQuotes: State.getCustomQuotes()
                    }, null, 2);
                    const blob = new Blob([json], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'my_plans_backup_' + new Date().toISOString().slice(0, 10) + '.json';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);

            importData() {
                const inp = document.createElement('input');
                inp.type = 'file'; inp.accept = '.json,.txt,application/json'; inp.style.display = 'none';
                document.body.appendChild(inp);
                inp.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) { document.body.removeChild(inp); return; }
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            const imp = JSON.parse(ev.target.result);
                            if (!imp || typeof imp !== 'object' || !Array.isArray(imp.folders)) throw new Error('Формат');
                            const backup = JSON.stringify({
                                folders: State.getFolders(), notes: State.getNotes(),
                                clients: State.getClients(), customQuotes: State.getCustomQuotes()
                            });
                            try {
                                localStorage.setItem(STORAGE_KEY, JSON.stringify(imp));
                                State.load(); Services.processRepeats();
                                UI.renderAll(); UI.showToast('📥 Импортировано');
                            } catch (inner) {
                                localStorage.setItem(STORAGE_KEY, backup);
                                State.load(); throw inner;
                            }
                        } catch (err) { UI.showToast('❌ Ошибка: ' + err.message); }
                        document.body.removeChild(inp);
                    };
                    reader.onerror = () => { UI.showToast('❌ Не удалось прочитать'); document.body.removeChild(inp); };
                    reader.readAsText(file);
                });
                inp.click();
            },

            handleDragStart: function(e) {
                e.target.classList.add('dragging');
                e.dataTransfer.setData('text/plain', JSON.stringify({
                    taskId: e.target.dataset.taskId,
                    fromFolderId: e.target.dataset.folderId
                }));
                e.dataTransfer.effectAllowed = 'move';

            handleDragEnd: function(e) {
                e.target.classList.remove('dragging');
                document.querySelectorAll('.folder-card').forEach(c => c.classList.remove('drag-over'));

            handleDragOver: function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                e.currentTarget.classList.add('drag-over');
            },
            handleDragLeave: function(e) { e.currentTarget.classList.remove('drag-over'); },
            handleDrop: function(e, toFid) {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                try {
                    const d = JSON.parse(e.dataTransfer.getData('text/plain'));
                    const { taskId, fromFolderId } = d;
                    if (fromFolderId === toFid || Utils.isSmartFolder(toFid)) return;
        
                    const ff = State.getFolderById(fromFolderId);
                    const tf = State.getFolderById(toFid);
                    if (!ff || !tf) return;
        
                    const idx = ff.tasks.findIndex(t => t && t.id === taskId);
                    if (idx === -1) return;
        
                    const task = ff.tasks.splice(idx, 1)[0];
                    tf.tasks.push(task);
                    State.save();
                    UI.renderAll();
                    UI.showToast('📦 Перемещена');
                } catch (err) { UI.showToast('❌ Ошибка'); }
            },
