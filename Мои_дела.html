<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Мои планы</title>
    <style>
        :root { --bg:#faf7f5; --card:#fff; --text:#3a3340; --text-secondary:#9a8f9f; --accent:#c8957c; --accent-light:#faf0eb; --danger:#b8a0a8; --danger-light:#f7f0f2; --border:#ede6e0; --shadow:0 2px 16px rgba(180,160,150,0.08); --radius:18px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; }
        .dark { --bg:#2a2528; --card:#383438; --text:#e8e0e5; --accent:#d4a590; --accent-light:#3d3538; --border:#4a4448; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); padding:8px; min-height:100vh; }
        .app-title { text-align:center; font-size:24px; font-weight:700; padding:10px 0; }
        .sync-bar { text-align:center; font-size:11px; color:var(--text-secondary); margin-bottom:6px; }
        .tabs { display:flex; background:var(--card); border-radius:24px; padding:4px; gap:2px; margin-bottom:12px; }
        .tab { flex:1; text-align:center; padding:10px 6px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text-secondary); }
        .tab.active { background:var(--accent-light); color:var(--accent); }
        .section { display:none; }
        .section.active { display:block; }
        .card { background:var(--card); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
        .btn-sm { padding:8px 14px; border-radius:18px; border:none; font-size:13px; font-weight:600; cursor:pointer; background:var(--accent-light); color:var(--accent); margin:2px; }
        .btn-danger { background:var(--danger-light); color:var(--danger); }
        .btn-email { background:#e8f0fe; color:#1a73e8; }
        .input { width:100%; padding:10px; border-radius:18px; border:2px solid var(--border); font-size:14px; font-family:var(--font); margin:4px 0; background:var(--card); }
        .client-card { background:var(--card); border-radius:14px; padding:12px; margin-bottom:6px; }
        .task-item { display:flex; align-items:center; gap:8px; padding:10px; background:var(--card); border-radius:12px; margin:4px 0; }
        .task-checkbox { width:20px; height:20px; border-radius:50%; border:2px solid #d5ccc5; flex-shrink:0; cursor:pointer; }
        .task-item.completed { opacity:0.5; text-decoration:line-through; }
        .task-item.completed .task-checkbox { background:var(--accent); border-color:var(--accent); }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; }
        .calendar-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:12px; cursor:pointer; position:relative; }
        .calendar-day.today { background:var(--accent-light); color:var(--accent); font-weight:700; }
        .calendar-day.has-tasks::after { content:''; width:4px; height:4px; background:var(--accent); border-radius:50%; position:absolute; bottom:2px; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#4a3f50; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; z-index:200; opacity:0; pointer-events:none; transition:opacity .3s; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
<div class="app-title">Мои планы</div>
<div class="sync-bar" id="syncStatus">⚡ Загрузка...</div>
<div class="tabs">
    <div class="tab active" data-tab="clients">👥 Клиенты</div>
    <div class="tab" data-tab="tasks">📂 Папки</div>
    <div class="tab" data-tab="calendar">📅 Календарь</div>
    <div class="tab" data-tab="ai">🧠 ИИ</div>
    <div class="tab" data-tab="ideas">💡 Идеи</div>
</div>
<div class="section active" id="section-clients">
    <input type="text" class="input" id="clientName" placeholder="ФИО">
    <input type="tel" class="input" id="clientPhone" placeholder="Телефон">
    <input type="date" class="input" id="clientDate">
    <button class="btn-sm" id="btnAddClient">+ Клиент</button>
    <div id="clientList" style="margin-top:10px;"></div>
    <small id="clientStats" style="color:var(--text-secondary);"></small>
</div>
<div class="section" id="section-tasks">
    <button class="btn-sm" id="btnAddFolder">+ Папка</button>
    <div id="folderList"></div>
    <div id="taskContainer" style="display:none;">
        <button class="btn-sm" id="btnBack" style="margin-bottom:6px;">← Назад</button>
        <input type="text" class="input" id="taskInput" placeholder="Задача...">
        <input type="date" class="input" id="taskDate">
        <button class="btn-sm" id="btnAddTask">+ Задача</button>
        <div id="taskList"></div>
    </div>
</div>
<div class="section" id="section-calendar">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <button class="btn-sm" id="btnPrevMonth">←</button>
        <strong id="calendarTitle"></strong>
        <button class="btn-sm" id="btnNextMonth">→</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div id="calendarTasks" style="margin-top:8px;"></div>
</div>
<div class="section" id="section-ai">
    <div class="card"><h3>🧠 Рекомендации</h3><div id="aiContent"></div></div>
</div>
<div class="section" id="section-ideas">
    <textarea class="input" id="noteText" placeholder="Заметка..." style="min-height:80px;"></textarea>
    <button class="btn-sm" id="btnAddNote">+ Заметка</button>
    <div id="notesList"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const GIST_ID = 'eff796c63b675f3690608f10f218135a';
const GITHUB_TOKEN = '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';
let data = { folders: [], notes: [], clients: [], currentFolderId: null };
let calendarYear, calendarMonth, selectedDate = null;

function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(function() { t.classList.remove('show'); }, 2000); }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatDate(s) { if (!s) return ''; const p = s.split('-'); return p.length === 3 ? p[2] + '.' + p[1] + '.' + p[0] : s; }
function formatDateISO(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function gid() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6); }
function getNextBirthday(ds) { const p = ds.split('-').map(Number); const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); let bd = new Date(now.getFullYear(), p[1] - 1, p[2]); if (bd < today) bd.setFullYear(now.getFullYear() + 1); return bd; }
function getAge(bds, on) { const p = bds.split('-').map(Number); let a = on.getFullYear() - p[0]; const bd = new Date(on.getFullYear(), p[1] - 1, p[2]); if (on < bd) a--; return a; }
function getAgeWord(a) { if (a % 10 === 1 && a % 100 !== 11) return 'год'; if ([2, 3, 4].includes(a % 10) && ![12, 13, 14].includes(a % 100)) return 'года'; return 'лет'; }

function loadFromGist() {
    fetch('https://api.github.com/gists/' + GIST_ID)
        .then(function(r) { return r.json(); })
        .then(function(g) {
            const f = g.files['data.json'];
            if (f && f.content && f.content.trim() !== '' && f.content !== '{"folders":[],"notes":[],"clients":[]}') {
                try {
                    const nd = JSON.parse(f.content);
                    if (nd.clients && nd.clients.length > 0) data.clients = nd.clients;
                    if (nd.folders && nd.folders.length > 0) data.folders = nd.folders;
                    if (nd.notes && nd.notes.length > 0) data.notes = nd.notes;
                    if (nd.currentFolderId) data.currentFolderId = nd.currentFolderId;
                    document.getElementById('syncStatus').textContent = '✅ Загружено';
                } catch (e) {
                    document.getElementById('syncStatus').textContent = '⚠️ Ошибка данных';
                }
            } else {
                document.getElementById('syncStatus').textContent = '⚡ Новый аккаунт';
            }
            if (!data.clients) data.clients = [];
            if (!data.folders) data.folders = [];
            if (!data.notes) data.notes = [];
            renderAll();
        })
        .catch(function() { document.getElementById('syncStatus').textContent = '⚠️ Офлайн'; });
}

function saveToGistNow() {
    document.getElementById('syncStatus').textContent = '💾 Сохранение...';
    fetch('https://api.github.com/gists/' + GIST_ID, {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: { 'data.json': { content: JSON.stringify(data) } } })
    })
    .then(function(r) {
        if (r.ok) {
            document.getElementById('syncStatus').textContent = '✅ Сохранено';
        } else {
            document.getElementById('syncStatus').textContent = '⚠️ Ошибка ' + r.status;
        }
    })
    .catch(function() { document.getElementById('syncStatus').textContent = '⚠️ Нет сети'; });
}

function addClient() {
    const n = document.getElementById('clientName').value.trim();
    const p = document.getElementById('clientPhone').value.trim();
    const d = document.getElementById('clientDate').value;
    if (!n || !d) return showToast('Введите ФИО и дату');
    data.clients.push({ id: gid(), name: n, phone: p, date: d });
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('clientDate').value = '';
    saveToGistNow(); renderClients();
}
function renderClients() {
    const c = document.getElementById('clientList');
    if (!data.clients.length) { c.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">Нет клиентов</p>'; return; }
    const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    c.innerHTML = data.clients.sort(function(a, b) { return getNextBirthday(a.date) - getNextBirthday(b.date); }).map(function(cl) {
        const bd = getNextBirthday(cl.date); const age = getAge(cl.date, bd);
        const days = Math.ceil((bd - today) / 86400000);
        const ds = bd.getDate() + ' ' + bd.toLocaleDateString('ru-RU', { month: 'long' }) + ' ' + bd.getFullYear();
        let st = days === 0 ? '🎂 Сегодня!' : days === 1 ? '🎂 Завтра!' : '📅 ' + ds + ' (через ' + days + ' дн.)';
        return '<div class="client-card"><div style="display:flex;justify-content:space-between;gap:6px;"><span><strong>' + escapeHtml(cl.name) + '</strong> — ' + formatDate(cl.date) + ' (' + age + ' ' + getAgeWord(age) + ')</span><div><button class="btn-sm" data-action="edit-client" data-client-id="' + cl.id + '">✏️</button><button class="btn-sm btn-email" data-action="email-client" data-client-id="' + cl.id + '">📧</button><button class="btn-sm btn-danger" data-action="delete-client" data-client-id="' + cl.id + '">✕</button></div></div>' + (cl.phone ? '<span>📱 ' + escapeHtml(cl.phone) + '</span>' : '') + '<span style="font-size:12px;color:var(--accent);">' + st + '</span></div>';
    }).join('');
}

function editClient(id) {
    const cl = data.clients.find(function(c) { return c.id === id; }); if (!cl) return;
    const nn = prompt('ФИО:', cl.name); if (nn === null) return;
    const np = prompt('Телефон:', cl.phone || ''); if (np === null) return;
    const nd = prompt('Дата (ГГГГ-ММ-ДД):', cl.date); if (nd === null) return;
    cl.name = nn.trim(); cl.phone = np.trim(); cl.date = nd;
    saveToGistNow(); renderClients(); showToast('✅ Обновлено!');
}
function deleteClient(id) { if (!confirm('Удалить?')) return; data.clients = data.clients.filter(function(c) { return c.id !== id; }); saveToGistNow(); renderClients(); }
function emailClient(cid) {
    const cl = data.clients.find(function(c) { return c.id === cid; }); if (!cl) return;
    const bd = getNextBirthday(cl.date); const age = getAge(cl.date, bd);
    window.open('mailto:fry1997@mail.ru?subject=' + encodeURIComponent('ДР: ' + cl.name) + '&body=' + encodeURIComponent('Клиент: ' + cl.name + '\nДата: ' + formatDate(cl.date) + '\nДР: ' + bd.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }) + '\nВозраст: ' + age + ' ' + getAgeWord(age) + '\nТелефон: ' + (cl.phone || '—')));
}

function addFolder() { const n = prompt('Название папки:'); if (!n) return; data.folders.push({ id: gid(), name: n, icon: '📁', tasks: [] }); saveToGistNow(); renderFolders(); }
function renderFolders() { const c = document.getElementById('folderList'); if (!data.folders.length) { c.innerHTML = '<p style="color:var(--text-secondary);">Нет папок</p>'; return; } c.innerHTML = data.folders.map(function(f) { return '<div class="card" style="cursor:pointer;" data-action="open-folder" data-folder-id="' + f.id + '">📁 ' + escapeHtml(f.name) + ' (' + (f.tasks ? f.tasks.length : 0) + ')</div>'; }).join(''); }
function openFolder(id) { data.currentFolderId = id; document.getElementById('folderList').style.display = 'none'; document.getElementById('taskContainer').style.display = 'block'; renderTasks(); }
function addTask() { const t = document.getElementById('taskInput').value.trim(); const d = document.getElementById('taskDate').value; if (!t) return; const f = data.folders.find(function(f) { return f.id === data.currentFolderId; }); if (!f) return; if (!f.tasks) f.tasks = []; f.tasks.push({ id: gid(), text: t, date: d, completed: false }); document.getElementById('taskInput').value = ''; saveToGistNow(); renderTasks(); }
function renderTasks() {
    const f = data.folders.find(function(f) { return f.id === data.currentFolderId; });
    if (!f) return;
    const c = document.getElementById('taskList');
    if (!f.tasks || !f.tasks.length) { c.innerHTML = '<p style="color:var(--text-secondary);">Нет задач</p>'; return; }
    c.innerHTML = f.tasks.map(function(t) { return '<div class="task-item ' + (t.completed ? 'completed' : '') + '"><div class="task-checkbox" data-action="toggle-task" data-task-id="' + t.id + '">' + (t.completed ? '✓' : '') + '</div><span>' + escapeHtml(t.text) + '</span>' + (t.date ? '<span style="font-size:10px;">📅' + formatDate(t.date) + '</span>' : '') + '<button class="btn-sm btn-danger" data-action="delete-task" data-task-id="' + t.id + '">✕</button></div>'; }).join('');
}
function toggleTask(tid) { const f = data.folders.find(function(f) { return f.id === data.currentFolderId; }); if (!f) return; const t = f.tasks.find(function(t) { return t.id === tid; }); if (t) { t.completed = !t.completed; saveToGistNow(); renderTasks(); } }
function deleteTask(tid) { const f = data.folders.find(function(f) { return f.id === data.currentFolderId; }); if (!f) return; f.tasks = f.tasks.filter(function(t) { return t.id !== tid; }); saveToGistNow(); renderTasks(); }

function addNote() { const t = document.getElementById('noteText').value.trim(); if (!t) return; data.notes.unshift({ id: gid(), text: t, updatedAt: Date.now() }); document.getElementById('noteText').value = ''; saveToGistNow(); renderNotes(); }
function renderNotes() { const c = document.getElementById('notesList'); if (!data.notes.length) { c.innerHTML = '<p style="color:var(--text-secondary);">Нет заметок</p>'; return; } c.innerHTML = data.notes.map(function(n) { return '<div class="card">' + escapeHtml(n.text) + '</div>'; }).join(''); }

function renderCalendar() {
    const now = new Date(); if (!calendarYear) calendarYear = now.getFullYear(); if (!calendarMonth && calendarMonth !== 0) calendarMonth = now.getMonth();
    document.getElementById('calendarTitle').textContent = new Date(calendarYear, calendarMonth).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(function(d) { return '<div style="font-size:10px;font-weight:700;">' + d + '</div>'; }).join('');
    const fd = new Date(calendarYear, calendarMonth, 1); let sd = fd.getDay(); if (sd === 0) sd = 7; sd--;
    const dim = new Date(calendarYear, calendarMonth + 1, 0).getDate();
    const todayStr = formatDateISO(now);
    for (let d = 1; d <= dim; d++) {
        const ds = formatDateISO(new Date(calendarYear, calendarMonth, d));
        const hasTasks = data.clients.some(function(c) { return c.date.slice(5) === ds.slice(5); });
        grid.innerHTML += '<div class="calendar-day ' + (ds === todayStr ? 'today' : '') + ' ' + (hasTasks ? 'has-tasks' : '') + '" data-action="select-date" data-date="' + ds + '">' + d + '</div>';
    }
    renderCalendarTasks();
}
function renderCalendarTasks() {
    const c = document.getElementById('calendarTasks');
    if (!selectedDate) { c.innerHTML = ''; return; }
    const tasks = data.clients.filter(function(cl) { return cl.date.slice(5) === selectedDate.slice(5); });
    if (!tasks.length) { c.innerHTML = '<p style="color:var(--text-secondary);">Нет событий</p>'; return; }
    c.innerHTML = '<strong>📅 ' + formatDate(selectedDate) + '</strong><br>' + tasks.map(function(cl) { return '🎂 ' + escapeHtml(cl.name); }).join('<br>');
}

function renderAI() {
    const c = document.getElementById('aiContent');
    const today = new Date();
    const soon = data.clients.filter(function(cl) { const bd = getNextBirthday(cl.date); const days = Math.ceil((bd - today) / 86400000); return days <= 7 && days >= 0; });
    if (soon.length) {
        c.innerHTML = '<strong>🎂 Ближайшие дни рождения:</strong><br>' + soon.map(function(cl) { const bd = getNextBirthday(cl.date); const days = Math.ceil((bd - today) / 86400000); return '• ' + escapeHtml(cl.name) + ' — через ' + days + ' дн.'; }).join('<br>');
    } else {
        c.innerHTML = '<p style="color:var(--text-secondary);">🎉 Всё под контролем!</p>';
    }
}

function renderAll() { renderFolders(); renderClients(); renderNotes(); renderCalendar(); renderAI(); }

document.addEventListener('click', function(e) {
    const t = e.target.closest('[data-action]'); if (!t) return;
    const a = t.dataset.action;
    if (a === 'open-folder') openFolder(t.dataset.folderId);
    if (a === 'toggle-task') toggleTask(t.dataset.taskId);
    if (a === 'delete-task') deleteTask(t.dataset.taskId);
    if (a === 'edit-client') editClient(t.dataset.clientId);
    if (a === 'email-client') emailClient(t.dataset.clientId);
    if (a === 'delete-client') deleteClient(t.dataset.clientId);
    if (a === 'select-date') { selectedDate = t.dataset.date; renderCalendar(); }
});
document.getElementById('btnAddClient').addEventListener('click', addClient);
document.getElementById('btnAddFolder').addEventListener('click', addFolder);
document.getElementById('btnAddTask').addEventListener('click', addTask);
document.getElementById('btnAddNote').addEventListener('click', addNote);
document.getElementById('btnBack').addEventListener('click', function() { document.getElementById('folderList').style.display = 'block'; document.getElementById('taskContainer').style.display = 'none'; data.currentFolderId = null; });
document.getElementById('btnPrevMonth').addEventListener('click', function() { calendarMonth--; if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; } selectedDate = null; renderCalendar(); });
document.getElementById('btnNextMonth').addEventListener('click', function() { calendarMonth++; if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; } selectedDate = null; renderCalendar(); });
document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
        document.getElementById('section-' + this.dataset.tab).classList.add('active');
        if (this.dataset.tab === 'calendar') renderCalendar();
        if (this.dataset.tab === 'ai') renderAI();
    });
});

const now = new Date(); calendarYear = now.getFullYear(); calendarMonth = now.getMonth();
loadFromGist();
</script>
</body>
</html>
