<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Мои планы</title>
<style>
:root{--bg:#faf7f5;--card:#fff;--text:#3a3340;--text-secondary:#9a8f9f;--accent:#c8957c;--accent-light:#faf0eb;--border:#ede6e0;--radius:18px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:8px}
.app-container{width:100%;max-width:620px;display:flex;flex-direction:column;gap:10px;padding:4px 2px}
.app-title{text-align:center;font-size:24px;font-weight:700;padding:10px 0 0}
.sync-bar{text-align:center;font-size:11px;color:var(--text-secondary);margin-bottom:2px}
.tabs{display:flex;background:var(--card);border-radius:28px;padding:4px;box-shadow:0 2px 16px rgba(180,160,150,0.08);gap:1px;overflow-x:auto}
.tab{flex:1;text-align:center;padding:10px 8px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-secondary);white-space:nowrap}
.tab.active{background:var(--accent-light);color:var(--accent)}
.section{display:none;flex-direction:column;gap:10px}
.section.active{display:flex}
.card{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:0 2px 16px rgba(180,160,150,0.08);display:flex;flex-direction:column;gap:8px}
.btn-sm{padding:7px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--accent-light);color:var(--accent);margin:2px}
.btn-danger{background:#f7f0f2;color:#b8a0a8}
.input{flex:1;min-width:80px;padding:10px 14px;border-radius:22px;border:2px solid var(--border);font-size:14px;font-family:var(--font);background:var(--card);color:var(--text);outline:none}
.input-time{padding:10px 12px;border-radius:22px;border:2px solid var(--border);font-size:13px;font-family:var(--font);background:var(--card);color:var(--text);outline:none;cursor:pointer;max-width:110px}
.client-card{background:var(--card);border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.03);display:flex;flex-direction:column;gap:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4a3f50;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:200;opacity:0;pointer-events:none}
.toast.show{opacity:1}
.task-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--card);border-radius:12px;margin:4px 0;font-size:14px}
.task-checkbox{width:20px;height:20px;border-radius:50%;border:2px solid #d5ccc5;flex-shrink:0;cursor:pointer}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;cursor:pointer}
.calendar-day.today{background:var(--accent-light);color:var(--accent);font-weight:700}
.calendar-day.has-tasks::after{content:'';width:4px;height:4px;background:var(--accent);border-radius:50%;position:absolute;bottom:2px}
</style>
</head>
<body>
<div class="app-container">
<div class="app-title">Мои планы</div>
<div class="sync-bar" id="syncStatus">⚡ Загрузка...</div>
<div class="tabs">
<div class="tab active" data-tab="clients">👥 Клиенты</div>
<div class="tab" data-tab="tasks">📂 Папки</div>
<div class="tab" data-tab="calendar">📅 Календарь</div>
<div class="tab" data-tab="ideas">💡 Идеи</div>
</div>
<div class="section active" id="section-clients">
<div class="card"><h3>👥 Клиенты</h3>
<div style="display:flex;gap:6px;flex-wrap:wrap"><input type="text" class="input" id="clientName" placeholder="ФИО" style="flex:2"><input type="tel" class="input" id="clientPhone" placeholder="Телефон" style="flex:1"><input type="date" class="input-time" id="clientDate" style="max-width:140px"><button class="btn-sm" id="btnAddClient">+</button></div>
<div id="clientList"></div></div>
</div>
<div class="section" id="section-tasks">
<button class="btn-sm" id="btnAddFolder">+ Папка</button>
<div id="folderList"></div>
</div>
<div class="section" id="section-calendar">
<div class="card"><h3 id="calendarTitle"></h3><div class="calendar-grid" id="calendarGrid"></div><div id="calendarTasks" style="margin-top:8px"></div></div>
</div>
<div class="section" id="section-ideas">
<textarea class="input" id="noteText" placeholder="Заметка..." style="min-height:80px"></textarea>
<button class="btn-sm" id="btnAddNote">+ Заметка</button>
<div id="notesList"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const GIST_ID='eff796c63b675f3690608f10f218135a';
const GITHUB_TOKEN='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';
let data={folders:[],notes:[],clients:[]};
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function formatDate(s){if(!s)return'';const p=s.split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:s}
function formatDateISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function gid(){return'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).substr(2,6)}
function getNextBirthday(ds){const p=ds.split('-').map(Number);const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());let bd=new Date(now.getFullYear(),p[1]-1,p[2]);if(bd<today)bd.setFullYear(now.getFullYear()+1);return bd}
function getAge(bds,on){const p=bds.split('-').map(Number);let a=on.getFullYear()-p[0];const bd=new Date(on.getFullYear(),p[1]-1,p[2]);if(on<bd)a--;return a}
function getAgeWord(a){if(a%10===1&&a%100!==11)return'год';if([2,3,4].includes(a%10)&&![12,13,14].includes(a%100))return'года';return'лет'}
async function loadFromGist(){try{const r=await fetch('https://api.github.com/gists/'+GIST_ID);const g=await r.json();const f=g.files['data.json'];if(f&&f.content){data=JSON.parse(f.content);document.getElementById('syncStatus').textContent='✅ Загружено'}}catch(e){document.getElementById('syncStatus').textContent='⚠️ Офлайн'};if(!data.clients)data.clients=[];renderAll()}
async function saveToGist(){try{await fetch('https://api.github.com/gists/'+GIST_ID,{method:'PATCH',headers:{'Authorization':'token '+GITHUB_TOKEN,'Content-Type':'application/json'},body:JSON.stringify({files:{'data.json':{content:JSON.stringify(data)}}})});document.getElementById('syncStatus').textContent='✅ Сохранено'}catch(e){console.log('Save error:',e)}}
function addClient(){const n=document.getElementById('clientName').value.trim();const p=document.getElementById('clientPhone').value.trim();const d=document.getElementById('clientDate').value;if(!n||!d)return showToast('Введите ФИО и дату');data.clients.push({id:gid(),name:n,phone:p,date:d});document.getElementById('clientName').value='';document.getElementById('clientPhone').value='';document.getElementById('clientDate').value='';saveToGist();renderClients()}
function renderClients(){const c=document.getElementById('clientList');if(!data.clients.length){c.innerHTML='<p style="color:var(--text-secondary);text-align:center;padding:20px">Нет клиентов</p>';return}const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());c.innerHTML=data.clients.sort(function(a,b){return getNextBirthday(a.date)-getNextBirthday(b.date)}).map(function(cl){const bd=getNextBirthday(cl.date);const age=getAge(cl.date,bd);const days=Math.ceil((bd-today)/86400000);const ds=bd.getDate()+' '+bd.toLocaleDateString('ru-RU',{month:'long'})+' '+bd.getFullYear();let st=days===0?'🎂 Сегодня!':days===1?'🎂 Завтра!':'📅 '+ds+' (через '+days+' дн.)';return'<div class="client-card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><span><strong>'+escapeHtml(cl.name)+'</strong> — '+formatDate(cl.date)+' ('+age+' '+getAgeWord(age)+')</span><div><button class="btn-sm" data-action="edit-client" data-client-id="'+cl.id+'">✏️</button><button class="btn-sm btn-danger" data-action="delete-client" data-client-id="'+cl.id+'">✕</button></div></div>'+(cl.phone?'<span>📱 '+escapeHtml(cl.phone)+'</span>':'')+'<span style="font-size:12px;color:var(--accent)">'+st+'</span></div>'}).join('')}
function editClient(id){const cl=data.clients.find(function(c){return c.id===id});if(!cl)return;const nn=prompt('ФИО:',cl.name);if(nn===null)return;if(!nn.trim()){alert('Имя обязательно');return}const np=prompt('Телефон:',cl.phone||'');if(np===null)return;const nd=prompt('Дата (ГГГГ-ММ-ДД):',cl.date);if(nd===null)return;cl.name=nn.trim();cl.phone=np.trim();cl.date=nd;saveToGist();renderClients();showToast('✅ Обновлено!')}
function deleteClient(id){if(!confirm('Удалить?'))return;data.clients=data.clients.filter(function(c){return c.id!==id});saveToGist();renderClients()}
function addFolder(){const n=prompt('Название папки:');if(!n)return;data.folders.push({id:gid(),name:n,icon:'📁',tasks:[]});saveToGist();renderFolders()}
function renderFolders(){const c=document.getElementById('folderList');if(!data.folders.length){c.innerHTML='<p style="color:var(--text-secondary)">Нет папок</p>';return}c.innerHTML=data.folders.map(function(f){return'<div class="card">'+(f.icon||'📁')+' '+escapeHtml(f.name)+'</div>'}).join('')}
function addNote(){const t=document.getElementById('noteText').value.trim();if(!t)return;data.notes.unshift({id:gid(),text:t,updatedAt:Date.now()});document.getElementById('noteText').value='';saveToGist();renderNotes()}
function renderNotes(){const c=document.getElementById('notesList');if(!data.notes.length){c.innerHTML='<p style="color:var(--text-secondary)">Нет заметок</p>';return}c.innerHTML=data.notes.map(function(n){return'<div class="card">'+escapeHtml(n.text)+'</div>'}).join('')}
function renderCalendar(){const now=new Date();const cy=now.getFullYear();const cm=now.getMonth();document.getElementById('calendarTitle').textContent=new Date(cy,cm).toLocaleDateString('ru-RU',{month:'long',year:'numeric'});const grid=document.getElementById('calendarGrid');grid.innerHTML=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(function(d){return'<div class="calendar-day-name">'+d+'</div>'}).join('');const fd=new Date(cy,cm,1);let sd=fd.getDay();if(sd===0)sd=7;sd--;const dim=new Date(cy,cm+1,0).getDate();const todayStr=formatDateISO(now);for(let i=sd-1;i>=0;i--)grid.innerHTML+='<div class="calendar-day other-month">'+(new Date(cy,cm,0).getDate()-i)+'</div>';for(let d=1;d<=dim;d++){const ds=formatDateISO(new Date(cy,cm,d));const hasTasks=data.clients.some(function(c){return c.date.slice(5)===ds.slice(5)});grid.innerHTML+='<div class="calendar-day '+(ds===todayStr?'today':'')+' '+(hasTasks?'has-tasks':'')+'" style="position:relative">'+d+'</div>'}}
function renderAll(){renderFolders();renderClients();renderNotes();renderCalendar()}
document.addEventListener('click',function(e){const t=e.target.closest('[data-action]');if(!t)return;const a=t.dataset.action;const cid=t.dataset.clientId;if(a==='edit-client')editClient(cid);if(a==='delete-client')deleteClient(cid)});
document.getElementById('btnAddClient').addEventListener('click',addClient);
document.getElementById('btnAddFolder').addEventListener('click',addFolder);
document.getElementById('btnAddNote').addEventListener('click',addNote);
document.querySelectorAll('.tab').forEach(function(tab){tab.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});this.classList.add('active');document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});document.getElementById('section-'+this.dataset.tab).classList.add('active');if(this.dataset.tab==='calendar')renderCalendar()})});
loadFromGist();
</script>
</body>
</html>
