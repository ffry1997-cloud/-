
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Мои планы</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Мои планы">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f5f3f0">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <style>
    :root {
        --bg: #f5f3f0;
        --card: #ffffff;
        --text: #1a1a1a;
        --text-secondary: #888888;
        --accent: #4a90d9;
        --accent-light: #eef4fb;
        --danger: #d96969;
        --danger-light: #fef2f2;
        --border: #e8e5e0;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        --radius: 20px;
        --radius-sm: 14px;
        --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --star-color: #f0c040;
        --overdue: #e55353;
        --today-color: #e5904c;
        --upcoming: #4caf84;
    }

    .dark {
        --bg: #1e1d1a;
        --card: #2c2a26;
        --text: #e8e4dd;
        --text-secondary: #999590;
        --accent: #6ba3e0;
        --accent-light: #2d353f;
        --border: #3d3a34;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 12px;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        -webkit-user-select: none;
    }

    .app-container {
        width: 100%;
        max-width: 680px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 8px 4px;
    }

    .app-title {
        text-align: center;
        font-size: 26px;
        font-weight: 700;
        padding: 14px 0 6px;
        letter-spacing: -0.3px;
    }

    .bg-quote {
        text-align: center;
        font-style: italic;
        color: var(--text-secondary);
        padding: 6px 0;
        font-size: 13px;
        opacity: 0.7;
        transition: opacity 0.5s;
    }/* Секции-разделители */
    .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 4px 4px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.6px;
    }

    .section-header::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    .custom-quotes {
        display: flex;
        gap: 12px;
        margin-bottom: 2px;
    }

    .custom-quote-box {
        flex: 1;
        background: var(--card);
        border-radius: var(--radius-sm);
        padding: 12px;
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
        font-style: italic;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: all .2s;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .custom-quote-box:hover {
        border-color: var(--accent);
        background: var(--accent-light);
    }

    .header-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 4px 0 8px;
        flex-wrap: wrap;
    }

    .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: none;
        background: var(--card);
        font-size: 19px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow);
        color: var(--text);
        transition: transform 0.15s, box-shadow 0.15s;
    }

    .icon-btn:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .icon-btn:active {
        transform: scale(0.94);
    }

    .tabs {
        display: flex;
        background: var(--card);
        border-radius: 30px;
        padding: 5px;
        box-shadow: var(--shadow);
        gap: 2px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    .tab {
        flex: 1;
        text-align: center;
        padding: 12px 10px;
        border-radius: 26px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: var(--text-secondary);
        white-space: nowrap;
        min-width: fit-content;
        transition: all 0.2s;
    }

    .tab.active {
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
    }

    .section {
        display: none;
        flex-direction: column;
        gap: 12px;
    }

    .section.active {
        display: flex;
    }

    .card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 16px 18px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 10px;
        border: 1px solid var(--border);
    }/* Поиск */
    .search-container {
        margin-bottom: 4px;
    }

    .search-input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 26px;
        border: 2px solid var(--border);
        font-size: 15px;
        font-family: var(--font);
        background: var(--card);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
    }

    .search-input:focus {
        border-color: var(--accent);
    }

    .search-stats {
        font-size: 11px;
        color: var(--text-secondary);
        text-align: center;
        margin-top: 6px;
        display: none;
    }/* Статистика */
    .stats-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 18px 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        text-align: center;
    }

    .stat-item {
        padding: 10px;
        background: var(--bg);
        border-radius: var(--radius-sm);
    }

    .stat-number {
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
    }

    .stat-label {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 4px;
    }

    .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        margin-top: 12px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 4px;
        transition: width 0.3s;
    }/* Звездочки */
    .star-btn {
        font-size: 18px;
        cursor: pointer;
        padding: 2px 4px;
        border: none;
        background: none;
        transition: transform 0.1s;
        color: #ddd;
    }

    .star-btn.active {
        color: var(--star-color);
    }

    .star-btn:hover {
        transform: scale(1.15);
    }/* Цветовое кодирование дат */
    .days-badge {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 12px;
        white-space: nowrap;
        font-weight: 600;
    }

    .days-badge.overdue {
        background: #fde8e8;
        color: var(--overdue);
    }

    .days-badge.today {
        background: #fef3e2;
        color: var(--today-color);
    }

    .days-badge.upcoming {
        background: #e8f8ef;
        color: var(--upcoming);
    }/* Drag & Drop */
    .folder-card.drag-over {
        background: var(--accent-light);
        border: 2px dashed var(--accent);
        transform: scale(1.01);
    }

    .task-item.dragging {
        opacity: 0.4;
        transform: scale(0.96);
    }

    .task-item[draggable="true"] {
        cursor: grab;
    }

    .task-item[draggable="true"]:active {
        cursor: grabbing;
    }/* Карточки папок */
    .folder-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        margin-bottom: 4px;
    }

    .folder-card:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .folder-card:active {
        transform: scale(0.98);
        background: var(--bg);
    }

    .folder-icon {
        font-size: 34px;
        width: 44px;
        text-align: center;
        cursor: pointer;
        flex-shrink: 0;
    }

    .folder-info {
        flex: 1;
        min-width: 0;
    }

    .folder-name {
        font-size: 16px;
        font-weight: 600;
        word-wrap: break-word;
        letter-spacing: -0.2px;
    }

    .folder-stats {
        display: flex;
        gap: 10px;
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 3px;
        flex-wrap: wrap;
        align-items: center;
    }

    .stat-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 600;
    }

    .stat-active {
        color: var(--accent);
        background: var(--accent-light);
        padding: 2px 8px;
        border-radius: 10px;
    }

    .stat-completed {
        color: var(--danger);
        background: var(--danger-light);
        padding: 2px 8px;
        border-radius: 10px;
    }

    .task-filter {
        display: flex;
        margin-bottom: 10px;
        background: var(--bg);
        border-radius: 24px;
        padding: 4px;
    }

    .task-filter-btn {
        flex: 1;
        padding: 10px 14px;
        border: none;
        border-radius: 22px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: var(--text-secondary);
        transition: all .2s;
        font-family: var(--font);
    }

    .task-filter-btn.active {
        background: var(--card);
        color: var(--accent);
        font-weight: 700;
        box-shadow: var(--shadow);
    }

    .task-filter-btn .count {
        font-size: 10px;
        opacity: 0.6;
        margin-left: 4px;
    }

    .btn-sm {
        padding: 8px 16px;
        border-radius: 22px;
        border: none;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        font-family: var(--font);
        letter-spacing: -0.2px;
    }

    .btn-sm:hover {
        opacity: 0.85;
    }

    .btn-sm:active {
        transform: scale(0.95);
    }

    .btn-add {
        background: var(--accent-light);
        color: var(--accent);
    }

    .btn-danger {
        background: var(--danger-light);
        color: var(--danger);
    }

    .btn-email {
        background: #e8f0fe;
        color: #1a73e8;
    }

    .btn-xs {
        padding: 2px 6px;
        border-radius: 8px;
        border: none;
        font-size: 10px;
        cursor: pointer;
        background: transparent;
        color: var(--text-secondary);
    }

    .btn-xs:hover {
        background: var(--border);
    }

    .input {
        flex: 1;
        min-width: 80px;
        padding: 12px 16px;
        border-radius: 24px;
        border: 2px solid var(--border);
        font-size: 15px;
        font-family: var(--font);
        background: var(--card);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
    }

    .input:focus {
        border-color: var(--accent);
    }

    .input-time {
        padding: 12px 14px;
        border-radius: 24px;
        border: 2px solid var(--border);
        font-size: 14px;
        font-family: var(--font);
        background: var(--card);
        color: var(--text);
        cursor: pointer;
        max-width: 100px;
        outline: none;
    }

    .input-time:focus {
        border-color: var(--accent);
    }

    .client-card {
        background: var(--card);
        border-radius: var(--radius-sm);
        padding: 14px;
        margin-bottom: 8px;
        border: 1px solid var(--border);
    }

    .task-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        background: var(--card);
        border-radius: var(--radius-sm);
        font-size: 15px;
        margin: 4px 0;
        border: 1px solid var(--border);
        flex-wrap: wrap;
        transition: opacity 0.2s, transform 0.2s;
    }

    .task-checkbox {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #d5ccc5;
        flex-shrink: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 12px;
    }

    .task-item.completed {
        opacity: 0.45;
        background: var(--bg);
    }

    .task-item.completed .task-text {
        text-decoration: line-through;
    }

    .task-item.completed .task-checkbox {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
    }

    .repeat-badge {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 10px;
        background: var(--accent-light);
        color: var(--accent);
        white-space: nowrap;
        font-weight: 500;
    }

    .subtask-list {
        list-style: none;
        padding-left: 26px;
        width: 100%;
    }

    .subtask-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        padding: 3px 0;
        color: var(--text-secondary);
    }

    .subtask-item.completed .subtask-text {
        text-decoration: line-through;
        opacity: 0.5;
    }

    .subtask-checkbox {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 1.5px solid #ccc;
        flex-shrink: 0;
        cursor: pointer;
        font-size: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }

    .subtask-item.completed .subtask-checkbox {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
    }

    .subtask-actions {
        display: flex;
        gap: 2px;
        margin-left: auto;
    }

    .no-tasks {
        text-align: center;
        padding: 28px;
        color: var(--text-secondary);
        font-style: italic;
        font-size: 15px;
        opacity: 0.7;
    }

    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        text-align: center;
    }

    .calendar-day {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 14px;
        cursor: pointer;
        position: relative;
        transition: background 0.2s;
        font-weight: 500;
    }

    .calendar-day:hover {
        background: var(--bg);
    }

    .calendar-day.today {
        background: var(--accent);
        color: #fff;
        font-weight: 700;
    }

    .calendar-day.has-tasks::after {
        content: '';
        width: 5px;
        height: 5px;
        background: var(--accent);
        border-radius: 50%;
        position: absolute;
        bottom: 3px;
    }

    .calendar-day.today.has-tasks::after {
        background: #fff;
    }

    .calendar-day.selected {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
    }

    .note-card {
        background: var(--card);
        border-left: 4px solid #f0c8a0;
        border-radius: var(--radius-sm);
        padding: 14px;
        border: 1px solid var(--border);
    }

    .note-textarea {
        width: 100%;
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 15px;
        resize: vertical;
        min-height: 50px;
        outline: none;
        color: var(--text);
    }

    .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        background: #3a3a3a;
        color: #fff;
        padding: 12px 24px;
        border-radius: 26px;
        font-size: 13px;
        z-index: 200;
        opacity: 0;
        pointer-events: none;
        transition: opacity .3s;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .toast.show {
        opacity: 1;
    }

    .folder-card.smart-today {
        border-left: 4px solid var(--accent);
        background: var(--accent-light);
    }

    .folder-card.smart-overdue {
        border-left: 4px solid var(--overdue);
        background: #fef8f8;
    }
    </style>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Мои планы">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f5f3f0">

</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app-title">Мои планы</div>
        <div class="bg-quote" id="bgQuote"></div>
        <div class="custom-quotes">
            <div class="custom-quote-box" id="customQuoteLeft" data-action="edit-custom-quote" data-side="left">💬 Своя цитата слева</div>
            <div class="custom-quote-box" id="customQuoteCenter" data-action="edit-custom-quote" data-side="center">💬 Своя цитата центр</div>
            <div class="custom-quote-box" id="customQuoteRight" data-action="edit-custom-quote" data-side="right">💬 Своя цитата справа</div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="btnNewFolder" title="Новая папка">📁</button>
            <button class="icon-btn" id="btnNewNote" title="Новая заметка">💡</button>
            <button class="icon-btn" id="btnSearch" title="Поиск">🔍</button>
            <button class="icon-btn" id="btnSync" title="Синхронизировать">🔄</button>
            <button class="icon-btn" id="btnTheme" title="Сменить тему">🌓</button>
            <button class="icon-btn" id="btnExport" title="Экспорт">📤</button>
            <button class="icon-btn" id="btnImport" title="Импорт">📥</button>
        </div>
        <div class="tabs" id="mainTabs">
            <div class="tab active" data-tab="tasks">📂 Папки</div>
            <div class="tab" data-tab="calendar">📅 Календарь</div>
            <div class="tab" data-tab="stats">📊 Статистика</div>
            <div class="tab" data-tab="ai">🧠 ИИ</div>
            <div class="tab" data-tab="clients">👥 Клиенты</div>
            <div class="tab" data-tab="ideas">💡 Идеи</div>
        </div>

        <div class="section active" id="section-tasks">
            <div class="search-container" id="searchContainer" style="display:none;">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по всем задачам..." autocomplete="off">
                <div class="search-stats" id="searchStats"></div>
            </div>
            <div id="folderList"></div>
            <button class="btn-sm btn-add" id="btnAddFolder">+ Новая папка</button>
            <div class="card" id="taskContainer" style="display:none;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span id="currentFolderName" style="font-weight:700;"></span>
                    <button class="btn-sm btn-add" id="btnEditFolder">✏️ Редактировать</button>
                </div>
                <div class="task-filter" id="taskFilter">
                    <button class="task-filter-btn active" data-filter="active">
                        📋 Активные 
                        <span class="count" id="activeCount">0</span>
                    </button>
                    <button class="task-filter-btn" data-filter="completed">
                        ✅ Завершенные 
                        <span class="count" id="completedCount">0</span>
                    </button>
                </div>
                <div class="input-row" style="display:flex;gap:6px;flex-wrap:wrap;">
                    <input type="text" class="input" id="taskInput" placeholder="Новая задача..." autocomplete="off">
                    <input type="date" class="input-time" id="taskDate" style="max-width:120px;">
                    <input type="time" class="input-time" id="taskTime" style="max-width:90px;" value="09:00">
                    <select class="input-time" id="taskRepeat" style="max-width:100px;">
                        <option value="">Без повтора</option>
                        <option value="daily">День</option>
                        <option value="weekly">Неделя</option>
                        <option value="monthly">Месяц</option>
                        <option value="yearly">Год</option>
                        <option value="custom">Свой</option>
                    </select>
                    <input type="number" class="input-time" id="taskRepeatDays" placeholder="Дней" style="max-width:60px;display:none;" min="1" max="365">
                    <button class="btn-sm btn-add" id="btnAddTask">+</button>
                </div>
                <div id="taskList"></div>
                <button class="btn-sm" id="btnBackToFolders">← Назад к папкам</button>

        <div class="section" id="section-calendar">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <button class="btn-sm" id="btnPrevMonth">←</button>
                    <h3 id="calendarTitle"></h3>
                    <button class="btn-sm" id="btnNextMonth">→</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div id="calendarTasks" style="margin-top:8px;"></div>
            </div>
        </div>

        <div class="section" id="section-stats">
            <div class="stats-card">
                <h3 style="margin-bottom:12px;">📊 Статистика выполнения</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="statTotal">0</div>
                        <div class="stat-label">Всего задач</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="statCompleted">0</div>
                        <div class="stat-label">Выполнено</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="statPercent">0%</div>
                        <div class="stat-label">Прогресс</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <div id="statsDetails" style="margin-top:12px;font-size:12px;"></div>
            </div>

        <div class="section" id="section-ai">
            <div class="card">
                <h3>🧠 Рекомендации</h3>
                <div id="aiContent"></div>
            </div>
        </div>

        <div class="section" id="section-clients">
            <div class="card">
                <h3>👥 Клиенты</h3>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <input type="text" class="input" id="clientName" placeholder="ФИО" style="flex:2;">
                    <input type="tel" class="input" id="clientPhone" placeholder="Телефон" style="flex:1;">
                    <input type="date" class="input-time" id="clientDate" style="max-width:130px;">
                    <button class="btn-sm btn-add" id="btnAddClient">+</button>
                </div>
                <div id="clientList"></div>
                <small id="clientStats" style="color:var(--text-secondary);"></small>

        <div class="section" id="section-ideas">
            <textarea class="input" id="noteText" placeholder="Заметка..." style="min-height:80px;"></textarea>
            <button class="btn-sm btn-add" id="btnAddNote">+ Добавить заметку</button>
            <div id="notesList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
    'use strict';

    // ============================
    // FIREBASE
    // ============================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBtrXbMw0clnyWKdnndM6ThsxOcbqxyIo8",
      authDomain: "moi-plany-sync.firebaseapp.com",
      projectId: "moi-plany-sync",
      storageBucket: "moi-plany-sync.firebasestorage.app",
      messagingSenderId: "638054747636",
      appId: "1:638054747636:web:5d35e9bbdba246fd653da1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function syncToCloud() {
        try {
            setDoc(doc(db, "sync", "data"), {
                folders: data.folders,
                notes: data.notes,
                clients: data.clients,
                customQuotes: data.customQuotes,
                updatedAt: new Date().toISOString()
            });
        } catch(e) {}
    }

    function autoSync() {
        onSnapshot(doc(db, "sync", "data"), (docSnap) => {
            if (docSnap.exists()) {
                const cloud = docSnap.data();
                if (cloud && cloud.folders && cloud.updatedAt) {
                    const localTime = localStorage.getItem('lastSyncTime') || '0';
                    if (cloud.updatedAt > localTime) {
                        data.folders = cloud.folders || [];
                        data.notes = cloud.notes || [];
                        data.clients = cloud.clients || [];
                        data.customQuotes = cloud.customQuotes || { left: '', center: '', right: '' };
                        localStorage.setItem('lastSyncTime', cloud.updatedAt);
                        renderAll();
                    }
                }
            }
        });
    }

    // ============================
    // КОНСТАНТЫ
    // ============================
    const STORAGE_KEY = 'my_plans_v14';
    const TOAST_DURATION = 2500;
    const FILTER_ACTIVE = 'active';
    const FILTER_COMPLETED = 'completed';
    const SMART_TODAY_ID = 'smart-today';
    const SMART_OVERDUE_ID = 'smart-overdue';

    const quotes = [
    'Через год, когда посмотришь в зеркало, ты будешь благодарен себе за то, что начал.',
    'Маленький шаг сегодня — большой результат завтра.',
    'И в этом, возможно, и есть ответ: смысл в том, чтобы не спать, даже когда спят все вокруг.',
    'Я не убил своего демона. Я научил его терпению. Он ждет в запертой клетке.',
    'Ты не умеешь праздновать победы, потому что для тебя это не успех, а обязательство.',
    'Освободи своего демона!',
    'Не жди идеального момента. Сделай момент идеальным.',
    'То, что ты делаешь сегодня, определяет твоё завтра.'
    ];

    // ============================
    // СОСТОЯНИЕ ПРИЛОЖЕНИЯ
    // ============================
    let data = {
    folders: [],
    notes: [],
    clients: [],
    currentFolderId: null,
    customQuotes: { left: '', center: '', right: '' },
    currentTaskFilter: FILTER_ACTIVE
    };

    let calendarYear = null;
    let calendarMonth = null;
    let selectedDate = null;
    let isSearchMode = false;

    // ============================
    // УТИЛИТЫ
    // ============================
    const Utils = {
    generateId() {
    return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
    },

    escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
    },

    formatDate(dateStr) {
    if (!dateStr) return '';
    const parts = dateStr.split('-');
    return parts.length === 3 ? parts[2] + '.' + parts[1] + '.' + parts[0] : dateStr;
    },

    formatDateISO(date) {
    if (!(date instanceof Date) || isNaN(date.getTime())) return '';
    return date.getFullYear() + '-' +
    String(date.getMonth() + 1).padStart(2, '0') + '-' +
    String(date.getDate()).padStart(2, '0');
    },

    getNextBirthday(dateStr) {
    const parts = dateStr.split('-').map(Number);
    if (parts.length !== 3) return null;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let birthday = new Date(now.getFullYear(), parts[1] - 1, parts[2]);
    if (birthday < today) birthday.setFullYear(now.getFullYear() + 1);
    return birthday;
    },

    getAge(birthDateStr, onDate) {
    const parts = birthDateStr.split('-').map(Number);
    if (parts.length !== 3) return 0;
    let age = onDate.getFullYear() - parts[0];
    const birthDate = new Date(onDate.getFullYear(), parts[1] - 1, parts[2]);
    if (onDate < birthDate) age--;
    return Math.max(0, age);
    },

    getAgeWord(age) {
    if (typeof age !== 'number' || age < 0) return 'лет';
    if (age % 10 === 1 && age % 100 !== 11) return 'год';
    if ([2, 3, 4].includes(age % 10) && ![12, 13, 14].includes(age % 100)) return 'года';
    return 'лет';
    },

    getFolderStats(folder) {
    if (!folder || !Array.isArray(folder.tasks)) {
    return { active: 0, completed: 0, total: 0 };
    }
    const active = folder.tasks.filter(t => t && !t.completed).length;
    const completed = folder.tasks.filter(t => t && t.completed).length;
    return { active, completed, total: folder.tasks.length };
    },

    getAllTasks() {
    const allTasks = [];
    data.folders.forEach(folder => {
    if (Array.isArray(folder.tasks)) {
    folder.tasks.forEach(task => {
    if (task) {
    allTasks.push({
    ...task,
    folderId: folder.id,
    folderName: folder.name,
    folderIcon: folder.icon
    });
    }
    });
    }
    });
    return allTasks;
    },

    updateTabCounter() {
    const totalActive = data.folders.reduce((sum, folder) => {
    return sum + (Array.isArray(folder.tasks) ? folder.tasks.filter(t => t && !t.completed).length : 0);
    }, 0);
    const today = new Date();
    const todayStr = this.formatDateISO(today);
    const birthdaysToday = data.clients.filter(c => c && c.date && c.date.slice(5) === todayStr.slice(5)).length;
    const total = totalActive + birthdaysToday;
    document.title = total > 0 ? '(' + total + ') Мои планы' : 'Мои планы';
    },

    findTaskById(taskId) {
    for (const folder of data.folders) {
    if (Array.isArray(folder.tasks)) {
    const task = folder.tasks.find(t => t && t.id === taskId);
    if (task) return { task, folder };
    }
    }
    return null;
    },

    getDaysText(dateStr) {
    if (!dateStr) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const taskDate = new Date(dateStr);
    taskDate.setHours(0, 0, 0, 0);
    const diffDays = Math.ceil((taskDate - today) / 86400000);

    if (diffDays < 0) return { text: '⏳ ' + Math.abs(diffDays) + ' дн назад', className: 'overdue' };
    if (diffDays === 0) return { text: '⏳ Сегодня', className: 'today' };
    if (diffDays === 1) return { text: '⏳ Завтра', className: 'upcoming' };
    if (diffDays <= 7) return { text: '⏳ через ' + diffDays + ' дн', className: 'upcoming' };
    return { text: '⏳ через ' + diffDays + ' дн', className: 'upcoming' };
    },

    getOverdueTasks() {
    const today = new Date();
    const todayStr = this.formatDateISO(today);
    const overdueTasks = [];

    data.folders.forEach(folder => {
    if (!Array.isArray(folder.tasks)) return;
    folder.tasks.forEach(task => {
    if (!task || task.completed || !task.date) return;
    if (task.date < todayStr) {
    overdueTasks.push({
    ...task,
    folderId: folder.id,
    folderName: folder.name,
    folderIcon: folder.icon,
    type: 'task'
    });
    }
    });
    });

    // Сортировка: сначала самые старые
    overdueTasks.sort((a, b) => a.date.localeCompare(b.date));
    return overdueTasks;
    }
    };

    // ============================
    // УПРАВЛЕНИЕ ДАННЫМИ
    // ============================
    function loadData() {
    try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed && typeof parsed === 'object') {
    data = parsed;
    }
    }
    } catch (error) {
    console.error('Ошибка загрузки данных:', error);
    }

    data.folders = Array.isArray(data.folders) ? data.folders : [];
    data.notes = Array.isArray(data.notes) ? data.notes : [];
    data.clients = Array.isArray(data.clients) ? data.clients : [];
    data.customQuotes = data.customQuotes || { left: '', center: '', right: '' };
    data.currentTaskFilter = data.currentTaskFilter === FILTER_COMPLETED ? FILTER_COMPLETED : FILTER_ACTIVE;
    data.currentFolderId = data.currentFolderId || null;

    data.folders.forEach(folder => {
    if (!folder.icon) folder.icon = '📁';
    if (!Array.isArray(folder.tasks)) {
    folder.tasks = [];
    } else {
    folder.tasks.forEach(task => {
    if (task) {
    if (!Array.isArray(task.subtasks)) task.subtasks = [];
    if (task.priority === undefined || task.priority === null) task.priority = 0;
    }
    });
    }
    });

    if (!data.currentFolderId && data.folders.length > 0) {
    data.currentFolderId = data.folders[0].id;
    } else if (data.currentFolderId && data.currentFolderId !== SMART_TODAY_ID && data.currentFolderId !== SMART_OVERDUE_ID && !data.folders.some(f => f.id === data.currentFolderId)) {
    data.currentFolderId = data.folders.length > 0 ? data.folders[0].id : null;
    }
    }

    function saveData() {
    try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    Utils.updateTabCounter();
    localStorage.setItem('lastSyncTime', new Date().toISOString());
    syncToCloud();
    } catch (error) {
    console.error('Ошибка сохранения данных:', error);
    showToast('❌ Ошибка сохранения данных');
    }
    }

    // ============================
    // UI-УТИЛИТЫ
    // ============================
    function showToast(message) {
    const toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => toast.classList.remove('show'), TOAST_DURATION);
    }

    function updateQuote() {
    const el = document.getElementById('bgQuote');
    if (!el) return;
    el.style.opacity = '0';
    setTimeout(() => {
    el.textContent = '«' + quotes[Math.floor(Math.random() * quotes.length)] + '»';
    el.style.opacity = '0.7';
    }, 1000);
    }

    // ============================
    // УМНЫЕ ПАПКИ
    // ============================
    function getTodayTasks() {
    const today = new Date();
    const todayStr = Utils.formatDateISO(today);
    const tasks = [];

    data.folders.forEach(folder => {
    if (!Array.isArray(folder.tasks)) return;
    folder.tasks.forEach(task => {
    if (!task || task.completed) return;
    if (task.date === todayStr) {
    tasks.push({
    ...task,
    folderId: folder.id,
    folderName: folder.name,
    folderIcon: folder.icon,
    type: 'task'
    });
    }
    });
    });

    data.clients.forEach(client => {
    if (!client || !client.date) return;
    if (client.date.slice(5) === todayStr.slice(5)) {
    tasks.push({
    id: 'bd_' + client.id,
    text: '🎂 ' + client.name,
    date: todayStr,
    completed: false,
    subtasks: [],
    priority: 3,
    folderId: 'birthdays',
    folderName: 'Дни рождения',
    folderIcon: '🎂',
    type: 'birthday'
    });
    }
    });

    tasks.sort((a, b) => {
    const priorityDiff = (b.priority || 0) - (a.priority || 0);
    if (priorityDiff !== 0) return priorityDiff;
    if (a.time && b.time) return a.time.localeCompare(b.time);
    if (a.time) return -1;
    if (b.time) return 1;
    return 0;
    });

    return tasks;
    }

    // ============================
    // РЕНДЕРИНГ
    // ============================
    function renderCustomQuotes() {
    const elements = {
    left: document.getElementById('customQuoteLeft'),
    center: document.getElementById('customQuoteCenter'),
    right: document.getElementById('customQuoteRight')
    };
    const defaults = {
    left: '💬 Своя цитата слева',
    center: '💬 Своя цитата центр',
    right: '💬 Своя цитата справа'
    };

    Object.keys(elements).forEach(side => {
    const el = elements[side];
    if (el) el.textContent = data.customQuotes[side] || defaults[side];
    });
    }

    function renderFolders() {
    const container = document.getElementById('folderList');
    if (!container) return;

    if (isSearchMode) {
    renderSearchResults();
    return;
    }

    let html = '';

    // Папка "Сегодня"
    const todayTasks = getTodayTasks();
    html += `
    <div class="folder-card smart-today" data-action="open-folder" data-folder-id="${SMART_TODAY_ID}">
    <span class="folder-icon">📅</span>
    <div class="folder-info">
    <div class="folder-name">Сегодня</div>
    <div class="folder-stats">
    <span class="stat-active">📋 ${todayTasks.length} задач</span>
    </div>
    </div>
    </div>`;

    // Папка "Просроченные" (только если есть)
    const overdueTasks = Utils.getOverdueTasks();
    if (overdueTasks.length > 0) {
    html += `
    <div class="folder-card smart-overdue" data-action="open-folder" data-folder-id="${SMART_OVERDUE_ID}">
    <span class="folder-icon">⚠️</span>
    <div class="folder-info">
    <div class="folder-name">Просроченные</div>
    <div class="folder-stats">
    <span class="stat-active" style="color:var(--overdue);">📋 ${overdueTasks.length} задач</span>
    </div>
    </div>
    </div>`;
    }

    if (!data.folders.length) {
    container.innerHTML = html + '<p style="text-align:center;padding:20px;opacity:0.6;">📂 Нет папок. Создайте первую!</p>';
    return;
    }

    container.innerHTML = html + data.folders.map(folder => {
    const stats = Utils.getFolderStats(folder);
    const statsHtml = stats.total > 0
    ? '<span class="stat-active">📋 ' + stats.active + ' активных</span><span class="stat-completed">✅ ' + stats.completed + ' заверш.</span>'
    : '<span>📭 Нет задач</span>';

    return '<div class="folder-card" data-action="open-folder" data-folder-id="' + folder.id + '" ' +
    'ondragover="App.handleDragOver(event)" ondragleave="App.handleDragLeave(event)" ' +
    'ondrop="App.handleDrop(event, \'' + folder.id + '\')">' +
    '<span class="folder-icon" data-action="change-icon" data-folder-id="' + folder.id + '">' + (folder.icon || '📁') + '</span>' +
    '<div class="folder-info">' +
    '<div class="folder-name">' + Utils.escapeHtml(folder.name) + '</div>' +
    '<div class="folder-stats">' + statsHtml + '</div>' +
    '</div></div>';
    }).join('');
    }

    function renderSearchResults() {
    const container = document.getElementById('folderList');
    const searchInput = document.getElementById('searchInput');
    const searchStats = document.getElementById('searchStats');
    if (!container || !searchInput) return;

    const query = searchInput.value.toLowerCase().trim();

    if (!query) {
    isSearchMode = false;
    document.getElementById('searchContainer').style.display = 'none';
    renderFolders();
    return;
    }

    const allTasks = Utils.getAllTasks();
    const filtered = allTasks.filter(task =>
    task.text.toLowerCase().includes(query) ||
    (task.folderName && task.folderName.toLowerCase().includes(query))
    );

    if (searchStats) {
    searchStats.style.display = 'block';
    searchStats.textContent = 'Найдено: ' + filtered.length + ' задач';
    }

    if (!filtered.length) {
    container.innerHTML = '<p style="text-align:center;padding:20px;opacity:0.6;">🔍 Ничего не найдено</p>';
    return;
    }

    container.innerHTML = filtered.map(task => buildTaskHTML(task, task.folderId, true)).join('');
    }

    function buildTaskHTML(task, folderId, showFolderName) {
    let html = '<div class="task-item ' + (task.completed ? 'completed' : '') + '" draggable="true" ' +
    'data-task-id="' + task.id + '" data-folder-id="' + folderId + '" ' +
    'ondragstart="App.handleDragStart(event)" ondragend="App.handleDragEnd(event)">';

    html += '<div class="task-checkbox" data-action="toggle-task" data-task-id="' + task.id + '">' +
    (task.completed ? '✓' : '') + '</div>';

    html += '<div style="flex:1;min-width:100px;">';
    html += '<span class="task-text">' + Utils.escapeHtml(task.text) + '</span>';

    if (showFolderName && task.folderName) {
    html += '<div style="font-size:10px;color:var(--text-secondary);">📁 ' + Utils.escapeHtml(task.folderName) + '</div>';
    }

    // Подзадачи
    if (Array.isArray(task.subtasks) && task.subtasks.length > 0) {
    html += '<ul class="subtask-list">';
    task.subtasks.forEach(subtask => {
    if (!subtask) return;
    html += '<li class="subtask-item ' + (subtask.completed ? 'completed' : '') + '">' +
    '<div class="subtask-checkbox" data-action="toggle-subtask" data-task-id="' + task.id + '" data-subtask-id="' + subtask.id + '">' +
    (subtask.completed ? '✓' : '') + '</div>' +
    '<span class="subtask-text">' + Utils.escapeHtml(subtask.text) + '</span>' +
    '<div class="subtask-actions">' +
    '<button class="btn-xs" data-action="edit-subtask" data-task-id="' + task.id + '" data-subtask-id="' + subtask.id + '" title="Редактировать">✏️</button>' +
    '<button class="btn-xs" data-action="delete-subtask" data-task-id="' + task.id + '" data-subtask-id="' + subtask.id + '" title="Удалить">✕</button>' +
    '</div></li>';
    });
    html += '</ul>';
    }
    html += '</div>';

    // Звездочки
    for (let i = 1; i <= 3; i++) {
    html += '<button class="star-btn ' + (task.priority >= i ? 'active' : '') + '" ' +
    'data-action="set-priority" data-task-id="' + task.id + '" data-priority="' + i + '">⭐</button>';
    }

    // Бейджи
    if (task.repeat) {
    const labels = { daily: 'день', weekly: 'нед', monthly: 'мес', yearly: 'год' };
    const repeatText = task.repeat === 'custom' ? (task.repeatDays || '?') + 'д' : (labels[task.repeat] || task.repeat);
    html += '<span class="repeat-badge">🔁 ' + repeatText + '</span>';
    }
    if (task.time) html += '<span>🕐 ' + task.time + '</span>';
    if (task.date) {
    const daysInfo = Utils.getDaysText(task.date);
    if (daysInfo) {
    html += '<span class="days-badge ' + daysInfo.className + '">' + daysInfo.text + '</span>';
    } else {
    html += '<span>📅 ' + Utils.formatDate(task.date) + '</span>';
    }
    }

    // Кнопки
    html += '<button class="btn-sm btn-add" data-action="add-subtask" data-task-id="' + task.id + '">📋</button>';

    function processRepeats() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let hasChanges = false;
    data.folders.forEach(folder => {
    if (!Array.isArray(folder.tasks)) return;
    const tasksSnapshot = [...folder.tasks];
    tasksSnapshot.forEach(task => {
    if (!task || !task.completed || !task.repeat || !task.date) return;
    try {
    const taskDate = new Date(task.date);
    taskDate.setHours(0, 0, 0, 0);
    let nextDate = new Date(taskDate);
    switch (task.repeat) {
    case 'daily': nextDate.setDate(nextDate.getDate() + 1); break;
    case 'weekly': nextDate.setDate(nextDate.getDate() + 7); break;
    case 'monthly': nextDate.setMonth(nextDate.getMonth() + 1); break;
    case 'yearly': nextDate.setFullYear(nextDate.getFullYear() + 1); break;
    case 'custom': if (task.repeatDays && task.repeatDays > 0) { nextDate.setDate(nextDate.getDate() + task.repeatDays); } else return;
    break;
    default: return;
    }
    const nextDateStr = Utils.formatDateISO(nextDate);
    if (!nextDateStr) return;
    const duplicateExists = folder.tasks.some(t => t && t.text === task.text && t.date === nextDateStr && !t.completed);
    if (duplicateExists) return;
    if (nextDate <= taskDate) return;
    folder.tasks.push({
    id: Utils.generateId(), text: task.text, date: nextDateStr, time: task.time, completed: false,
    subtasks: Array.isArray(task.subtasks) ? task.subtasks.filter(st => st).map(st => ({id: Utils.generateId(), text: st.text, completed: false})) : [],
    repeat: task.repeat, repeatDays: task.repeatDays, priority: task.priority || 0
    });
    const originalTask = folder.tasks.find(t => t && t.id === task.id);
    if (originalTask) { originalTask.repeat = ''; originalTask.repeatDays = 0; }
    hasChanges = true;
    } catch (error) { console.error('Repeat error:', task.id, error); }
    });
    });
    if (hasChanges) saveData();
    }

    renderAll();

    }

    if (!result) return;
    const { task, folder } = result;

    const previousFolderId = data.currentFolderId;
    data.currentFolderId = folder.id;
    processRepeats();

    function editTask(taskId) {
    if (data.currentFolderId === SMART_TODAY_ID || data.currentFolderId === SMART_OVERDUE_ID) {
    showToast('❌ В этой папке нельзя редактировать задачи.');
    return;
    }
    const result = Utils.findTaskById(taskId);
    if (!result) { showToast('❌ Задача не найдена'); return; }
    const { task } = result;
    const newText = prompt('Текст задачи:', task.text); if (newText === null) return;
    const newDate = prompt('Дата (ГГГГ-ММ-ДД):', task.date || ''); if (newDate === null) return;
    const newTime = prompt('Время (ЧЧ:ММ):', task.time || ''); if (newTime === null) return;
    const repeatMap = {'': 'Без повтора', 'daily': 'Ежедневно', 'weekly': 'Еженедельно', 'monthly': 'Ежемесячно', 'yearly': 'Ежегодно', 'custom': 'Свой период'};
    const currentLabel = repeatMap[task.repeat] || 'Без повтора';
    const options = Object.entries(repeatMap).map(([v, l], i) => (i+1) + '. ' + l).join('\n');
    const choice = prompt('Период повторения:\n' + options + '\n\nТекущий: ' + currentLabel + '\nВведите номер:', '');
    if (choice === null) return;
    let newRepeat = '', newRepeatDays = 0;
    const choiceNum = parseInt(choice);
    const keys = Object.keys(repeatMap);
    if (!isNaN(choiceNum) && choiceNum >= 1 && choiceNum <= keys.length) {
    newRepeat = keys[choiceNum - 1];
    if (newRepeat === 'custom') {
    const daysStr = prompt('Дней:', task.repeatDays || '7'); if (daysStr === null) return;
    const days = parseInt(daysStr);
    if (isNaN(days) || days < 1) { showToast('❌ Некорректно'); return; }
    newRepeatDays = days;
    }
    }
    task.text = newText.trim(); task.date = newDate.trim(); task.time = newTime.trim();
    task.repeat = newRepeat || undefined; task.repeatDays = newRepeatDays || undefined;
    saveData(); renderAll(); showToast('✅ Задача обновлена!');
    }

    function setPriority(taskId, priority) {
    const result = Utils.findTaskById(taskId);
    if (!result) return;
    const { task } = result;
    task.priority = task.priority === priority ? priority - 1 : priority;
    saveData();
    if (isSearchMode) renderAll(); else renderTasks();
    }

    // ============================
    // CRUD-ОПЕРАЦИИ С ПАПКАМИ
    // ============================
    function editFolder() {
    if (data.currentFolderId === SMART_TODAY_ID || data.currentFolderId === SMART_OVERDUE_ID) {
    showToast('❌ Эту папку нельзя редактировать.');
    return;
    }
    const folder = data.folders.find(f => f.id === data.currentFolderId);
    if (!folder) return;
    const newName = prompt('Название папки:', folder.name);
    if (!newName || !newName.trim()) return;
    folder.name = newName.trim();
    saveData(); renderAll(); showToast('✅ Папка обновлена!');
    }

    function addFolder() {
    const name = prompt('Название папки:'); if (!name || !name.trim()) return;
    const icon = prompt('Иконка (по умолчанию 📁):', '📁');
    data.folders.push({id: Utils.generateId(), name: name.trim(), icon: icon || '📁', tasks: []});
    saveData(); renderAll(); showToast('📁 Папка создана!');
    }

    function changeFolderIcon(folderId) {
    if (folderId === SMART_TODAY_ID || folderId === SMART_OVERDUE_ID) {
    showToast('❌ Иконку этой папки нельзя изменить.');
    return;
    }
    const folder = data.folders.find(f => f.id === folderId);
    if (!folder) return;
    const icons = ['📁','🏠','💼','👨‍👩‍👧‍👦','📚','🏃','✈️','🎯','❤️','🛒','🎵','💻','🎨','🌟','🗂','📝','🎂','💪','🏡','📅','💰','📞','🎉','🔥'];
    const newIcon = prompt('Выберите иконку:\n' + icons.join(' '), folder.icon);
    if (!newIcon || !newIcon.trim()) return;
    folder.icon = newIcon.trim();
    saveData(); renderAll(); showToast('✅ Иконка обновлена!');
    }

    // ============================
    // DRAG & DROP
    // ============================
    function handleDragStart(event) {
    event.target.classList.add('dragging');
    event.dataTransfer.setData('text/plain', JSON.stringify({
    taskId: event.target.dataset.taskId,
    fromFolderId: event.target.dataset.folderId
    }));
    event.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(event) {
    event.target.classList.remove('dragging');
    document.querySelectorAll('.folder-card').forEach(card => card.classList.remove('drag-over'));
    }

    function handleDragOver(event) {
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    event.currentTarget.classList.add('drag-over');
    }

    function handleDragLeave(event) {
    event.currentTarget.classList.remove('drag-over');
    }

    function handleDrop(event, toFolderId) {
    event.preventDefault();
    event.currentTarget.classList.remove('drag-over');
    try {
    const dragData = JSON.parse(event.dataTransfer.getData('text/plain'));
    const { taskId, fromFolderId } = dragData;
    if (fromFolderId === toFolderId || toFolderId === SMART_TODAY_ID || toFolderId === SMART_OVERDUE_ID) return;
    const fromFolder = data.folders.find(f => f.id === fromFolderId);
    const toFolder = data.folders.find(f => f.id === toFolderId);
    if (!fromFolder || !toFolder) return;
    const taskIndex = fromFolder.tasks.findIndex(t => t && t.id === taskId);
    if (taskIndex === -1) return;
    const task = fromFolder.tasks.splice(taskIndex, 1)[0];
    toFolder.tasks.push(task);
    if (data.currentFolderId === fromFolderId && !fromFolder.tasks.length) data.currentFolderId = toFolderId;
    else if (data.currentFolderId !== toFolderId) data.currentFolderId = toFolderId;
    saveData(); renderAll(); showToast('📦 Задача перемещена!');
    } catch(e) { console.error('Drop error:', e); showToast('❌ Ошибка перемещения'); }
    }

    // ============================
    // ПРОЧИЕ ФУНКЦИИ
    // ============================
    function editCustomQuote(side) {
    if (!['left', 'center', 'right'].includes(side)) return;
    const current = data.customQuotes[side] || '';
    const text = prompt('Введите цитату:', current); if (text === null) return;
    data.customQuotes[side] = text.trim();
    saveData(); renderCustomQuotes();
    }

    function toggleSearch() {
    const sc = document.getElementById('searchContainer');
    const si = document.getElementById('searchInput');
    if (!sc || !si) return;
    if (sc.style.display === 'block') {
    sc.style.display = 'none'; isSearchMode = false; si.value = '';
    const ss = document.getElementById('searchStats'); if (ss) ss.style.display = 'none';
    renderAll();
    } else {
    sc.style.display = 'block'; isSearchMode = true; si.value = ''; si.focus();
    const tc = document.getElementById('taskContainer'); if (tc) tc.style.display = 'none';
    const fl = document.getElementById('folderList'); if (fl) fl.style.display = 'block';
    renderSearchResults();
    }
    }

    function addClient() {
    const ni = document.getElementById('clientName'), pi = document.getElementById('clientPhone'), di = document.getElementById('clientDate');
    if (!ni || !pi || !di) { showToast('❌ Ошибка'); return; }
    const n = ni.value.trim(), p = pi.value.trim(), d = di.value;
    if (!n || !d) { showToast('❌ Введите имя и дату'); return; }
    data.clients.push({id: Utils.generateId(), name: n, phone: p, date: d});
    ni.value = ''; pi.value = ''; di.value = '';
    saveData(); renderAll(); showToast('👤 Клиент добавлен!');
    }

    function editClient(cid) {
    const cl = data.clients.find(c => c.id === cid);
    if (!cl) return;
    const n = prompt('ФИО:', cl.name); if (!n || !n.trim()) return;
    const p = prompt('Телефон:', cl.phone || ''); if (p === null) return;
    const d = prompt('Дата:', cl.date); if (!d) return;
    cl.name = n.trim(); cl.phone = p.trim(); cl.date = d;
    saveData(); renderClients(); showToast('✅ Обновлено!');
    }

    function deleteClient(cid) {
    if (!confirm('Удалить?')) return;
    data.clients = data.clients.filter(c => c.id !== cid);
    saveData(); renderClients(); showToast('🗑️ Удален');
    }

    function addNote() {
    const nt = document.getElementById('noteText'); if (!nt) return;
    data.notes.unshift({id: Utils.generateId(), text: nt.value.trim(), updatedAt: Date.now()});
    nt.value = ''; saveData(); renderAll(); showToast('💡 Добавлена!');
    }

    function emailClient(cid) {
    const cl = data.clients.find(c => c.id === cid);
    if (!cl) return;
    try {
    const bd = Utils.getNextBirthday(cl.date);
    if (!bd) throw new Error('Дата');
    const age = Utils.getAge(cl.date, bd);
    const subj = encodeURIComponent('ДР: ' + cl.name);
    const body = encodeURIComponent('Клиент: ' + cl.name + '\nДата рождения: ' + Utils.formatDate(cl.date) + '\nДР: ' + bd.toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'}) + '\nВозраст: ' + age + ' ' + Utils.getAgeWord(age) + '\nТелефон: ' + (cl.phone || '—'));
    window.open('mailto:fry1997@mail.ru?subject=' + subj + '&body=' + body);
    } catch(e) { showToast('❌ Ошибка'); }
    }

    function exportData() {
    try {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'my_plans_backup_' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url); showToast('📤 Экспортировано!');
    } catch(e) { showToast('❌ Ошибка экспорта'); }
    }

    function importData() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json,.txt,application/json'; input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) { document.body.removeChild(input); return; }
    const reader = new FileReader();
    reader.onload = function(ev) {
    try {
    const imported = JSON.parse(ev.target.result);
    if (!imported || typeof imported !== 'object' || !Array.isArray(imported.folders)) throw new Error('Формат');
    const backup = JSON.parse(JSON.stringify(data));
    try {
    data = imported;
    data.folders = Array.isArray(data.folders) ? data.folders : [];
    data.notes = Array.isArray(data.notes) ? data.notes : [];
    data.clients = Array.isArray(data.clients) ? data.clients : [];
    data.customQuotes = data.customQuotes || {left:'',center:'',right:''};
    data.currentTaskFilter = data.currentTaskFilter === FILTER_COMPLETED ? FILTER_COMPLETED : FILTER_ACTIVE;
    data.currentFolderId = data.currentFolderId || null;
    data.folders.forEach(f => {
    if (!f.icon) f.icon = '📁';
    if (!Array.isArray(f.tasks)) f.tasks = [];
    f.tasks.forEach(t => { if (t) { if (!Array.isArray(t.subtasks)) t.subtasks = []; if (t.priority === undefined || t.priority === null) t.priority = 0; } });
    });
    if (data.currentFolderId && data.currentFolderId !== SMART_TODAY_ID && data.currentFolderId !== SMART_OVERDUE_ID && !data.folders.some(f => f.id === data.currentFolderId)) {
    data.currentFolderId = data.folders.length > 0 ? data.folders[0].id : null;
    }
    saveData(); renderAll(); showToast('📥 Импортировано!');
    } catch(inner) { data = backup; throw inner; }
    } catch(err) { showToast('❌ Ошибка: ' + err.message); }
    document.body.removeChild(input);
    };
    reader.onerror = () => { showToast('❌ Не удалось прочитать'); document.body.removeChild(input); };
    reader.readAsText(file);
    });
    input.click();
    }

    // ============================
    // НАСТРОЙКА ОБРАБОТЧИКОВ СОБЫТИЙ
    // ============================
    function setupEventListeners() {
    document.addEventListener('click', function(event) {
    const target = event.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;
    event.preventDefault();
    try {
    switch (action) {
    case 'open-folder':
    data.currentFolderId = target.dataset.folderId;
    data.currentTaskFilter = FILTER_ACTIVE;
    isSearchMode = false;
    const sc = document.getElementById('searchContainer'); if (sc) sc.style.display = 'none';
    saveData(); renderAll(); break;
    case 'change-icon': event.stopPropagation(); changeFolderIcon(target.dataset.folderId); break;
    case 'toggle-task': toggleTask(target.dataset.taskId); break;
    case 'edit-task': editTask(target.dataset.taskId); break;
    case 'delete-task': deleteTask(target.dataset.taskId); break;
    case 'add-subtask': addSubtask(target.dataset.taskId); break;
    case 'edit-subtask': editSubtask(target.dataset.taskId, target.dataset.subtaskId); break;
    case 'delete-subtask': deleteSubtask(target.dataset.taskId, target.dataset.subtaskId); break;
    case 'toggle-subtask': toggleSubtask(target.dataset.taskId, target.dataset.subtaskId); break;
    case 'set-priority': setPriority(target.dataset.taskId, parseInt(target.dataset.priority)); break;
    case 'edit-client': editClient(target.dataset.clientId); break;
    case 'email-client': emailClient(target.dataset.clientId); break;
    case 'delete-client': deleteClient(target.dataset.clientId); break;
    case 'select-date': selectedDate = target.dataset.date; renderCalendar(); break;
    case 'edit-custom-quote': editCustomQuote(target.dataset.side); break;
    case 'delete-note': deleteNote(target.dataset.noteId); break;
    default: console.warn('Неизвестное действие:', action);
    }
    } catch(e) { console.error('Action error:', action, e); showToast('❌ Ошибка'); }
    });

    const tf = document.getElementById('taskFilter');
    if (tf) tf.addEventListener('click', function(e) { const btn = e.target.closest('.task-filter-btn'); if (btn) setTaskFilter(btn.dataset.filter); });

    const handlers = {
    btnAddTask: addTask, btnAddFolder: addFolder, btnEditFolder: editFolder,
    btnAddClient: addClient, btnAddNote: addNote,
    btnNewFolder: addFolder, btnNewNote: addNote, btnSearch: toggleSearch,
    btnBackToFolders: () => { data.currentFolderId = null; isSearchMode = false; const sc = document.getElementById('searchContainer'); if (sc) sc.style.display = 'none'; saveData(); renderAll(); },
    btnPrevMonth: () => { calendarMonth--; if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; } selectedDate = null; renderCalendar(); },
    btnNextMonth: () => { calendarMonth++; if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; } selectedDate = null; renderCalendar(); },
    btnTheme: () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); },
    btnExport: exportData, btnImport: importData,
    btnSync: () => {
        if (confirm('Синхронизировать? ОК — сохранить данные в файл. Отмена — загрузить из файла.')) {
            const json = JSON.stringify(data);
            const blob = new Blob([json], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'plans_sync.json';
            a.click();
            showToast('☁️ Файл синхронизации сохранён!');
        } else {
            document.getElementById('btnImport').click();
        }
    },
    };
    Object.entries(handlers).forEach(([id, fn]) => { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); });

    const rs = document.getElementById('taskRepeat'), rdi = document.getElementById('taskRepeatDays');
    if (rs && rdi) rs.addEventListener('change', function() { rdi.style.display = this.value === 'custom' ? 'inline' : 'none'; if (this.value === 'custom' && !rdi.value) rdi.value = '1'; });

    const si = document.getElementById('searchInput');
    if (si) { si.addEventListener('input', () => { if (isSearchMode) renderSearchResults(); }); si.addEventListener('keydown', (e) => { if (e.key === 'Escape') toggleSearch(); }); }

    document.querySelectorAll('#mainTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
    const tn = this.dataset.tab;
    document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const section = document.getElementById('section-' + tn);
    if (section) { section.classList.add('active'); if (tn === 'calendar') renderCalendar(); else if (tn === 'tasks') { isSearchMode = false; const sc = document.getElementById('searchContainer'); if (sc) sc.style.display = 'none'; renderAll(); } else if (tn === 'stats') renderStats(); }
    });
    });

    let noteTimeout;
    document.addEventListener('input', function(e) {
    if (!e.target.classList.contains('note-textarea')) return;
    clearTimeout(noteTimeout);
    noteTimeout = setTimeout(() => {
    const note = data.notes.find(n => n.id === e.target.dataset.noteId);
    if (note) { note.text = e.target.value; note.updatedAt = Date.now(); saveData(); }
    }, 600);
    });

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') document.body.classList.add('dark');
    }

    // ============================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================
    function initialize() {
    try {
    loadData(); processRepeats();
    autoSync();
    const now = new Date(); calendarYear = now.getFullYear(); calendarMonth = now.getMonth();
    setupEventListeners(); renderAll(); Utils.updateTabCounter();
    updateQuote(); setInterval(updateQuote, 30000);
    console.log('✅ Приложение готово');
    } catch(e) { console.error('Init error:', e); showToast('❌ Ошибка загрузки'); }
    }

    window.App = { handleDragStart, handleDragEnd, handleDragOver, handleDragLeave, handleDrop };
    window.debugApp = { getData: () => data, resetData: () => { localStorage.removeItem(STORAGE_KEY); location.reload(); } };

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initialize);
    else initialize();

    })();
    </script>
</body>
