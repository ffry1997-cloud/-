<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Мои планы</title>
<style>
:root{--bg:#faf7f5;--card:#fff;--text:#3a3340;--text-secondary:#9a8f9f;--accent:#c8957c;--accent-light:#faf0eb;--danger:#b8a0a8;--danger-light:#f7f0f2;--border:#ede6e0;--shadow:0 2px 16px rgba(180,160,150,0.08);--radius:18px;--radius-sm:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--urgent:#f5e8e2;--warning:#faf0e8;--gentle:#eef2f0}
.dark{--bg:#2a2528;--card:#383438;--text:#e8e0e5;--text-secondary:#a098a5;--accent:#d4a590;--accent-light:#3d3538;--border:#4a4448}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:8px;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
.app-container{width:100%;max-width:620px;display:flex;flex-direction:column;gap:10px;padding:4px 2px}
.app-title{text-align:center;font-size:24px;font-weight:700;padding:10px 0 0}
.bg-quote{text-align:center;font-style:italic;color:var(--text-secondary);padding:4px 0;font-size:13px;opacity:.7}
.sync-bar{text-align:center;font-size:11px;color:var(--text-secondary);margin-bottom:2px}
.header-actions{display:flex;justify-content:center;gap:10px;padding:2px 0 6px;flex-wrap:wrap}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--card);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);color:var(--text)}
.icon-btn:active{transform:scale(.93)}
.search-bar{width:100%;padding:10px 16px;border-radius:24px;border:2px solid var(--border);font-size:14px;font-family:var(--font);background:var(--card);color:var(--text);outline:none}
.search-bar:focus{border-color:var(--accent)}
.tabs{display:flex;background:var(--card);border-radius:28px;padding:4px;box-shadow:var(--shadow);gap:1px;overflow-x:auto}
.tab{flex:1;text-align:center;padding:10px 8px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-secondary);white-space:nowrap;min-width:fit-content}
.tab.active{background:var(--accent-light);color:var(--accent);font-weight:700}
.sub-tabs{display:flex;gap:4px;margin-bottom:4px}
.sub-tab{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;background:var(--border);color:var(--text-secondary)}
.sub-tab.active{background:var(--accent);color:#fff}
.section{display:none;flex-direction:column;gap:10px}
.section.active{display:flex}
.card{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px}
.folder-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;box-shadow:0 1px 6px rgba(0,0,0,.04);display:flex;align-items:center;gap:10px;cursor:pointer;border:1.5px solid transparent}
.folder-card:active{transform:scale(.98)}
.folder-icon{font-size:30px;flex-shrink:0;width:40px;text-align:center;cursor:pointer}
.folder-info{flex:1;min-width:0}
.folder-name{font-size:15px;font-weight:600}
.folder-meta{font-size:11px;color:var(--text-secondary)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}
.btn-sm{padding:7px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.btn-sm:active{transform:scale(.95)}
.btn-add{background:var(--accent-light);color:var(--accent)}
.btn-danger{background:var(--danger-light);color:var(--danger)}
.btn-outline{background:0 0;border:2px solid var(--border);color:var(--text)}
.btn-email{background:#e8f0fe;color:#1a73e8}
.task-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.task-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;border:1px solid var(--border);flex-wrap:wrap}
.task-item.completed{opacity:.5}
.task-item.completed .task-text{text-decoration:line-through}
.task-checkbox{width:20px;height:20px;border-radius:50%;border:2px solid #d5ccc5;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;cursor:pointer}
.task-item.completed .task-checkbox{background:var(--accent);border-color:var(--accent);color:#fff}
.task-text{flex:1;word-break:break-word;min-width:100px}
.task-time{font-size:11px;color:var(--accent);background:var(--accent-light);padding:3px 8px;border-radius:12px}
.task-date{font-size:10px;color:var(--text-secondary)}
.task-delete{opacity:0;font-size:14px;cursor:pointer;padding:3px 5px;border-radius:50%;background:0 0;border:none;color:var(--danger)}
.task-item:active .task-delete{opacity:1}
.task-email{opacity:0;font-size:14px;cursor:pointer;padding:3px 5px;border-radius:50%;background:0 0;border:none;color:#1a73e8}
.task-item:active .task-email{opacity:1}
.subtask-list{list-style:none;padding-left:24px;display:flex;flex-direction:column;gap:2px;width:100%}
.subtask-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0;color:var(--text-secondary)}
.subtask-item.completed .subtask-text{text-decoration:line-through;opacity:.5}
.subtask-checkbox{width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;cursor:pointer}
.subtask-item.completed .subtask-checkbox{background:var(--accent);border-color:var(--accent);color:#fff}
.input-row{display:flex;gap:6px;flex-wrap:wrap}
.input{flex:1;min-width:80px;padding:10px 14px;border-radius:22px;border:2px solid var(--border);font-size:14px;font-family:var(--font);background:var(--card);color:var(--text);outline:none}
.input:focus{border-color:var(--accent)}
.input-time{padding:10px 12px;border-radius:22px;border:2px solid var(--border);font-size:13px;font-family:var(--font);background:var(--card);color:var(--text);outline:none;cursor:pointer;max-width:100px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.calendar-day-name{font-size:10px;font-weight:700;color:var(--text-secondary);padding:2px 0}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:500;cursor:pointer;position:relative}
.calendar-day.today{background:var(--accent-light);color:var(--accent);font-weight:700}
.calendar-day.has-tasks::after{content:'';width:4px;height:4px;background:var(--accent);border-radius:50%;position:absolute;bottom:2px}
.calendar-day.other-month{color:#ccc;pointer-events:none}
.calendar-day.selected{outline:2px solid var(--accent);outline-offset:2px}
.note-card{background:var(--card);border-left:3px solid #f0c8a0;border-radius:var(--radius-sm);padding:12px}
.note-textarea{width:100%;border:none;background:0 0;font-family:var(--font);font-size:14px;resize:vertical;min-height:50px;outline:none;color:var(--text)}
.recommendation{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;display:flex;align-items:flex-start;gap:8px}
.recommendation.urgent{background:var(--urgent)}
.recommendation.warning{background:var(--warning)}
.recommendation.gentle{background:var(--gentle)}
.client-card{background:var(--card);border-radius:var(--radius-sm);padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.03);display:flex;flex-direction:column;gap:4px}
.focus-zone{background:var(--accent-light);border:2px dashed var(--accent);border-radius:var(--radius);padding:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4a3f50;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app-container" id="appContainer">
<div class="app-title">Мои планы</div>
<div class="bg-quote" id="bgQuote"></div>
<div class="sync-bar" id="syncStatus">⚡ Загрузка...</div>
<div class="header-actions">
<button class="icon-btn" id="btnNewFolder">📁</button>
<button class="icon-btn" id="btnNewNote">💡</button>
<button class="icon-btn" id="btnSync" title="Синхронизировать">🔄</button>
<button class="icon-btn" id="btnTheme">🌓</button>
</div>
<input type="text" class="search-bar" id="searchInput" placeholder="🔍 Поиск..." autocomplete="off">
<div class="tabs" id="mainTabs">
<div class="tab active" data-tab="tasks">📂 Папки</div>
<div class="tab" data-tab="calendar">📅 Календарь</div>
<div class="tab" data-tab="ai">🧠 ИИ</div>
<div class="tab" data-tab="clients">👥 Клиенты</div>
<div class="tab" data-tab="ideas">💡 Идеи</div>
<div class="tab" data-tab="journal">📊 Журнал</div>
</div>
<div class="section active" id="section-tasks">
<div id="focusZone" class="focus-zone" style="display:none"></div>
<div id="folderListContainer"><div id="folderList"></div><button class="btn-sm btn-add" id="btnAddFolderInline" style="margin-top:4px">+ Папка</button></div>
<div class="card" id="taskContainer" style="display:none">
<div style="display:flex;justify-content:space-between"><span id="currentFolderName" style="font-weight:700"></span></div>
<div class="sub-tabs" id="subTabs"><div class="sub-tab active" data-subtab="active">🟢 Активные</div><div class="sub-tab" data-subtab="completed">✅ Завершённые</div></div>
<div class="progress-bar"><div class="progress-fill" id="folderProgress" style="width:0%"></div></div>
<div class="input-row" id="addTaskRow">
<input type="text" class="input" id="taskInput" placeholder="Задача..." autocomplete="off">
<input type="date" class="input-time" id="taskDate" style="max-width:120px">
<input type="time" class="input-time" id="taskTime" style="max-width:90px" value="09:00">
<button class="btn-sm btn-add" id="btnAddTask">+</button>
</div>
<ul class="task-list" id="taskList"></ul>
<button class="btn-sm btn-outline" id="btnBackToFolders">← Назад</button>
</div>
</div>
<div class="section" id="section-calendar"><div class="card"><div style="display:flex;justify-content:space-between"><button class="btn-sm btn-outline" id="btnPrevMonth">←</button><h3 id="calendarTitle"></h3><button class="btn-sm btn-outline" id="btnNextMonth">→</button></div><div class="calendar-grid" id="calendarGrid"></div><div id="calendarTasks" style="margin-top:8px"></div></div></div>
<div class="section" id="section-ai"><div class="card"><h3>🧠 Рекомендации</h3><div id="aiContent"></div></div></div>
<div class="section" id="section-clients"><div class="card"><h3>👥 Клиенты</h3><div class="input-row"><input type="text" class="input" id="clientName" placeholder="ФИО"><input type="tel" class="input" id="clientPhone" placeholder="Телефон"><input type="date" class="input-time" id="clientDate" style="max-width:130px"><button class="btn-sm btn-add" id="btnAddClient">+</button></div><div id="clientList"></div><small id="clientStats" style="color:var(--text-secondary)"></small></div></div>
<div class="section" id="section-ideas"><div id="notesList"></div><button class="btn-sm btn-add" id="btnAddNote">+ Заметка</button></div>
<div class="section" id="section-journal"><div class="card"><h3>📊 Журнал</h3><div id="journalContent"></div></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const GIST_ID='9df60d13d24c13541606cd2e54c025b';
const GITHUB_TOKEN='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';
let data={folders:[],notes:[],clients:[],currentFolderId:null,currentSubtab:'active',focusTasks:[],journal:{},letters:[]};
let calendarYear,calendarMonth,selectedDate=null;
const quotes=['Через год, когда посмотришь в зеркало, ты будешь благодарен себе за то, что начал.','Маленький шаг сегодня — большой результат завтра.'];
function gid(){return 'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).substr(2,6)}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function formatDate(s){if(!s)return'';const p=s.split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:s}
function formatDateISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getWeekNumber(){const n=new Date();const s=new Date(n.getFullYear(),0,1);return Math.ceil(((n-s)/86400000+s.getDay()+1)/7)}
function getNextBirthday(ds){const p=ds.split('-').map(Number);const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());let bd=new Date(now.getFullYear(),p[1]-1,p[2]);if(bd<today)bd.setFullYear(now.getFullYear()+1);return bd}
function getAge(bds,on){const p=bds.split('-').map(Number);let a=on.getFullYear()-p[0];const bd=new Date(on.getFullYear(),p[1]-1,p[2]);if(on<bd)a--;return a}
function getAgeWord(a){if(a%10===1&&a%100!==11)return'год';if([2,3,4].includes(a%10)&&![12,13,14].includes(a%100))return'года';return'лет'}
async function loadFromGist(){try{const r=await fetch('https://api.github.com/gists/'+GIST_ID);const g=await r.json();const f=g.files['data.json'];if(f&&f.content){data=JSON.parse(f.content);document.getElementById('syncStatus').textContent='✅ Загружено'}}catch(e){document.getElementById('syncStatus').textContent='⚠️ Офлайн'};if(!data.clients)data.clients=[];if(!data.journal)data.journal={};if(!data.letters)data.letters=[];if(!data.currentFolderId&&data.folders.length)data.currentFolderId=data.folders[0].id;renderAll()}
async function saveToGist(){try{await fetch('https://api.github.com/gists/'+GIST_ID,{method:'PATCH',headers:{'Authorization':'token '+GITHUB_TOKEN,'Content-Type':'application/json'},body:JSON.stringify({files:{'data.json':{content:JSON.stringify(data)}}})});document.getElementById('syncStatus').textContent='✅ Сохранено'}catch(e){document.getElementById('syncStatus').textContent='⚠️ Ошибка'}}
function updateQuote(){const e=document.getElementById('bgQuote');e.style.opacity='0';setTimeout(()=>{e.textContent='«'+quotes[Math.floor(Math.random()*quotes.length)]+'»';e.style.opacity='0.7'},1000)}
updateQuote();setInterval(updateQuote,30000);
function renderFolders(){const c=document.getElementById('folderList');if(!data.folders.length){c.innerHTML='<p style="text-align:center;padding:20px">Нет папок</p>';return}c.innerHTML=data.folders.map(f=>{const t=f.tasks.length,d=f.tasks.filter(t=>t.completed).length;return'<div class="folder-card" data-action="open-folder" data-folder-id="'+f.id+'"><span class="folder-icon">'+(f.icon||'📁')+'</span><div class="folder-info"><div class="folder-name">'+escapeHtml(f.name)+'</div><div class="folder-meta">🟢 '+(t-d)+' · ✅ '+d+'</div></div></div>'}).join('')}
function renderTasks(){const f=data.folders.find(f=>f.id===data.currentFolderId);const tc=document.getElementById('taskContainer');const flc=document.getElementById('folderListContainer');if(!f){tc.style.display='none';flc.style.display='block';return}tc.style.display='flex';flc.style.display='none';document.getElementById('currentFolderName').textContent=(f.icon||'📁')+' '+f.name;document.getElementById('addTaskRow').style.display=data.currentSubtab==='active'?'flex':'none';document.querySelectorAll('#subTabs .sub-tab').forEach(st=>st.classList.toggle('active',st.dataset.subtab===data.currentSubtab));const filtered=data.currentSubtab==='completed'?f.tasks.filter(t=>t.completed):f.tasks.filter(t=>!t.completed);const list=document.getElementById('taskList');if(!filtered.length){list.innerHTML='<p style="text-align:center;padding:16px">Нет задач</p>';return}list.innerHTML=filtered.map(t=>'<li class="task-item '+(t.completed?'completed':'')+'"><div class="task-checkbox" data-action="toggle-task" data-task-id="'+t.id+'">'+(t.completed?'✓':'')+'</div><span class="task-text">'+escapeHtml(t.text)+'</span>'+(t.time?'<span class="task-time">🕐'+t.time+'</span>':'')+(t.date?'<span class="task-date">📅'+formatDate(t.date)+'</span>':'')+'<button class="task-delete" data-action="delete-task" data-task-id="'+t.id+'">✕</button></li>').join('')}
function renderNotes(){const c=document.getElementById('notesList');if(!data.notes.length){c.innerHTML='<p style="text-align:center;padding:20px">Нет заметок</p>';return}c.innerHTML=data.notes.map(n=>'<div class="note-card"><textarea class="note-textarea" data-note-id="'+n.id+'">'+escapeHtml(n.text)+'</textarea></div>').join('')}
function renderCalendar(){const now=new Date();if(!calendarYear)calendarYear=now.getFullYear();if(!calendarMonth&&calendarMonth!==0)calendarMonth=now.getMonth();document.getElementById('calendarTitle').textContent=new Date(calendarYear,calendarMonth).toLocaleDateString('ru-RU',{month:'long',year:'numeric'});const grid=document.getElementById('calendarGrid');grid.innerHTML=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>'<div class="calendar-day-name">'+d+'</div>').join('');const fd=new Date(calendarYear,calendarMonth,1);let sd=fd.getDay();if(sd===0)sd=7;sd--;const dim=new Date(calendarYear,calendarMonth+1,0).getDate();const pd=new Date(calendarYear,calendarMonth,0).getDate();const todayStr=formatDateISO(now);for(let i=sd-1;i>=0;i--)grid.innerHTML+='<div class="calendar-day other-month">'+(pd-i)+'</div>';for(let d=1;d<=dim;d++){const ds=formatDateISO(new Date(calendarYear,calendarMonth,d));const hasTasks=data.folders.some(f=>f.tasks.some(t=>t.date===ds&&!t.completed));grid.innerHTML+='<div class="calendar-day '+(ds===todayStr?'today':'')+' '+(hasTasks?'has-tasks':'')+' '+(selectedDate===ds?'selected':'')+'" style="position:relative" data-action="select-date" data-date="'+ds+'">'+d+'</div>'}const tc=sd+dim,rem=tc%7===0?0:7-(tc%7);for(let d=1;d<=rem;d++)grid.innerHTML+='<div class="calendar-day other-month">'+d+'</div>';renderCalendarTasks()}
function renderCalendarTasks(){const c=document.getElementById('calendarTasks');if(!selectedDate){c.innerHTML='<p style="text-align:center">Выберите день</p>';return}const tasks=[];data.folders.forEach(f=>f.tasks.forEach(t=>{if(t.date===selectedDate&&!t.completed)tasks.push({...t,folderName:f.name,folderIcon:f.icon})}));c.innerHTML=tasks.length?'<h4>📅 '+formatDate(selectedDate)+'</h4>'+tasks.map(t=>'<div class="task-item"><span>'+(t.folderIcon||'📁')+'</span><span>'+escapeHtml(t.text)+'</span></div>').join(''):'<p style="text-align:center">Задач нет 🎉</p>'}
function renderAI(){const c=document.getElementById('aiContent');const today=formatDateISO(new Date());const all=[];data.folders.forEach(f=>f.tasks.forEach(t=>{if(!t.completed)all.push({...t,folderName:f.name})}));const urgent=all.filter(t=>t.date&&t.date<=today);let h=urgent.length?'<div class="recommendation urgent"><span>🟤</span><div><strong>Срочно:</strong><br>'+urgent.slice(0,3).map(t=>'• '+escapeHtml(t.text)).join('<br>')+'</div></div>':'<p>🎉 Всё под контролем!</p>';c.innerHTML=h}
function renderClients(){const c=document.getElementById('clientList');if(!data.clients.length){c.innerHTML='<p style="text-align:center;padding:16px">Нет клиентов</p>';return}const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());c.innerHTML=data.clients.sort((a,b)=>getNextBirthday(a.date)-getNextBirthday(b.date)).map(cl=>{const bd=getNextBirthday(cl.date);const age=getAge(cl.date,bd);const days=Math.ceil((bd-today)/86400000);const ds=bd.getDate()+' '+bd.toLocaleDateString('ru-RU',{month:'long'})+' '+bd.getFullYear();let st=days===0?'🎂 Сегодня!':days===1?'🎂 Завтра!':'📅 '+ds+' (через '+days+' дн.)';return'<div class="client-card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><span><strong>'+escapeHtml(cl.name)+'</strong> — '+formatDate(cl.date)+' ('+age+' '+getAgeWord(age)+')</span><div><button class="btn-sm btn-add" data-action="edit-client" data-client-id="'+cl.id+'">✏️</button><button class="btn-sm btn-email" data-action="email-client" data-client-id="'+cl.id+'">📧</button><button class="btn-sm btn-danger" data-action="delete-client" data-client-id="'+cl.id+'">✕</button></div></div>'+(cl.phone?'<span>📱 '+escapeHtml(cl.phone)+'</span>':'')+'<span style="font-size:12px;color:var(--accent)">'+st+'</span></div>'}).join('');const tm=data.clients.filter(cl=>{const bd=getNextBirthday(cl.date);return bd.getMonth()===now.getMonth()&&bd.getFullYear()===now.getFullYear()}).length;document.getElementById('clientStats').textContent='В этом месяце: '+tm+' дн. рожд. · Всего: '+data.clients.length}
function renderJournal(){const wk='week_'+getWeekNumber();const s=data.journal[wk]||{added:0,completed:0};document.getElementById('journalContent').innerHTML='<p>📈 Неделя '+getWeekNumber()+':</p><p>➕ Добавлено: '+s.added+'</p><p>✅ Выполнено: '+s.completed+'</p>'}
function renderAll(){renderFolders();renderTasks();renderNotes();renderCalendar();renderAI();renderClients();renderJournal()}
function toggleTask(tid){const f=data.folders.find(f=>f.id===data.currentFolderId);if(!f)return;const t=f.tasks.find(t=>t.id===tid);if(!t)return;t.completed=!t.completed;const wk='week_'+getWeekNumber();if(!data.journal[wk])data.journal[wk]={added:0,completed:0};if(t.completed)data.journal[wk].completed++;saveToGist();renderAll()}
function addTask(){const text=document.getElementById('taskInput').value.trim();if(!text)return;const f=data.folders.find(f=>f.id===data.currentFolderId);if(!f)return;f.tasks.push({id:gid(),text:text,date:document.getElementById('taskDate').value,time:document.getElementById('taskTime').value,completed:false,subtasks:[],repeat:'',repeatDays:0,energy:'',tag:''});const wk='week_'+getWeekNumber();if(!data.journal[wk])data.journal[wk]={added:0,completed:0};data.journal[wk].added++;document.getElementById('taskInput').value='';saveToGist();renderAll()}
function deleteTask(tid){const f=data.folders.find(f=>f.id===data.currentFolderId);if(!f)return;f.tasks=f.tasks.filter(t=>t.id!==tid);saveToGist();renderAll()}
function addClient(){const n=document.getElementById('clientName').value.trim();const p=document.getElementById('clientPhone').value.trim();const d=document.getElementById('clientDate').value;if(!n||!d)return showToast('Введите имя и дату');data.clients.push({id:gid(),name:n,phone:p,date:d});document.getElementById('clientName').value='';document.getElementById('clientPhone').value='';document.getElementById('clientDate').value='';saveToGist();renderClients()}
function editClient(id){const cl=data.clients.find(c=>c.id===id);if(!cl)return;const nn=prompt('ФИО:',cl.name);if(nn===null)return;if(!nn.trim()){alert('Имя обязательно');return}const np=prompt('Телефон:',cl.phone||'');if(np===null)return;const nd=prompt('Дата (ГГГГ-ММ-ДД):',cl.date);if(nd===null)return;if(!/^\d{4}-\d{2}-\d{2}$/.test(nd)){alert('Формат: ГГГГ-ММ-ДД');return}cl.name=nn.trim();cl.phone=np.trim();cl.date=nd;saveToGist();renderClients();showToast('✅ Обновлено!')}
function deleteClient(id){if(!confirm('Удалить?'))return;data.clients=data.clients.filter(c=>c.id!==id);saveToGist();renderClients()}
function addFolder(){const n=prompt('Название папки:');if(!n)return;data.folders.push({id:gid(),name:n,icon:'📁',tasks:[]});saveToGist();renderAll()}
function addNote(){const t=document.getElementById('noteText')?.value?.trim();if(!t)return;data.notes.unshift({id:gid(),text:t,updatedAt:Date.now()});saveToGist();renderNotes()}
function emailClient(cid){const cl=data.clients.find(c=>c.id===cid);if(!cl)return;const bd=getNextBirthday(cl.date);const age=getAge(cl.date,bd);window.open('mailto:fry1997@mail.ru?subject='+encodeURIComponent('ДР: '+cl.name)+'&body='+encodeURIComponent('Клиент: '+cl.name+'\nДата рождения: '+formatDate(cl.date)+'\nБлижайший ДР: '+bd.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})+'\nВозраст: '+age+' '+getAgeWord(age)+'\nТелефон: '+(cl.phone||'—')))}
document.addEventListener('click',function(e){const t=e.target.closest('[data-action]');if(!t)return;const a=t.dataset.action;const fid=t.dataset.folderId;const tid=t.dataset.taskId;const cid=t.dataset.clientId;switch(a){case'open-folder':data.currentFolderId=fid;data.currentSubtab='active';saveToGist();renderAll();break;case'toggle-task':toggleTask(tid);break;case'delete-task':deleteTask(tid);break;case'edit-client':editClient(cid);break;case'email-client':emailClient(cid);break;case'delete-client':deleteClient(cid);break;case'select-date':selectedDate=t.dataset.date;renderCalendar();break}});
document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('section-'+this.dataset.tab).classList.add('active');if(this.dataset.tab==='calendar')renderCalendar()}));
document.getElementById('subTabs').addEventListener('click',function(e){const st=e.target.closest('.sub-tab');if(!st)return;data.currentSubtab=st.dataset.subtab;saveToGist();renderAll()});
document.getElementById('btnAddTask').addEventListener('click',addTask);
document.getElementById('taskInput').addEventListener('keydown',function(e){if(e.key==='Enter')addTask()});
document.getElementById('btnBackToFolders').addEventListener('click',()=>{data.currentFolderId=null;saveToGist();renderAll()});
document.getElementById('btnAddClient').addEventListener('click',addClient);
document.getElementById('btnAddFolderInline').addEventListener('click',addFolder);
document.getElementById('btnNewFolder').addEventListener('click',addFolder);
document.getElementById('btnAddNote').addEventListener('click',addNote);
document.getElementById('btnNewNote').addEventListener('click',addNote);
document.getElementById('btnPrevMonth').addEventListener('click',()=>{calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}selectedDate=null;renderCalendar()});
document.getElementById('btnNextMonth').addEventListener('click',()=>{calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}selectedDate=null;renderCalendar()});
document.getElementById('btnTheme').addEventListener('click',()=>{document.getElementById('appContainer').classList.toggle('dark')});
document.getElementById('btnSync').addEventListener('click',()=>{loadFromGist();showToast('Синхронизировано!')});
let noteTimeout;document.addEventListener('input',function(e){if(e.target.classList.contains('note-textarea')){clearTimeout(noteTimeout);noteTimeout=setTimeout(()=>{const n=data.notes.find(n=>n.id===e.target.dataset.noteId);if(n){n.text=e.target.value;n.updatedAt=Date.now();saveToGist()}},600)}});
const now=new Date();calendarYear=now.getFullYear();calendarMonth=now.getMonth();
loadFromGist();
setInterval(()=>loadFromGist(),30000);
</script>
</body>
</html>
