<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Мои планы</title>
    <style>
        :root {
            --bg: #faf7f5; --card: #ffffff; --text: #3a3340; --text-secondary: #9a8f9f;
            --accent: #c8957c; --accent-light: #faf0eb; --danger: #b8a0a8; --danger-light: #f7f0f2;
            --border: #ede6e0; --shadow: 0 2px 16px rgba(180,160,150,0.08);
            --radius: 18px; --radius-sm: 12px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --urgent: #f5e8e2; --warning: #faf0e8; --gentle: #eef2f0;
        }
        .dark { --bg:#2a2528; --card:#383438; --text:#e8e0e5; --text-secondary:#a098a5; --accent:#d4a590; --accent-light:#3d3538; --border:#4a4448; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; display:flex; justify-content:center; padding:8px; -webkit-font-smoothing:antialiased; user-select:none; -webkit-user-select:none; }
        .app-container { width:100%; max-width:620px; display:flex; flex-direction:column; gap:10px; padding:4px 2px; }
        .app-title { text-align:center; font-size:24px; font-weight:700; padding:10px 0 0; }
        .bg-quote { text-align:center; font-style:italic; color:var(--text-secondary); padding:4px 0; font-size:13px; opacity:0.7; }
        .header-actions { display:flex; justify-content:center; gap:10px; padding:2px 0 6px; flex-wrap:wrap; }
        .icon-btn { width:40px; height:40px; border-radius:50%; border:none; background:var(--card); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); color:var(--text); }
        .icon-btn:active { transform:scale(0.93); }
        .search-bar { width:100%; padding:10px 16px; border-radius:24px; border:2px solid var(--border); font-size:14px; font-family:var(--font); background:var(--card); color:var(--text); outline:none; }
        .search-bar:focus { border-color:var(--accent); }
        .tabs { display:flex; background:var(--card); border-radius:28px; padding:4px; box-shadow:var(--shadow); gap:1px; overflow-x:auto; }
        .tab { flex:1; text-align:center; padding:10px 8px; border-radius:24px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text-secondary); white-space:nowrap; min-width:fit-content; }
        .tab.active { background:var(--accent-light); color:var(--accent); font-weight:700; }
        .sub-tabs { display:flex; gap:4px; margin-bottom:4px; }
        .sub-tab { padding:6px 14px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer; background:var(--border); color:var(--text-secondary); }
        .sub-tab.active { background:var(--accent); color:#fff; }
        .section { display:none; flex-direction:column; gap:10px; }
        .section.active { display:flex; }
        .card { background:var(--card); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px; }
        .folder-card { background:var(--card); border-radius:var(--radius); padding:12px 14px; box-shadow:0 1px 6px rgba(0,0,0,0.04); display:flex; align-items:center; gap:10px; cursor:pointer; border:1.5px solid transparent; }
        .folder-card:active { transform:scale(0.98); }
        .folder-icon { font-size:30px; flex-shrink:0; width:40px; text-align:center; cursor:pointer; }
        .folder-info { flex:1; min-width:0; }
        .folder-name { font-size:15px; font-weight:600; }
        .folder-meta { font-size:11px; color:var(--text-secondary); }
        .progress-bar { height:4px; background:var(--border); border-radius:2px; margin-top:4px; overflow:hidden; }
        .progress-fill { height:100%; background:var(--accent); border-radius:2px; }
        .btn-sm { padding:7px 14px; border-radius:20px; border:none; font-size:12px; font-weight:600; cursor:pointer; }
        .btn-sm:active { transform:scale(0.95); }
        .btn-add { background:var(--accent-light); color:var(--accent); }
        .btn-danger { background:var(--danger-light); color:var(--danger); }
        .btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }
        .btn-email { background:#e8f0fe; color:#1a73e8; }
        .task-list { list-style:none; display:flex; flex-direction:column; gap:4px; }
        .task-item { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--card); border-radius:var(--radius-sm); font-size:14px; cursor:pointer; border:1px solid var(--border); flex-wrap:wrap; }
        .task-item.completed { opacity:0.5; }
        .task-item.completed .task-text { text-decoration:line-through; }
        .task-checkbox { width:20px; height:20px; border-radius:50%; border:2px solid #d5ccc5; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; cursor:pointer; }
        .task-item.completed .task-checkbox { background:var(--accent); border-color:var(--accent); color:#fff; }
        .task-text { flex:1; word-break:break-word; min-width:100px; }
        .task-time { font-size:11px; color:var(--accent); background:var(--accent-light); padding:3px 8px; border-radius:12px; white-space:nowrap; }
        .task-date { font-size:10px; color:var(--text-secondary); white-space:nowrap; }
        .task-delete { opacity:0; font-size:14px; cursor:pointer; padding:3px 5px; border-radius:50%; background:none; border:none; color:var(--danger); }
        .task-item:active .task-delete { opacity:1; }
        .task-email { opacity:0; font-size:14px; cursor:pointer; padding:3px 5px; border-radius:50%; background:none; border:none; color:#1a73e8; }
        .task-item:active .task-email { opacity:1; }
        .subtask-list { list-style:none; padding-left:24px; display:flex; flex-direction:column; gap:2px; width:100%; }
        .subtask-item { display:flex; align-items:center; gap:6px; font-size:12px; padding:2px 0; color:var(--text-secondary); }
        .subtask-item.completed .subtask-text { text-decoration:line-through; opacity:0.5; }
        .subtask-checkbox { width:14px; height:14px; border-radius:50%; border:1.5px solid #ccc; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:9px; cursor:pointer; }
        .subtask-item.completed .subtask-checkbox { background:var(--accent); border-color:var(--accent); color:#fff; }
        .input-row { display:flex; gap:6px; flex-wrap:wrap; }
        .input { flex:1; min-width:80px; padding:10px 14px; border-radius:22px; border:2px solid var(--border); font-size:14px; font-family:var(--font); background:var(--card); color:var(--text); outline:none; }
        .input:focus { border-color:var(--accent); }
        .input-time { padding:10px 12px; border-radius:22px; border:2px solid var(--border); font-size:13px; font-family:var(--font); background:var(--card); color:var(--text); outline:none; cursor:pointer; max-width:100px; }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; }
        .calendar-day-name { font-size:10px; font-weight:700; color:var(--text-secondary); padding:2px 0; }
        .calendar-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:12px; font-weight:500; cursor:pointer; position:relative; }
        .calendar-day.today { background:var(--accent-light); color:var(--accent); font-weight:700; }
        .calendar-day.has-tasks::after { content:''; width:4px; height:4px; background:var(--accent); border-radius:50%; position:absolute; bottom:2px; }
        .calendar-day.other-month { color:#ccc; pointer-events:none; }
        .calendar-day.selected { outline:2px solid var(--accent); outline-offset:2px; }
        .note-card { background:var(--card); border-left:3px solid #f0c8a0; border-radius:var(--radius-sm); padding:12px; }
        .note-textarea { width:100%; border:none; background:transparent; font-family:var(--font); font-size:14px; resize:vertical; min-height:50px; outline:none; color:var(--text); }
        .recommendation { padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; display:flex; align-items:flex-start; gap:8px; }
        .recommendation.urgent { background:var(--urgent); }
        .recommendation.warning { background:var(--warning); }
        .recommendation.gentle { background:var(--gentle); }
        .client-card { background:var(--card); border-radius:var(--radius-sm); padding:12px; box-shadow:0 1px 4px rgba(0,0,0,0.03); display:flex; flex-direction:column; gap:4px; }
        .focus-zone { background:var(--accent-light); border:2px dashed var(--accent); border-radius:var(--radius); padding:12px; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:100; display:none; align-items:center; justify-content:center; padding:16px; }
        .modal-overlay.show { display:flex; }
        .modal { background:var(--card); border-radius:var(--radius); padding:20px; width:100%; max-width:420px; max-height:80vh; overflow-y:auto; box-shadow:0 20px 50px rgba(0,0,0,0.2); display:flex; flex-direction:column; gap:10px; }
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#4a3f50; color:#fff; padding:10px 20px; border-radius:24px; font-size:13px; font-weight:600; z-index:200; opacity:0; transition:opacity 0.3s; pointer-events:none; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="app-title">Мои планы</div>
    <div class="bg-quote" id="bgQuote"></div>
    <div class="header-actions">
        <button class="icon-btn" id="btnNewFolder">📁</button>
        <button class="icon-btn" id="btnNewNote">💡</button>
        <button class="icon-btn" id="btnSync">🔄</button>
        <button class="icon-btn" id="btnTheme">🌓</button>
        <button class="icon-btn" id="btnExport">📤</button>
    </div>
    <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Поиск..." autocomplete="off">
    <div class="tabs" id="mainTabs">
        <div class="tab active" data-tab="tasks">📂 Папки</div>
        <div class="tab" data-tab="calendar">📅 Календарь</div>
        <div class="tab" data-tab="ai">🧠 ИИ</div>
        <div class="tab" data-tab="clients">👥 Клиенты</div>
        <div class="tab" data-tab="ideas">💡 Идеи</div>
        <div class="tab" data-tab="journal">📊 Журнал</div>
    </div>
    <div class="section active" id="section-tasks">
        <div id="focusZone" class="focus-zone" style="display:none;"></div>
        <div id="folderListContainer"><div id="folderList"></div><button class="btn-sm btn-add" id="btnAddFolderInline" style="margin-top:4px;">+ Папка</button></div>
        <div class="card" id="taskContainer" style="display:none;">
            <div style="display:flex;justify-content:space-between;"><span id="currentFolderName" style="font-weight:700;"></span></div>
            <div class="sub-tabs" id="subTabs"><div class="sub-tab active" data-subtab="active">🟢 Активные</div><div class="sub-tab" data-subtab="completed">✅ Завершённые</div></div>
            <div class="progress-bar"><div class="progress-fill" id="folderProgress" style="width:0%;"></div></div>
            <div class="input-row" id="addTaskRow">
                <input type="text" class="input" id="taskInput" placeholder="Задача..." autocomplete="off">
                <input type="date" class="input-time" id="taskDate" style="max-width:120px;">
                <input type="time" class="input-time" id="taskTime" style="max-width:90px;" value="09:00">
                <button class="btn-sm btn-add" id="btnAddTask">+</button>
            </div>
            <ul class="task-list" id="taskList"></ul>
            <button class="btn-sm btn-outline" id="btnBackToFolders">← Назад</button>
        </div>
    </div>
    <div class="section" id="section-calendar"><div class="card"><div style="display:flex;justify-content:space-between;"><button class="btn-sm btn-outline" id="btnPrevMonth">←</button><h3 id="calendarTitle"></h3><button class="btn-sm btn-outline" id="btnNextMonth">→</button></div><div class="calendar-grid" id="calendarGrid"></div><div id="calendarTasks" style="margin-top:8px;"></div></div></div>
    <div class="section" id="section-ai"><div class="card"><h3>🧠 Рекомендации</h3><div id="aiContent"></div></div><div class="card" id="letterBox" style="display:none;"><h3>💌 Письмо себе</h3><p id="letterText2"></p><button class="btn-sm" id="btnDismissLetter">Прочитано</button></div></div>
    <div class="section" id="section-clients"><div class="card"><h3>👥 Клиенты</h3><div class="input-row"><input type="text" class="input" id="clientName" placeholder="ФИО"><input type="tel" class="input" id="clientPhone" placeholder="Телефон"><input type="date" class="input-time" id="clientDate" style="max-width:130px;"><button class="btn-sm btn-add" id="btnAddClient">+</button></div><div id="clientList"></div><small id="clientStats" style="color:var(--text-secondary);"></small></div></div>
    <div class="section" id="section-ideas"><div id="notesList"></div><button class="btn-sm btn-add" id="btnAddNote">+ Заметка</button></div>
    <div class="section" id="section-journal"><div class="card"><h3>📊 Журнал</h3><div id="journalContent"></div></div></div>
</div>
<div class="modal-overlay" id="taskModal"><div class="modal"><h3>📝 Задача</h3><input type="text" class="input" id="taskModalName"><div><small>Энергия:</small><div class="energy-picker" id="energyPickerModal"><span class="energy-option" data-energy="high">🔋</span><span class="energy-option" data-energy="medium">⚡</span><span class="energy-option" data-energy="low">🍃</span></div></div><div><small>Повтор:</small><select class="input" id="repeatSelect"><option value="">Нет</option><option value="daily">День</option><option value="weekly">Неделя</option><option value="monthly">Месяц</option><option value="custom">Свой</option></select><input type="number" class="input" id="repeatCustomDays" placeholder="Дней..." style="display:none;margin-top:4px;" min="1"></div><div><input type="date" class="input" id="taskModalDate"></div><div><small>Подзадачи:</small><div class="input-row"><input type="text" class="input" id="subtaskInput" placeholder="Подзадача..."><button class="btn-sm btn-add" id="btnAddSubtask">+</button></div><ul class="subtask-list" id="subtaskList"></ul></div><div class="modal-buttons"><button class="btn-sm" id="btnCancelTask" style="background:#eee;">Отмена</button><button class="btn-sm btn-add" id="btnSaveTask">Сохранить</button></div></div></div>
<div class="modal-overlay" id="folderModal"><div class="modal"><h3>📁 Папка</h3><input type="text" class="input" id="folderNameInput" placeholder="Название..."><div class="icon-picker" id="iconPicker"></div><div class="modal-buttons"><button class="btn-sm" id="btnCancelFolder" style="background:#eee;">Отмена</button><button class="btn-sm btn-add" id="btnSaveFolder">Сохранить</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
(function() {
let data = { folders: [], notes: [], clients: [], currentFolderId: null, currentSubtab: 'active', focusTasks: [], journal: {}, letters: [] };
let calendarYear, calendarMonth, selectedDate = null;
let editingTaskId = null, editingFolderId = null;
let selectedIcon = '📁', selectedTaskEnergy = '';
const folderIcons = ['📁','🏠','💼','👨‍👩‍👧‍👦','📚','🏃','✈️','🎯','❤️','🛒','🎵','💻','🎨','🌟','🗂️','📝'];
const quotes = ['Через год, когда посмотришь в зеркало, ты будешь благодарен себе за то, что начал.','Маленький шаг сегодня — большой результат завтра.'];

function loadData() {
    const saved = localStorage.getItem('my_plans_v3');
    if (saved) { try { const p = JSON.parse(saved); if (p.folders) data = p; } catch(e) {} }
    if (!data.folders.length) {
        const f1 = generateId();
        data.folders = [{ id: f1, name: '🏠 Личное', icon: '🏠', tasks: [{ id: generateId(), text: 'Купить продукты', date: '', time: '', completed: false, subtasks: [], repeat: '', repeatDays: 0, energy: '', tag: '' }] }];
        data.notes = [{ id: generateId(), text: 'Идея для отпуска ✨', updatedAt: Date.now() }];
        data.clients = [];
        data.currentFolderId = f1;
        saveData();
    }
    if (!data.currentFolderId && data.folders.length) data.currentFolderId = data.folders[0].id;
    if (!data.clients) data.clients = [];
    if (!data.journal) data.journal = {};
    if (!data.letters) data.letters = [];
}
function saveData() { localStorage.setItem('my_plans_v3', JSON.stringify(data)); }
function generateId() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,6); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000); }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatDate(s) { if (!s) return ''; const p = s.split('-'); return p.length===3 ? `${p[2]}.${p[1]}.${p[0]}` : s; }
function formatDateISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getWeekNumber() { const n = new Date(); const s = new Date(n.getFullYear(),0,1); return Math.ceil(((n-s)/86400000 + s.getDay() + 1)/7); }

function getNextBirthday(dateStr) {
    const parts = dateStr.split('-').map(Number);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let bdate = new Date(now.getFullYear(), parts[1]-1, parts[2]);
    if (bdate < today) bdate.setFullYear(now.getFullYear() + 1);
    return bdate;
}
function getAgeOnDate(birthDateStr, onDate) {
    const parts = birthDateStr.split('-').map(Number);
    let age = onDate.getFullYear() - parts[0];
    const bd = new Date(onDate.getFullYear(), parts[1]-1, parts[2]);
    if (onDate < bd) age--;
    return age;
}
function getAgeWord(a) {
    if (a % 10 === 1 && a % 100 !== 11) return 'год';
    if ([2,3,4].includes(a % 10) && ![12,13,14].includes(a % 100)) return 'года';
    return 'лет';
}

function updateQuote() {
    const el = document.getElementById('bgQuote');
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = '«' + quotes[Math.floor(Math.random()*quotes.length)] + '»'; el.style.opacity = '0.7'; }, 1000);
}
updateQuote(); setInterval(updateQuote, 30000);

function renderFolders() {
    const c = document.getElementById('folderList');
    if (!data.folders.length) { c.innerHTML = '<p style="text-align:center;padding:20px;">Нет папок</p>'; return; }
    c.innerHTML = data.folders.map(f => {
        const total = f.tasks.length, done = f.tasks.filter(t=>t.completed).length;
        return `<div class="folder-card" data-action="open-folder" data-folder-id="${f.id}">
            <span class="folder-icon">${f.icon||'📁'}</span><div class="folder-info"><div class="folder-name">${escapeHtml(f.name)}</div><div class="folder-meta">🟢 ${total-done} · ✅ ${done}</div></div>
        </div>`;
    }).join('');
}

function renderTasks() {
    const folder = data.folders.find(f=>f.id===data.currentFolderId);
    if (!folder) { document.getElementById('taskContainer').style.display='none'; document.getElementById('folderListContainer').style.display='block'; return; }
    document.getElementById('taskContainer').style.display='flex'; document.getElementById('folderListContainer').style.display='none';
    document.getElementById('currentFolderName').textContent = folder.icon+' '+folder.name;
    document.getElementById('addTaskRow').style.display = data.currentSubtab==='active'?'flex':'none';
    document.querySelectorAll('#subTabs .sub-tab').forEach(st => st.classList.toggle('active', st.dataset.subtab===data.currentSubtab));
    const filtered = data.currentSubtab==='completed' ? folder.tasks.filter(t=>t.completed) : folder.tasks.filter(t=>!t.completed);
    const list = document.getElementById('taskList');
    if (!filtered.length) { list.innerHTML = '<p style="text-align:center;padding:16px;">Нет задач</p>'; return; }
    list.innerHTML = filtered.map(t => `<li class="task-item ${t.completed?'completed':''}">
        <div class="task-checkbox" data-action="toggle-task" data-task-id="${t.id}">${t.completed?'✓':''}</div>
        <span class="task-text">${escapeHtml(t.text)}</span>
        ${t.time?`<span class="task-time">🕐${t.time}</span>`:''}
        ${t.date?`<span class="task-date">📅${formatDate(t.date)}</span>`:''}
        <button class="task-email" data-action="email-task" data-task-id="${t.id}">📧</button>
        <button class="task-delete" data-action="delete-task" data-task-id="${t.id}">✕</button>
    </li>`).join('');
}

function renderNotes() {
    const c = document.getElementById('notesList');
    if (!data.notes.length) { c.innerHTML = '<p style="text-align:center;padding:20px;">Нет заметок</p>'; return; }
    c.innerHTML = data.notes.map(n => `<div class="note-card"><textarea class="note-textarea" data-note-id="${n.id}">${escapeHtml(n.text)}</textarea></div>`).join('');
}

function renderCalendar() {
    const now = new Date();
    if (!calendarYear) calendarYear = now.getFullYear();
    if (!calendarMonth && calendarMonth!==0) calendarMonth = now.getMonth();
    document.getElementById('calendarTitle').textContent = new Date(calendarYear,calendarMonth).toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="calendar-day-name">${d}</div>`).join('');
    const fd = new Date(calendarYear,calendarMonth,1); let sd = fd.getDay(); if (sd===0) sd=7; sd--;
    const dim = new Date(calendarYear,calendarMonth+1,0).getDate();
    const pd = new Date(calendarYear,calendarMonth,0).getDate();
    const todayStr = formatDateISO(now);
    for (let i=sd-1;i>=0;i--) grid.innerHTML += `<div class="calendar-day other-month">${pd-i}</div>`;
    for (let d=1;d<=dim;d++) {
        const ds = formatDateISO(new Date(calendarYear,calendarMonth,d));
        const hasTasks = data.folders.some(f=>f.tasks.some(t=>t.date===ds&&!t.completed));
        grid.innerHTML += `<div class="calendar-day ${ds===todayStr?'today':''} ${hasTasks?'has-tasks':''} ${selectedDate===ds?'selected':''}" style="position:relative;" data-action="select-date" data-date="${ds}">${d}</div>`;
    }
    const tc = sd+dim, rem = tc%7===0?0:7-(tc%7);
    for (let d=1;d<=rem;d++) grid.innerHTML += `<div class="calendar-day other-month">${d}</div>`;
    renderCalendarTasks();
}
function renderCalendarTasks() {
    const c = document.getElementById('calendarTasks');
    if (!selectedDate) { c.innerHTML = '<p style="text-align:center;">Выберите день</p>'; return; }
    const tasks = [];
    data.folders.forEach(f=>f.tasks.forEach(t=>{ if(t.date===selectedDate&&!t.completed) tasks.push({...t,folderName:f.name,folderIcon:f.icon}); }));
    c.innerHTML = tasks.length ? '<h4>📅 '+formatDate(selectedDate)+'</h4>'+tasks.map(t=>`<div class="task-item"><span>${t.folderIcon||'📁'}</span><span>${escapeHtml(t.text)}</span></div>`).join('') : '<p style="text-align:center;">Задач нет 🎉</p>';
}

function renderAI() {
    const c = document.getElementById('aiContent');
    const today = formatDateISO(new Date());
    const all = []; data.folders.forEach(f=>f.tasks.forEach(t=>{if(!t.completed)all.push({...t,folderName:f.name});}));
    const urgent = all.filter(t=>t.date&&t.date<=today);
    let h = urgent.length ? '<div class="recommendation urgent"><span>🟤</span><div><strong>Срочно:</strong><br>'+urgent.slice(0,3).map(t=>`• ${escapeHtml(t.text)}`).join('<br>')+'</div></div>' : '<p>🎉 Всё под контролем!</p>';
    c.innerHTML = h;
}

function renderClients() {
    const c = document.getElementById('clientList');
    if (!data.clients.length) { c.innerHTML = '<p style="text-align:center;padding:16px;">Нет клиентов</p>'; return; }
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    c.innerHTML = data.clients.sort((a,b) => getNextBirthday(a.date) - getNextBirthday(b.date)).map(cl => {
        const bdate = getNextBirthday(cl.date);
        const age = getAgeOnDate(cl.date, bdate);
        const daysLeft = Math.ceil((bdate - today) / 86400000);
        const dateStr = bdate.getDate() + ' ' + bdate.toLocaleDateString('ru-RU',{month:'long'}) + ' ' + bdate.getFullYear();
        let status = '';
        if (daysLeft === 0) status = '🎂 Сегодня!';
        else if (daysLeft === 1) status = '🎂 Завтра!';
        else status = '📅 ' + dateStr + ' (через ' + daysLeft + ' дн.)';
        return `<div class="client-card">
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;">
                <span><strong>${escapeHtml(cl.name)}</strong> — ${formatDate(cl.date)} (${age} ${getAgeWord(age)})</span>
                <div style="display:flex;gap:4px;">
                    <button class="btn-sm btn-add" data-action="edit-client" data-client-id="${cl.id}">✏️</button>
                    <button class="btn-sm btn-email" data-action="email-client" data-client-id="${cl.id}">📧</button>
                    <button class="btn-sm btn-danger" data-action="delete-client" data-client-id="${cl.id}">✕</button>
                </div>
            </div>
            ${cl.phone ? `<span style="font-size:12px;">📱 ${escapeHtml(cl.phone)}</span>` : '<span style="font-size:12px;color:var(--text-secondary);">📱 нет телефона</span>'}
            <span style="font-size:12px;color:var(--accent);">${status}</span>
        </div>`;
    }).join('');
    const thisMonthCnt = data.clients.filter(cl => { const bd = getNextBirthday(cl.date); return bd.getMonth()===now.getMonth() && bd.getFullYear()===now.getFullYear(); }).length;
    document.getElementById('clientStats').textContent = `В этом месяце: ${thisMonthCnt} дн. рожд. · Всего: ${data.clients.length}`;
}

function editClient(id) {
    const client = data.clients.find(c => c.id === id);
    if (!client) return;
    const newName = prompt('ФИО:', client.name);
    if (newName === null) return;
    if (!newName.trim()) { alert('Имя не может быть пустым'); return; }
    const newPhone = prompt('Телефон:', client.phone || '');
    if (newPhone === null) return;
    const newDate = prompt('Дата рождения (ГГГГ-ММ-ДД):', client.date);
    if (newDate === null) return;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate)) { alert('Формат: ГГГГ-ММ-ДД (например, 1985-04-20)'); return; }
    client.name = newName.trim();
    client.phone = newPhone.trim();
    client.date = newDate;
    saveData();
    renderClients();
    showToast('✅ Клиент обновлён!');
}

function renderJournal() {
    const wk = 'week_'+getWeekNumber();
    const stats = data.journal[wk]||{added:0,completed:0};
    document.getElementById('journalContent').innerHTML = `<p>📈 Неделя ${getWeekNumber()}:</p><p>➕ Добавлено: ${stats.added}</p><p>✅ Выполнено: ${stats.completed}</p>`;
}

function renderAll() { renderFolders(); renderTasks(); renderNotes(); renderCalendar(); renderAI(); renderClients(); renderJournal(); }

function toggleTask(tid) {
    const folder = data.folders.find(f=>f.id===data.currentFolderId);
    if (!folder) return;
    const t = folder.tasks.find(t=>t.id===tid);
    if (!t) return;
    t.completed = !t.completed;
    const wk = 'week_'+getWeekNumber(); if (!data.journal[wk]) data.journal[wk]={added:0,completed:0};
    if (t.completed) data.journal[wk].completed++;
    saveData(); renderAll();
}
function addTask() {
    const text = document.getElementById('taskInput').value.trim();
    if (!text) return;
    const folder = data.folders.find(f=>f.id===data.currentFolderId);
    if (!folder) return;
    folder.tasks.push({id:generateId(),text,date:document.getElementById('taskDate').value,time:document.getElementById('taskTime').value,completed:false,subtasks:[],repeat:'',repeatDays:0,energy:'',tag:''});
    const wk = 'week_'+getWeekNumber(); if (!data.journal[wk]) data.journal[wk]={added:0,completed:0}; data.journal[wk].added++;
    document.getElementById('taskInput').value = '';
    saveData(); renderAll();
}
function deleteTask(tid) {
    const folder = data.folders.find(f=>f.id===data.currentFolderId);
    if (!folder) return;
    folder.tasks = folder.tasks.filter(t=>t.id!==tid);
    saveData(); renderAll();
}
function addClient() {
    const name = document.getElementById('clientName').value.trim();
    const phone = document.getElementById('clientPhone').value.trim();
    const date = document.getElementById('clientDate').value;
    if (!name || !date) return showToast('Введите имя и дату');
    data.clients.push({id:generateId(),name,phone,date});
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('clientDate').value = '';
    saveData(); renderAll();
}
function deleteClient(id) { if (!confirm('Удалить клиента?')) return; data.clients = data.clients.filter(c=>c.id!==id); saveData(); renderClients(); showToast('Клиент удалён'); }
function addNote() { data.notes.unshift({id:generateId(),text:'',updatedAt:Date.now()}); saveData(); renderAll(); }
function emailClient(cid) {
    const cl = data.clients.find(c=>c.id===cid);
    if (!cl) return;
    const bdate = getNextBirthday(cl.date);
    const age = getAgeOnDate(cl.date, bdate);
    window.open('mailto:fry1997@mail.ru?subject='+encodeURIComponent('ДР: '+cl.name)+'&body='+encodeURIComponent('Клиент: '+cl.name+'\nДата рождения: '+formatDate(cl.date)+'\nБлижайший ДР: '+bdate.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})+'\nВозраст: '+age+' '+getAgeWord(age)+'\nТелефон: '+(cl.phone||'не указан')));
}
function emailTask(tid) {
    const task = data.folders.flatMap(f=>f.tasks).find(t=>t.id===tid);
    if (!task) return;
    window.open('mailto:fry1997@mail.ru?subject='+encodeURIComponent('Задача: '+task.text)+'&body='+encodeURIComponent('Задача: '+task.text+'\nДата: '+(task.date||'—')+'\nВремя: '+(task.time||'—')));
}

document.addEventListener('click',function(e){
    const t = e.target.closest('[data-action]'); if(!t)return;
    const a=t.dataset.action, fid=t.dataset.folderId, tid=t.dataset.taskId, nid=t.dataset.noteId, cid=t.dataset.clientId;
    switch(a){
        case 'open-folder': data.currentFolderId=fid; data.currentSubtab='active'; saveData(); renderAll(); break;
        case 'delete-folder': if(confirm('Удалить?')){data.folders=data.folders.filter(f=>f.id!==fid); if(data.currentFolderId===fid)data.currentFolderId=data.folders[0]?.id||null; saveData(); renderAll();} break;
        case 'toggle-task': toggleTask(tid); break;
        case 'delete-task': deleteTask(tid); break;
        case 'delete-note': if(confirm('Удалить?')){data.notes=data.notes.filter(n=>n.id!==nid); saveData(); renderAll();} break;
        case 'select-date': selectedDate=t.dataset.date; renderCalendar(); break;
        case 'email-task': emailTask(tid); break;
        case 'email-client': emailClient(cid); break;
        case 'delete-client': deleteClient(cid); break;
        case 'edit-client': editClient(cid); break;
    }
});

document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); this.classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('section-'+this.dataset.tab).classList.add('active');
    if(this.dataset.tab==='calendar') renderCalendar();
    if(this.dataset.tab==='clients') renderClients();
}));
document.getElementById('subTabs').addEventListener('click',function(e){const st=e.target.closest('.sub-tab'); if(!st)return; data.currentSubtab=st.dataset.subtab; saveData(); renderAll();});
document.getElementById('btnAddTask').addEventListener('click',addTask);
document.getElementById('taskInput').addEventListener('keydown',function(e){if(e.key==='Enter')addTask();});
document.getElementById('btnBackToFolders').addEventListener('click',()=>{data.currentFolderId=null; saveData(); renderAll();});
document.getElementById('btnAddClient').addEventListener('click',addClient);
document.getElementById('btnNewNote').addEventListener('click',addNote);
document.getElementById('btnAddNote').addEventListener('click',addNote);
document.getElementById('btnNewFolder').addEventListener('click',()=>{
    document.getElementById('folderModal').classList.add('show');
    document.getElementById('folderNameInput').value = '';
    document.getElementById('iconPicker').innerHTML = folderIcons.map(i=>`<span class="icon-option" data-icon="${i}" data-action="pick-icon">${i}</span>`).join('');
});
document.getElementById('btnCancelFolder').addEventListener('click',()=>document.getElementById('folderModal').classList.remove('show'));
document.getElementById('btnSaveFolder').addEventListener('click',()=>{
    const name = document.getElementById('folderNameInput').value.trim();
    if (!name) return;
    data.folders.push({id:generateId(),name,icon:selectedIcon,tasks:[]});
    document.getElementById('folderModal').classList.remove('show');
    saveData(); renderAll();
});
document.addEventListener('click',function(e){if(e.target.dataset.action==='pick-icon'){selectedIcon=e.target.dataset.icon; document.querySelectorAll('#iconPicker .icon-option').forEach(o=>o.classList.toggle('selected',o.dataset.icon===selectedIcon));}});
document.getElementById('btnPrevMonth').addEventListener('click',()=>{calendarMonth--; if(calendarMonth<0){calendarMonth=11;calendarYear--;} selectedDate=null; renderCalendar();});
document.getElementById('btnNextMonth').addEventListener('click',()=>{calendarMonth++; if(calendarMonth>11){calendarMonth=0;calendarYear++;} selectedDate=null; renderCalendar();});
document.getElementById('btnTheme').addEventListener('click',()=>{document.getElementById('appContainer').classList.toggle('dark');});
document.getElementById('btnExport').addEventListener('click',()=>window.print());
document.getElementById('btnSync').addEventListener('click',()=>{loadData(); renderAll(); showToast('Синхронизировано!');});
let noteTimeout; document.addEventListener('input',function(e){if(e.target.classList.contains('note-textarea')){clearTimeout(noteTimeout); noteTimeout=setTimeout(()=>{const n=data.notes.find(n=>n.id===e.target.dataset.noteId); if(n){n.text=e.target.value;n.updatedAt=Date.now();saveData();}},600);}});
loadData(); const now = new Date(); calendarYear = now.getFullYear(); calendarMonth = now.getMonth(); renderAll();
})();
</script>
</body>
</html>
